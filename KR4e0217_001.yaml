body:
  text: 蠛蠓集卷一明盧柟撰書上魏安峯明府辨寃書古者大夫士志行不通於上則盡於書以列其情要其最顯者則李斯盡秦蘇秦鄒衍田需張儀盡六國司馬相如卜式鼂錯徐樂枚乘主父偃盡漢韓愈柳子厚張籍李翺盡唐司馬光王安石蘇洵軾轍歐陽修盡宋雜遊説兼道藝窮於布衣側微之辭而後下之人得以抒其慮上之人感切於諷直之説於以納其忠而弗之罪焉則夫書之宣上下通貴賤也於古有是夫雖然幸而處常徴諸言載之書可以逹天子不幸而值變身桎梏之刑待鈇鉞之誅徒嘔心血筆而書之不足以逹士庶人何者彼其天壤之相違居養之相異囊首赭衣之徒固不足以動人之耳目也今天下公卿士大夫自宰相而下與天子持議論相可否乘朱輪而插貂蟬紆金紫而懷珠玉執天地之符而力侔造化者固不為少也而柟含寃幽室關鍵口舌不敢延頸而一鳴者何也伏枷鎖罹重法厠穢弗潔之囚誠不敢輒以書通竊又懼夫上之人不肯戢威霽顔傾耳一聽死亡者之論徒速血肉糜骨之禍爾夫鳥極則厲鳴獸極則走挺人窮則歸本呼天命之衰也於柟已甚安得不頓走狂呼祈霖雨救塗炭冒死一言於執事哉夫柟世家業農幼而讀書循章句以諸生受胡氏春秋餟屈宋之糟遊司馬氏之濱窺迹於揚雄諸子之垣然志行狂簡言多激越時時取釁厲為世人譏誚庚子嵗二月中柟傭工人王隆左手病瘡甚柟謂隆曰汝之病殆不可事事給汝直復若業何如隆曰諾請以張杲強幹而多力者代僕柟曰然汝行遂歷試張杲為傭奴六月二十一日杲盜場麥柟聞之以畀司里杲遁宿孫潔場中食守場人李現麵一缶明日柟赴訴縣伊家乘大雨排房塌撲死旦日杲母魏氏駕訟邑侯蔣公曰盧柟毆伊男卒七月初五日蔣公發閲杲尸則上齒闕者六左脛裂凡可以致死者無不毒傷夫齒闕則食難脛裂則行委自柟場至孫潔場逴一里逺而彼走且食此其齒與脛果得有恙否也齒脛俱無恙然且而闕而折果孰為之耶當是時柟具大刑對思不知所出蔣公亦不問杲體遍傷故迫拷掠數百自朝至日昃與法具伍嗚呼柟以柔脆之膚而犯堅虐之刑彼且何情而不嚙豫骨肉而柟非金石之固亦安能久於抗對也苟疾痛有間雖赤族之禍然且不恤矣是月二十七日柟先母哭柟於野有婦人而持母曰毋哀我張杲姊也我父杲叔實知杲死雨頽房壁壓焉杲叔張升又謂柟父曰杲之死也甚微而難言父窮之曰吳章者杲外叔魏氏與章淫禁章不得娶而居其室杲之死夫二人者圖之房壁頺壓非特霖雨使然也鄉昔齒闕脛裂遍身毒傷者於兹可徴焉先人以姦慝之迹隱而具房撲之情於巡按樊公準辨飭大名勘問未及而按臨會審樊公謂在庭諸公曰王隆者盧柟雇工人也按文附致張杲作王隆傭人隆且為人傭張杲為傭人之傭耶夫王隆無恆産為盧柟業農即令張杲為若傭當業誰之農乎使杲果為隆傭則杲當在王隆場安得來盧柟場盜若麥耶且杲所撲麥盧柟之麥所飲食盧柟之饋獨傭為王隆之傭名實眩矣法宜開蔣公不然樊公曰凡士師可以生殺人有天子律令在律可殺吾不敢生律可生吾不敢死兹所議盧柟同諸君奉天子律令爾我何敢私且魏氏原告詞謂盧柟令雇工人王隆覓張杲郭勇與柟傭工矣夫王隆一人爾果覓工自代即當傭一人又安得雇張杲郭勇二人代一人耶况盧柟當時嘗給郭勇雇直錢勇既為王隆兼雇盧柟又安得給無謂錢與王隆所傭人耶今不幸事變杲死遂作王隆傭人設使勇亦死則勇即作王隆雇工而盧柟不得謂勇為雇工矣法宜開蔣公語塞少間進曰盧柟既逭死請罰榖一千石破若家何如樊公默然蔣公趨翼進將言憲副張公目蔣公退同知崔公履推府朱公之跗朱公肘真定理刑趙公謂蔣公曰是不可死先生何苦扼人蔣公稍就位樊公指柟原法曰彼罪案既若是而蔣令置之死豫當奈法何僉曰稱律令於是下柟大名守什公飭滑縣劉公覆勘劉公者又蔣之同年生最舊執也相持詞議定而後出謂房撲為妄告擬柟以家長毆雇工人至死應徒律量罰榖千石其傍引鯨鯢凶噬之惡無損於蔣公焉以呈察院二十年正月內詳允發諸犯的決贖罪暨柟各寧業所議榖千石直以為非法令免惟皂𨽻李祿未請官照出亦擬不應詳代樊公巡按殷公允其詳而獄由是勦矣柟居家未踰旬而先人終距六十日而先母卒踰年而兩子死一女亡夫柟出獄瘡痍未灑即繼之以天崩地隤之變而動其心膂之慘奈何天命窘極若是哉先是蔣公董獄當死刑者五人曰盧柟曰袁濟曰馬氏曰吕敖曰侯宗儒然皆寃誣而無實以故獄詞雖備而率不服是故樊公首貸柟薄其罪暨殷公按郡則四人者咸稱寃蔣公懼諸公救之以柟為口實解殷公問蔣公曰盧柟何如蔣公具疏進復組織柟死若昔之語樊公者益誣由是殷公釋袁濟馬氏而復問吕敖侯宗儒尋亦開去獨執柟於喪械送大名守張公公知柟之寃哀隱悼惜之不足而議柟抵死此固因察院之成命非張公好殺之夲心也明年柟奏辨復行張公問得其情供張杲實柟傭人而仍以原擬若曰仍原擬則法不病作傭人則不沒其實而典刑緩且歸柄於察院也是年翁公按臨弗原明年柟復奏辨行張公時巡按胡公會審而張公前吏部郎中通判吳公前吏科都給事中推府李公悉直柟為誣胡公執先定之辭據紙獨與柟對仇而佐證卒不及一詞及柟稱寃出憲副喬公作而言曰是情實可矜胡公曰此卒不可殺終當與某囚同例減死爾姑待仍擬張公退而歎曰諸公哀枉非不力救然所能者人也其所不能者天也於是悉取諸逮事者徴問前卷傍引鯨鯢凶噬之惡嘗笞某六十七十者皆虛偽無驗正去之獨張杲案如胡公議於戲柟內省由齠齔之年以及今繫獄之日柟始讀書不過為狂瞽之文瀆君子視聽未嘗附會官府行無賴作掊克又素惡商賈行坐之事於市井挾劒雄酒豪俠之徒固未嘗銜杯酒接殷勤同濟凶淫之惡慢長老而忤王法也獨好倜儻恢曠之行嗜殊調好觀古人竒節然未敢踰大間為名教罪人府縣無告訐之辭而六曹無文劵之驗夫所謂恃豪放恣險惡憑陵暴橫於一時彼濬人固寬厚有容者亦安能甘蹈患害上下無一詞發擲必待張杲之獄而後暴白哉且張公決獄明公而少貸使柟果負大惡如前卷云云則亦安肯薄正而去之俾文案不符於察院會審又何為汲汲解暴令柟無死若是哉夫前卷錮獄扄之以紙若鎔金鐵之精貫重關之鍵而牢不可破幸而巡按樊公開示覼縷動引天子律令平反是非一人之私恩得以紊典刑而掩日月也且柟應擬徒罪贖榖四十五石而倉有收也魏氏領葬杲尸有狀也柟領杲原貯庫所盜麥并袋有案也夫李祿詳所載皆柟已開原迹二十年四月內殷公允之有徴也是皆藏諸司吏有考也柟寧業居喪一年是亦齊民矣固非逸刑掣鎖之徒越有司而警方牧之人也讐家無告佐見無告公正之民無告攻發陰私狡猾悁悍之徒俱無告夫執柟時去允之之詳日期然且八月逺矣然而察院至是復悔其允曰盧柟招詳朦朧收置之死夫招詳果朦朧耶前李祿招詳何不駁勘果非朦朧耶顧復執柟抵法由是言之前後翻擾多失其據而柟安得無寃誣於其中哉始柟為諸公原宥前已歷陳惡有察院之嚴諸公之明而為是朦朧招詳哉惡有市井輿情之地而柟敢以招詳朦朧居之哉惡有三代直道之民容是招詳朦朧之人油油然處之而無所異哉昔有好生者贖狐兔糜鹿而放諸郊獵者邀之則急走狂呼以救其死嗟夫人放禽獸猶不忍邀今樊公既放柟於野人又從而招之得非憂物之心重且長而仁民之心輕且短與夫張杲一人也在前卷為王隆雇工樊公為盧柟雇工殷公復作王隆雇工及柟奏辨張公詢得其情仍作盧柟雇工而翁公復改作王隆雇工夫古天吏殺人也左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺信矣而未敢也然猶察之見可殺焉而後殺之今柟之獄朝一人曰可殺暮一人曰否暮一人曰可殺朝一人曰否夫所謂可否者才一人之辭耳設使執政舍已之見平其心氣推而問諸左右諸大夫國人則其可否豈特一人朝暮所謂哉雖然可否無定者謂之疑獄王制曰疑獄泛詢衆議赦之又曰附從輕赦從重書曰與其殺不辜寧失不經吕刑曰五刑之疑有赦五罰之疑有赦周官司刺掌赦宥之法夫古之聖人思其心未嘗殺人因民逺善而邇惡故著為法令以馭之夫刑凶器也擅意快殺者入人易深而聖人有憂焉於是埀法於經若易之解曰雷雨解君子以赦過宥罪臯陶之戒舜曰欽哉欽哉惟刑之恤哉我明太祖創制立刑於律首為橫圖薄刑具著大誥減等又五年勑刑部恤刑於疑而可矜者察小大之比以宥之此其仁民好生之意與王制易書周官之法相流通今柟無辜之獄非止於疑而已也何獨不被聖王赦宥欽恤之仁罹此網羅繩鉗之厲哉夫察院諸公堅不原問是非不知柟為寃抑真以為死而殺之也蓋譖禍既成每執政出都仇者從而攻之而柟名曰監生訊者謂柟非豪右則守錢虜子爾蓋不知柟以中民之産積獄數年悉貿費無餘而先人二柩暴於人野場中寡妻無嗣託食於親厚故人已閲二載矣艱苦萬倍不能一宣上卒以虞涉之嫌而下無解縣之日此大道之公不行於一夫而柟飲恨待斃所以積淹於獄也夫孰肯正明王之法忘小嫌之私挺已抗救於汩沒無報之人哉昔者柟歷大名府獄濬獄元城獄會諸解繫徒録逺六七百里近比各府州縣獄其弊無大相逺而莫以明是故敝訟之政荒圜土之教衰雖使蘇公召伯日訊於庭於國家基本萬一無所裨益焉請詳言之夫三代而下禮樂教化之不行凡可以驅天下之勢者畏而已矣是故上而畏天子下而畏方伯連帥其次畏府州縣牧之諸侯其次畏皂役羣小夫畏天子則天下治畏方伯連帥則方嶽平畏府州縣牧之諸侯則丘井安畏皂役羣小則民無所措手足而寃苦病夫獄物之深密者也周禮大司冦用獄聚教罷民凡害人者置之獄各施執事以明刑耻之今之治獄則不然晝則聯紲而居拲桎而食呻吟悲號相靡於棘垣之下入夜則足連縶項重鉗肢脅受縛三麋髮引層間之半筋脈急張血肉反攻而疾痛不勝呼守者撫之弗聽則搒楚有加矣將死一人預以病嘗之有司有司曰可從而殺之曰某官殺汝也非我也夫死者未病而嘗有司以病者何也曰殺之慘一召慘之故有五凡無賄而通者殺多餉不分者殺記守者之過殺為富者復讐殺見利弗豫者殺夫官有察吏有稽彼恣殺而弗顧然且不覺者有故也未殺譖溢惡之言於吏既殺示顓柄之威於囚囚懼無漏言吏忌無貰政是故恣殺之計行有司弗覺矣由是待罪之民輕天子而弗畏輕方伯連帥而弗畏輕府州縣牧之諸侯而弗畏唯皂役羣小是畏嗟乎天子方伯連帥府州縣牧之諸侯所以治皂役羣小也於其治皂役羣小者弗之畏顧畏其所治者則是驅天下之勢不在乎上在於皂役羣小也由是百姓無所措手足而寃苦病府州縣牧諸侯之政盩而丘井危方伯連帥之令壅而方嶽蔽天子擁虛器於上而禮樂征伐不行於下則天下壞亂不可救矣雖然柟聞之君子曰有治人無治法孔子曰君子之德風小人之德草草上之風必偃是故商君治酷而民尚急文帝好寬而諸吏多長者今執事治濬兩河雞犬之民不下十萬户而囹圄無人執事好生之德可知矣是故吏禁之屬無夙弊如前所陳者是非彼能無私心人讀書而體臯陶之德也良由執事寬仁之政流通於濬彼自不敢為酷民爾或曰獄重地宜謹嚴汝負大􅖄而云云若是將有以自解與夫柟聞古之賢者不幸善居獄而速死之弊有三君子不由焉忘盜賊之分雜卑汙之行喪其所有而日與囚化者命之曰淆獄乘隙竊免亡其身以及其親命之曰遁獄劫天典隳王法拿挺決出自分必死鬭城守而殺禁戒命之曰叛獄嗟乎善人不入獄夫獄所以待小人也吾惟不知務而輕用吾身吾是以久獄不知命焉乃今不能控訴自明復為淆獄遁獄叛獄蹈速死之弊悲哉甚矣吾之自惑也昔君子黃霸在獄授經曰朝聞道夕死可矣以故李固杜喬孔文舉蔡雍皆世之大儒卒以獄死然君子之名懸於霄漢矣柟志疏而才狹視古人若丘蛭之目龜螭靇龖也乃竊嗜好為文賦數百篇詩幾千數十百首雖不足傳苟得逺脫桎梏而好事者或取焉奈何不以古人自附而同流俗於淆獄遁獄叛獄速死之輩哉昔先人治土地若干畝自柟下理後悉賣之豪家而約劑者又竊與之通弊減畝數私價直凡先人諸故物無不私市於人甚則拆房室伐樹木鄉人無賴效之一切施其不法又徭役甚煩柟以貧窶得羣里長窘辱夫柟待死罪無兄弟子嗣之續即有井臼婦彼獨宴處閨闥不過一書生妻爾又焉能知庶務應外事與豪詰崛強之徒相抗唇哉往年執事均賦柟以中上裒下下又諸差役悉憫痛省覆此非執事知柟貧苦如上所云又安得霖雨之澤霈然若是哉噫嘻柟事已矣唯獄中無他事舍勞思愁苦之外則讀書日明於道少延旦夕之命為死所爾若為柟申寃枉之情解塗炭之災覆柟之妻女毋為鄉里暴客之資為版籍窮民此執事之恩也當道之責也柟何敢預焉伏唯執事裁察答王鳳洲郎中書七月初七日本縣遣使捧檄齎牛酒腆禮并翰教遺柟家柟唯皇風既逺光氛載竭箕頴之後世絶幽響故雖兩漢玄纁蒼璧時加丘壑而大名之士往往負揭取誚後世易曰束帛戔戔賁於丘園丘園之美何可易言也柟稿胔之餘已蒙大君子渥澤復起為人今又施曠代之典於胥靡之民叨天之秩竊地之懿回惶中惑實益厚顔比又讀執事所喻鸞龍奮鬱五綵炫爛飄飄然若凌風御虛絶無纎壒回視寰中蠘螉語真若竊帝壤以堙洪水幾何不僨且潰也執事邁天人之英操宗匠之器與李于麟宗子相諸公雄據虎視掎獵中原即令揚馬應劉接軫橫騖未嘗不喪精奪氣偃伏旗鼓也柟方卷舌脅息攛投不暇若執事云云何敢僣預獨所懇者柟素嘗歷諸郡邑多誣枉如柟文致不可反者甚多執事銜上命察寃抑拯救焚溺於斯人獨無加意乎哉記曰附從輕赦從重唯執事念之鄙作詩賦謹裝六册呈上拙文數卷未及繕完容嗣羾文幕適聞旌斾告速而柟又有秣陵之行故耳秋霽方採藜藿併食偃臥無俟多談柟又頓首頓首上李東岡推府書柟不佞不能奉先王之教違孔子之訓以姦時王之典逮繫濬獄三年迷惑頓踣殊苦萬狀寃頸縮喙不敢長鳴而自陳此非堯舜兼濟之病天地之大遺於果螺螟蛉纎芥之細也抑柟自察材質卑微朴抶囊木之間恐不能盡白柟之所以待罪之理又不足感執事推亮憫裁之化賈山曰雷霆之所擊無不摧折者執事之威甚於雷霆震悚惕厲萬不獲已略抒固陋沒死上干幸加惠憐聽埀察焉柟聞春秋之義自誅討亂賊禁蠻夷猾夏之階特以復讐為重復讐之義非尋常世俗簞食豆羮之怒詈罵睚眥之怨瞋目按劒曼胡血纓命氣相高也孔子曰父母之讐寢苫枕戈弗與共天下也遇諸市朝不反兵而鬭檀弓曰喪不慮居毁不危身曰毁不危身為無後也非謂食美衣錦察音樂之比長大子孫樂妻孥以供宴安也公儀仲子之喪舍其孫而立其子孔子曰否立孫重嫡子之建延宗廟血食之祀綿本始之義爾孝經曰立身行道揚名於後世以顯父母孝之終也夫仁者踐誼勇者不必死節智者不汩名若徒效小廉死小恥快一劒之奮行弗顧後令聞廣譽不加於天下滅父母之稱此匹夫自縊於溝壑之事少有逺慮圖大者不為矣詩曰哀我填寡宜岸宜獄握粟出卜自何能榖夫置身犴狴之中狹聖鑑之卜從一死不返之諒孝子不為也曩者柟犬豕之質寡聞道之資觸司冦之刑囚幽圜室之內先人赴訴御史臺下聽之問諸監司曰免問諸守令曰免問諸讐正曰免夫然後稱律令出柟於死沒之編氓之籍越明年結獄始歸侍先人寢食几杖先人又不留家居適淇門别業入暮夜而盜賊興矣鉏耰登之大屋干戈擾於坳塘白刃之鋒砉於平樓先人縣繩及堞隊則賊藉之戟鋋伺之鉤鎩一夫內呼羣響沸應絶雞犬振簷瓦先人以七十之年降而蘇登者三杪乃氣力疲憊謂庶母曰孤兒始脫患難我有長苦積恨於異日者不得與之語乃今父子不相見天呼命也賊薄滋益甚請幣不可請貨不可請降自分裁不可賊突登戕先人沒悲夫誰能無父而死何先人令其子不忍言之若是也時告諸縣邑賊已出境有懷慶為之穴陽武為之墟封丘延津大河之曲為之堂隩烏合蟻聚之衆斬木揭干大呼於淇衛之郊時蔣公蒞政不肯發一夫掣白挺以逐之柟家貧新禍又無財賄雇熊貙之士誰肯不待教命為柟出死力窮誅越人之冦哉即有鄉曲之民哀柟無告者捕之才得蜂蠆於積閏竒扐之間封豕虺蛇凶噬之惡固己投迹草木依山澤肆然無忌而誰何郡縣矣柟輿求父尸歸之寢則官府有憎惡之不祥城守有捍拒之嚴陳哀暴棺於郭門之垤猶及今未成葬也當是時夫豈不能告諸天子請諸方伯連帥也然多狼顧之患懼滅門之禍其事本末未易明此所以沒齒關口而不敢言唯我執事明睿逺照深察而悉之者也願執事熟思加痛少裁焉是年先母悼先人之故埀白髮哭泣不飲食距父凶六十日亦殞柟奉二柩袒括銜哀皇皇焉如有求望望焉如有從而弗得也杜門餟粥守先王之制嘗膽謨謀雪先人之耻不知察院復按前事移檄復收柟矣由是司里授鎖城旦詰門尹二縶其妻義勇朅夫圍其宫執柟苫塊之上械送大名張公勘問不即置之死刑之若不能舉也哀隱嗟嘆之不足三月而後成獄竊窺造化之私少之得其當以處柟爾卒乃不得執政旨趣擬之大辟柟信知非張公本意雖九死猶不足報張公深恩也夫柟有二小弱子託宗祀之寄未及而長子殤越數旬而次子為無服之殤夫殤下葬以夏后之堲周無服葬以有虞氏之瓦棺也柟囚繫不能與二子永訣覆用蘆藁孔子曰敝幃不棄為埋馬也敝蓋不棄為埋狗也由是言之二子之葬視不如狗馬矣昔者延陵季子適齊反長子死葬於嬴博之間還其封號之者三曰骨肉復歸於土命也若魂氣則無不之也夫聖賢值事變猶不能忘情骨肉冀其魂之隨已以終父子顯幽無間之義悲夫古之君子皆然何柟獨於其子生死不相知若是哉書曰迪惟前人光施於我沖子柟承前人之光無沖子之繼又何施焉詩曰貽厥孫謀以燕翼子子且長沒何孫之能貽也夫柟受木索嬰金鐵坐庰室之中無日月之明忘晦朔之變腥臭觸九竅死尸參肢體稍解縲紲伏棘巖之下蟣蝨如流結髮如約肌理不和胼謬紛紜之皮搔之如雪下夜則檻柵交軋枕股之會鼠嘯於顱婦嚙於承權百足岐翹之蟲歡愈遊戲於肘腋之間少有關便則守禦者禁之曰噭叱而搒楚交施於骹􅀈之上矣昔綘侯下廷尉曰吾嘗從楚軍百萬而心未能動殊不若見獄吏之已甚條侯坐收不食嘔血數日死顧柟鄉里委巷之陋繩樞之士而氓細之人也視此安得不寒心哉柟聞太史公曰砥行立名之士太上不辱先其次不辱理色其次關三木被箠楚受辱昔湯讓天下於涓子涓子弗之潔也負石入水死伯夷思與鄉人處其冠不正去之若將凂於塗炭夫視天下不以為潔視傾冠細故若恐汚其身也設使二子視辱其先祖理色關三木箠楚受辱者思將何如哉夫柟行汙名賤即死若九牛亡一毛無所輕重於世然自忍耻湛溺苟活溷穢之中無恤涓子伯夷之誚者竊惟私恨有所未圖報天地之大義有所未經列如前所云云也昔越王句踐禦吳於檇李戈其王闔廬殺之夫差使人立於庭苟出入必曰夫差而忘越人之殺而父呼則對曰不敢忘三年乃報卒敗越於夫椒嚮使夫差懷君父之讐卒有不諱則越無會稽之耻大夫泄庸種蠡必不匍匐屈膝於嵐峈之間其子女臣妾文馬珠玉珍寶之器必不陳於姑蘇之臺闔廬之耻必不雪於九原之下楚子滅越椒也針尹使齊反自拘於司敗楚人釋之曰存子文之祀若楚子忍於針尹之禍若敖氏之鬼久矣其餒矣孟明視為秦伐晉再戰再北喪師百萬為晉俘虜逃之釁鼓之下可謂辱矣孟明以衄師禽將非勇也身死名蔑為天下笑非智也退而與秦伯圖策汧雍之間君臣合謀開關出兵東取王官及郊濟茅津封殽尸還伯西戎威震天下再敗之耻一鼓而灑之使秦伯不悟過之可使以立功誅孟明以見法孟明不蚤見主之不留罪引節以自裁夫孟明髮膚與人同骨肉非有異衆之飾徒偕草木比糞壤死矣安得強秦之國功並五霸名與天壤俱哉夫柟抱不測之罪非有公輸墨翟之智陶朱猗頓之富孟嘗賓客解難脫死之救也生産貿易孑無餘燼蔑父子兄弟之親寡妻孤女棲食畦蔬紡績之間柟恐就刑之後父母骸骨長棄暴露逺無收恤之主牧竪戲為踏鞠牛羊礪之角獵夫鞭其朽過者泚顙睨視曰盧柟不肖抵法使其親陳列天地如此可哀也夫柟誠無靣目見先人地下俾夫差得專美於其前也竊又恐隊姓隕氏絶太公之後祖宗墳墓嵗峕伏臘無一人陳菜羮奠酒漿者不得如楚子存若敖之祀也夫柟固有一死特以臧奴矯誣坐滅郤顯業廢事功口無食人之粟足無立人之朝一旦與螻蟻同斃飲恨忍耻長跪逺謝於孟明視奈何不拊膺捶髀流涕泣盡而繼之以血也柟伏覩執事為治大名農易其業女不忘機杼南鄙郊墟之民父老扶杖謳歌思化是召公之治也博物多識窮天地之文密緻理之極是子産之智也忠信明斷民愛不忍悖無姦伏之心是仲由之義也夫執事被三盛德柟猶卧烈熖之中甘燋爛之禍不能極聲號呼以速霖雨之澤智之所不足論也柟聞古之君子聽獄致其忠愛以盡之疑獄汜詢有赦無殺柟雖不佞竊覬覦於君子矣夫先王觀風盡民情之變有奏獻賦詩之體柟不揆昧死述鄙俚隨書進聞維執事之採察焉柟頓首頓首與陳一泉外翰書柟聞往年執事受職走馬來濬縣時縣主尊重廉隅豪習高其才不輕與物接明日始乘轎邸見執事之任既數日始戒官僚從事屬興禮進賀踰年柟或因執事春秋祭饗會食入公門於圜墻窺視則縣主肅而入拱而出周旋委蛇賓主輕重之儀罔敢墜逸與前所聞者大異竊獨不知何為而然也既而濬士大夫有所存問於柟者私道執事盛德恭愛仁賢道隆而思謙行顓而體備宏外而惠中有所叩則因為之鳴以盡其節溫乎如玉縝乎如金萃乎如芙蓉淡乎如秋水泛於塘澄霽而無所淆濁也曩昔縣主之所以盡禮於執事者謂非出是乎哉暨柟詣御史臺對發內黃見執事往來每伏謁道左執事忘其為囚以鞭揮之曰毋執事之聲音顔色始得接見尤進乎圜墻之所窺識者而前士大夫所稱譽果足以得其似也當是時有能脫去桎梏加我以冠履法服令之得為人其體使能詘伸坐立其手足使能持行其耳目使能視聽其禮貌使能揖遜退避其口使能道古今事變明仁義陳帝王之迹而無巳也執事憑軒而聽之則必有可觀者今以刑僇之民為世擯斥雖欲自進已見逐於君子門墻矣柟又焉敢振金鐵亢明刑揚其惡臭塵觸於執事之庭哉雖然嘗聞聖人樂天而知命賢者守義以徇死智士不廢時以立功所謂樂天而知命者道德備於已險夷之來非我所致凡利害升沈通塞之故舉弗問焉則周公居東孔子圍陳其人也所謂守義以徇死者不幸而禍變加我者或是與雖死以定分可也加我者或非是與雖死以順受亦可也然則奚死哉死於義則止爾若荀息之死莭叔孫豹之守難彼誠深乎是也所謂不廢時以立功者略小嫌以自汙藏器以待時而用其道於天下者也昔子犯負戈管仲囚檻而顯齊晉者非歟夫柟以肓昧墮死刑誠見黜於周公孔子者若荀息叔孫豹則為其君引節今柟緣讎坐誣而罹之極刑即徇死其所守者何義哉獨柟罪章所載一見釋於御史樊公再見疑於太守張公使有解倒懸者得沒其齒終其愚則柟願為伯臣執鞭夫豈無膚寸之功以謝天下哉今特囚拘牢狴去冠飾而聨紲之其體非復能詘伸坐立其手足非復能持行其耳目非復能視聽其禮貌非復能揖遜退避其口非復能道古今事變明仁義陳帝王之迹假令執事致之堂陛賜之跪使出話言不過頽然一囚而已又安能決胸臆開口一辭為君子應對哉夫柟淹獄數年心思轇轕每傳鐘鼓及獄卒喧呼警報則便悸怖久之始能定日間與囚徒雜處或勉強一笑不過亂愁苦忘兒女思爾非有所謂樂然後笑者也使憂能傷人則吾豈可以延嵗月不死哉比年來桎梏無晝夜或為文賦腹藁成則請於司圜氏解刑而後書已則復刑以故多鄙俗無足觀然猶不以為耻而獻之官府亦欲司命者知柟頗從事於斯免搒笞云爾夫虎豹惡獸君子忘其凶穢而寢之皮取其文也今柟凶穢異於虎豹而有其文或者為君子之所寢邪謹録舊所為文五首賦二首雜體詩三十首託諸生錢子萬選李子應宿敬上執事倘忘其凶腐之質而寢其皮毛之文燭日月之光而賜之以不死之惠俾柟求上大夫所稱與親炙盛德而叩其鴻音則夫圜墻之所見內黃之所得者愰然而失矣柟父母五年不葬而二子一女死闔門蔑絶無所統繼濬之士大夫固能言之今不敢贅唯執事埀察上郝南峯吏部書柟聞昔者荆軻入秦而白虹貫日白起滅趙師而太白食昴鄒衍繫燕王之肆而五月飛霜夫精誠變天地姦氣拂星辰此皆越等夷之幹造盛衰之變關命運之會殆非人人可與揆咎而取徴也夫德肖朝􅌲形類蟪蛄生如植稿梧亡若覆死灰然嚮靡延長頸極號呼以求託化育之意弛負擔之憊夫誰有蹈赴湯火舉手投足拯死亡者哉柟聞荆楚連城之璧隋侯明月之珠於越湛盧之劒屈産齧膝之乘此四者天下之至寶使出自齊秦吳楚大國必將狹重期之觀崇華廄以養之纍踵曵跗購千金而視矣發迹於三家之市則人之躡景昻目而觀者才百之二三何則語曰犀象無位出自驕貴蕢莩草履無然下伍積居襲之漸也今柟本蓬澤枯稿之士奕世編氓業不出丘壑綺縞不曵體梁肉不適唇繩樞瓦缶長大子孫閭巷不聞金玉之聲勳葉之貴擁貂貐乘魚軒揚眉濶論視猶土梗草苴斯亦士之至賤者矣爾乃負固陋之質效矯世之志遐思逺舉立於百世之下以竊慕於千萬世之上詩書飾小愚禮樂誘言志依附處士乖忤權貴雕蟲綺篆於辭賦之間衒玉不售置吾家體用不適焉於是乎上不能伏巖冗之側考泉石之迹以重明主之顧次不能發經射䇿效納忠信以拾取緋紫之榮下不能揆卜齮之計逐什一之利致富千金為宗族光寵夫然後張目而劒戟森企足而梁父峙市井都遂之中一陷穽網罹之設矣昔客有鼓瑟於齊王之門者能使鬼神上下縣竿不合則人將掩耳而不聽宋人資章甫適越雖端凝冕裘斷髮文身則人將駭碭頓走反目而不觀諺有之曰衆口鑠金重毁銷骨而柟負違俗之難抱獨任之釁挾撮壤而障江河則人有惜狗馬之斃痛狐狸之掩靡不愛柟一死者矣况夫潢汙瀆於鬼神鄭聲淫於師曠社櫟棄於匠石燕礫笑於周觀誇渚崖而東靣視惡知其不長笑惡於大方也夫柟罪戾如此其大適遭傭奴之變而其家益無賴圖致之死要取不訾之賄厚誣抵法之刑尚賴天地日月得自明稱貰一年乃復皇網掩其翮周綱繚其膚申索縶其足垣鼠不避囓其髮髭柟聞市廛之音商販歌嘆愈於鈞天之樂薄解束縛稍置散地跔躑僂俯愈於帝庭之美出檻域寢苫塊愈於匡牀之安藜藿之飯晨至而晡進試以挺杖後食愈於紫駝之羮赭衣短褲不掩脛骭略僃燥濕愈於魯縞之繪吏至喜則屈膝怒則頭搶地雖太史公詬辱蠶室王嘉惕於法伍李固斃身箠缺塗毒金鐵俯首埀涎呼天椎心而流之以血何以踰此柟聞蛟龍失雲雨則覂鱗波濤殞骨泥沙士嬰禍羅則毁身亡名折節徇死今柟形辱志降長謝洙泗則聖賢之逐客覽清聖之鑒則鴟鳶之餘肉何地而不可委呼而柟含垢忍耻延一夕之命苟活溷壤溺血之中不能蚤自裁決貽先祖之羞徼鄉里之惡者是非禍覬徼幸而利大於偷生耳竊懷蓄恨之積固有不瞑目之行故敢冒死上陳願執事憫裁聽察其至柟聞古人有言曰人固有一死或重於泰山或輕於鴻毛用之趨舍異也何則孝莫大於復讐統莫先於傳子士莫重於廣業昔者尚子行仁勇之事長驅赴難不能報伍奢之怨穆公屬國於宋殤搆戚黨之禍結怨諸侯不能定子馮之居子推汙世主之量高不賞之節燔炙介山不能樹管仲之功也故夫事涉過計於前駟馬不能捷之於其後矧死生之際得失之大機柟固熟思而詳議之矣唯執事推心加聽焉曩者柟置身圜土出歸謁先人於淇門敝廬未幾而黃池之孽作黑山之賊舉抉垣破屋戕先人而火其室先母埀白髮號哭不逾時而逝者豈非悼痛先人不首牖之故哉夫柟孤立無兄弟犬稚甫九嵗即亡次子三嵗亦夭死寡妻孤女煢然在室族人攘利變易不測竊恐柏舟不可為誓陳人之媵或加於我盧處子矣柟聞墨翟棄室而説諸侯百里奚鬻秦而相寧戚飯牛以干桓公此三人者豈竊世主權利富貴取聲譽天下哉要之各乘時奮智行義逹道樹勳業為不朽爾夫柟自稚齒學章句長而被儒服誦法周公孔子之道思欲附會古人效駑鈍之姿蹇步鉛割粗有所建明於斯世也然瓦礫之材璞匠所棄制科之不收縉紳士大夫之弗齒中風狂癎觸昭憲之網弗出者三年矣奈何遽死而不急聲燋呼於執事左右哉由是觀之舉子推之隘者則士不宏迹宋穆之謬者則統失緒持尚子之操者則徇近名孝不寬昔曹沫將魯不死三敗之辱于柯之盟則挾匕首劫桓公還魯之侵地以雪衄師之耻今柟欲包曹沫之羞以反三子者之見而後伏斧鑕之刑尸藁街之觀欻然長逝少謝造物之私執事胡不少埀憐惜宏天下恢廓之量忘其出身之微越於世俗之惡拯袂水火雪淹滯之寃以成憤抑之志柟即白骨復生載覆盆而被日月之光者果誰之賜哉與陳龍泉大理書柟聞物有異類而同情者故釁牛觳􅑌猛虎負隅麋鹿走挺柟竊以為禽獸之性怵於死不過惡中傷血肉惜毛羽骨角而外不知事夫人則不然特秀萬物善智慧悅親戚交遊急耳目四肢之愛臨不諱之期陳取冠履故物羅列諸兒女妻妾滿前執手喟唈語呫呫屬後事視禽獸無所省而死者逺矣夫君子則不然任天下重器身百世之規道誼未盡下見淆於閭里而上無王伯之遇不幸遭變則含穢詘辱嚴周身之防以圖事末效視夫人略知省而死者亦逺矣今柟無君子之行而私有志焉自愛於其死日者柟以傭奴故坐法御史樊公察其誣而出之明年殷公按郡尋置之死而柟父母在殯銜不共天之寃絶宗祀之緒濶倫理隳民彛姓名不著無補益於世與盜賊同斃於法伍則柟安得不寒心酸鼻而死哉即死不過於二三禁吏之手與羣儽嗚嗚相悲咽而已又安得諸兒女妻妾滿前執手屬後事哉且犴獄幽虐之地一夫辜死則暴之數日始出落髮髭變肌膚巨鼠如狼噉其靣目甚則羣嘯抉腹嘬其腸胃脂膏相靡於垣墻之間是不得惜毛羽骨角如禽獸矣今柟待死何以免於是竊聞禮君子決獄有赦重附輕之義思柟骨肉無見笑於牛虎麋鹿則執事之賜焉唯留意幸察上吳少槐吏部書楚頃襄王好畋獵獒齧御人脛州侯夏侯請從磔獒楚王曰已卒飼之虞人之餼莊辛見楚王曰臣聞大王獵獒齧御人脛也有之乎王曰有之曰王之獒孰與於王之御人王曰御人貴夫王不賜之磔也已甚矣而復豫之餼此王率獸食人也楚王曰先生之言悖寡人奉先王社稷雖不肖豈敢比於率獸而食人日者獒將烹寡人已令處獒深宫深宫不逢不若誑尫之厲不敢為妖祥此獒之桃塗者也它日獒在朝暴客邪佞之徒不至持戟宿衛之士日事高寢此獒之泰阿犀甲堅城方池者也又它日獒出郢超黔中過夏州還獵蒼梧之野軼熊虎貙豹裂腦血鮮于巖谷之間窮軀強幹之獸走東齊青丘境上此獒之碆盧矰繳藥銛陷穽之利也夫獒備三能寡人弗恤從貴人之請是磔三能也寡人何靳於虞人之餼莊辛曰善王之已也存獒三能夫柟齧僕人之脛讐家因矯殺之厚誣之死執政不肯深原論曰抵罪此獒之將磔也甚矣夫負死罪待磔誠不足惜竊悲夫先人暴露二子就亡盧氏之鬼將乞食於誰之原乎執事誠已柟死編名司里保副之間讋服犯教之民如驅豺狼柟且為鄉里桃塗獒矣若不獲命願賜徒配逺放焉處都會監門持戟禁呵國之姦細柟殆亦為要路泰阿犀甲堅城方池獒矣抑亦徼惠太公之世得賜流竄荒裔乎抗旌西夏還戌漁陽礪劒飲馬長城之窟使白狼元菟間不復煩朝廷宵旰柟將亦為國之碆盧矰繳藥銛陷穽之利獒矣夫執事憫柟一死聽命以圖事三效此豈獨楚獒被顯惠蒙福澤於頃襄王哉上張鵝山侍御書柟繫獄刑罪深重蹈不測之誅忘日月晦朔之變形貌銷穢伏棘垣而待鈇鍖者於兹七年矣然猶不揣輒上書當道自明以求幸納於速化之域是非獨愛狗馬之命故為是諜諜爾誠以事實極枉議者因緣文致不肯平反即柟生不能辨一日陳尸東市飽鴟鴉豕犬肉滓既化則柟又安得以浮遊魂氣往來於王公大夫之前開口一雪其寃乎由是進退無據慌汗號呼於鼎鑊之間以畢其餘悃而敬聞命於下執事柟聞傳稱舜為天子臯陶為士瞽瞍殺人如之何曰執之而已爾夫瞽瞍天子之父而臯陶執之為能用法焉設使匹夫匹婦罹無妄之刑事可議也情可疑也獻讞之辭不能持其平也則臯陶將惕然弗安若已推而納諸溝中申其誣弛其刑不正其辭不已也然則臯陶何心哉母亦曰法者受之天者也士師者奉天之法以佐天子者也吾執法能無天子之父而不能恤匹夫匹婦之寃敬於大慢於細褻天之法士師之罪為有大焉爾故其言曰天討有罪五刑五用哉又曰與其殺不辜寧失不經是則臯陶而已矣柟為雇工人張杲本家圖死縣官以私怨置之大辟暨柟奏辨下大名張公勘問仍作雇工今大理駁章曰張杲之死似非一人一手所能致恤刑覆勘曰本犯執稱毆死張杲係雇工偷麥堅不輸服是誠其事可議焉矣情可疑焉矣獻讞之辭不能持其平焉矣設使臯陶見而核之將執其法而遽殺之歟抑亦申其誣弛其刑正其辭而原之歟不然何臯陶嚮昔施於匹夫匹婦者今獨薄之於柟是豈士師有二法乎哉或詰之曰子言誠似矣然子文案連抱窮年之獄孰肯忘上下之嫌孑立以救子哉柟曰不然獄文誠無所疑在所不宜開苟有所疑雖百世之下猶或非之况乎數年之事是非之公尚可問之三代直道之民也邪昔者梁人有繼母殺其父者而其子殺之有司斷以大逆孔季彥救之而免南康囚法不當決監司欲誅之周茂叔擲板於地將棄官歸而卒全其人是二公者浩然之氣直塞天地故於今不衰焉邇年巡按胡公按郡諸公救柟曰寃胡公曰此卒不可殺以待來年察院爾柟愚雖不見明然感天地覆載之恩者未嘗不耿耿於懷也何獨私念孔季彥周茂叔云執事盛德遺愛流布魏郡南鄙之民被照臨者仰如天日柟固竊處圜墻恆切𠂻私孤子之望父慈女之慕母不啻過也緣執事在古臯陶之位故柟得以臯陶之説進輒復忘其臭穢敢獻俚辭文四篇雜體詩四十七首略抒寃𠂻唯執事埀察幸甚幸甚與耿忠菴進士書孟冬十六日臺人某來揖司圜氏曰汝為我語盧柟屬者進士耿公過濬􅓪訪而寃狀曲埀愍痛諸所云要旨謂斯世縉紳元老諸公憐而狗馬文辭早晚消息得原報柟愚聞此伏地叩頭泣血下曰柟不肖弗遵師訓蹈履乖妄鬼神恫怒橫被譴厲疾首圜門抱不測之誅為名教所不齒者於兹八年今耿公乘驛傳未遑稅鞅遽賜問一囚抑不知柟以何因緣得見幸如此然柟知有所感矣請敬陳之夫天地萬物交錯水火相薄精氣感通象類流動各以召應故易曰寂然不動感而遂通天下之故樂記曰感於物而動故形於聲夫感通固神化之能妙用符契之機也獨無觀於會稽之山夏后氏之穴焉爾乎豅谾㟏岈寥乎其深虛也不知夫地氣至則泄靈祲出雲霧變化虬蟉盤旋如車蓋旗幟盡幻怪於山谷之間嚮之靜淵者轉而制然軼蕩也夫夏后氏之穴其感之微者也因是知豐山有九鐘焉邈綿曠漠偊乎其塊獨也不知夫霜降氣凝轟闐雷觸天然自鳴於大荒之野朝遊乎瓦礫夕諧音乎玉磬轉移之間比於師曠之耳夫豐山之鐘其感之微者也因是知沙丘有􅜈鳥焉秋深蟄籋口向宿不知春社既臨倏然竊罘罳入華屋少出於珍竒花木之間泠然而乘清風飄搖乎太清雖有碆盧矰繳之施弋人將弗加乎其上矣夫沙丘􅜈鳥其感之微者也因是知燕臣鄒衍緤頸繫獄頽乎其刀鋸之胔鼎鑊之胾也不知夫昭王感吁霜之事按劍解顔尊為上客卒之推運五德談天地四海九州之蘊吹陰谷之律使五榖繁殖夜為虜晝為賓夫燕臣鄒衍其感之最著然尚違逺而難言也因是知今日之事柟嘗受誣大辟伏金索貫三木與盜賊妃伍惘乎自分為天下大僇也不知夫耿公方受命南還揭旌黎侯之國而威馳乎燕趙之外觸臭類存寃儽令柟違去塗炭存先祖祀畢少壯之志雪一劍之耻然後仆質橫分以身首謝士夫即柟瞑目而耿公之德已塞乎天壤矣夫柟囚居九幽之地有內死之心無外望圖生之意臺人云云蓋耿公感之以天也而僕長跪逺謝動之以人也夫積誠弗竭則著之言辭言辭之不足則攄之以為文孔子曰言之無文行之不逺謹以荒疏并舊作四賦十册敬上伏唯高明埀覽焉柟頓首頓首上眺春陵內翰書前五月內節判馮公來署濬事之三日臨獄閲囚出明公所示手書文采巨麗懇惻過甚皎乎如春陽溫乎如挾纊既枯之骨勃然復興此誠造化生育萬物之私非世俗偶然一得之效也柟愚不勝愴恨伏念五六日抵於旬月精爽淪喪慌恍如失東望稽顙渺無涯涘竊唯載古在昔賢豪之士顯於側陋若侯生見顧於夷門馮諼蒙任於薛邸毛遂脫頴於趙庭薛公納眷於旅次是皆感會風雲遭際世運適見龍之時而受知於大人者也繼兹以往世道交喪玄纁蒼璧之儀加於世胄丹書赤訓之章不出侯門陳平之巷絶長者之車韓康之廬乏束帛之戔過此而言取士於管庫魚鹽之間者吾未之見也矧夫弗潔之囚三木囊頭長錮犴獄者哉夫虎豹之皮人取其文而或畏其凶犀象之骨人愛其材而或惡其穢是非虎豹之罪皮與骨固足以厚人之疑也柟以傭奴故致晉師三豕之疑涉樂正夔一足之誤陷法象之地備搒楚之辱殫周勃之金嘔條侯之血蟣蝨生於肘腋胼垢長於肌膚縣衣如鶉結髮如繭節屆暮秋獄草委歇仰視鴻鴈嗈嗈南翔思欲振羲和之轡頓大龍之首折若華於陽渚躡倒景於崦嵫天路永遐喟言莫升神往形留我勞如何昔嵇康以忤權而臨刑蔡雍以浩嘆而當僇陸機以膺譖而致命禰衡以抗俗而膏鉞此數君子者功成行著生則縣名於霄漢死則埀芳於竹帛長逝瞑目夫復何恨哉若柟讀書幾三十年叨光於禮樂之域獵芳於詞翰之林上不能效駑蹇之力於當代下不能立清修之譽於鄉閭徒以曽參殺人之謬與盜跖聨頸而死嗟乎人生至此能不悲哉顧念形影實知凶穢柟竊自分當為世所棄又安敢蓄不訾之懷望大君子收恤明公道塞二儀光照四海奎璧之章格於上下鸞龍之文奮乎逺邇將使徐陳奉轡應劉扶轂屈原擁篲於前子雲擔簦於後此足以徴明公天挺之聰顯昭代人文之盛矣今上注意翰藻明公制作實回聖眷雖漢儒白虎石渠之遇蔑以踰此夫盛德顯位巍巍如彼令聞廣譽赫赫如此然猶投人夜光徼福囚虜慰寃魂於梧丘解二負於石室埀太息於幽垣示昭曠於天下孟嘗平原信陵諸君號稱下士未易幾此柟感恩無地敬敷委曲臨紙抆涕痛深心骨唯不惜帷蓋終惠犬馬益幸與孟龍川書龍川執事莊周稱膏以明自銷漆以用而割樗櫟之材以癰瘇不適用而壽竊嘗笑此語為不關世故墮四體偶稿木土石能言誤斯世而已及觀夏商末主殺龍逢囚箕子刳王子比干彼三賢者視死如往明惟恐其不銷也用惟恐其不割也未嘗假以癰腫不適用而壽則信乎周言果為過論也夫龍逢箕子王子比干樂然而死者其道誠有所重故生而有不用爾曩使苟於殺身無關綱常倫理之道此與匹夫匹婦自縊於溝壑同彼三賢者尚肯銷其明割其用潰其癰瘇徒適用而弗壽邪然則周之言或有可取歟今有人薦高第職在司諫或監察御史給事中官犯顔直諫膏身鈇鉞與龍逢箕子王子比干遊則亦何恨於死也若乃讀書行道身未荷人之祿手無析人之圭徒以讐者文致矯誣銜寃抑負明刑與一切盜賊姦宄無賴之徒同斃抑安得不有感於莊周云僕繫獄事本末執事悉僃而我盧氏在濬世世業農無公卿朝士大夫顯貴故僕得罪後無一人肯援手者而僕亦不敢出私怨言分定故也假若趙盾受械狐偃當僇柳下惠城旦子臧季札充匠作子産季良叔孫豹石碏擬流竄有力者坐笑而觀之彼數君子者能無怨乎哉夫其怨者戚之也不怨者疏之也戚之故民無所不致其愛也疏之故怨而有所不屑也奚若是分定故而已矣今世大人君子有能興哀於不報之地僕得末減遠徙邊塞汚沙漠血刃死為國殤雖未能從龍逢箕子王子比干遊比之徒死圜墻無分毫效力當代者不亦逺乎哉私念至是前莊周所謂愛其明惜其用守癰瘇無用而竊壽者僕誠無取焉執事以為何如屬者聞執事於王四府耿進士前極稱僕見誣狀又出所作四賦塵上此造化生物之妙也銘刻銘刻持奉滕王閣圖乃正德間山東馬生手所摹者尤工緻其畫額記中語率僕宇言執事一一詳之始見不知其肯為僕一雪涕否也令器朔平華平俱才識高邁恨不能相見語唯執事善教不枉其材幸甚與王鳳洲郎中書柟負質犬馬不能操執有所自立中風狂走傾跌溪險釁沴所積卒與禍會往年謝逸人四溟狀柟寃誣明公哀其侗愚為柟白請上官蠲出埀死之齒既又為之詩以志喜音節愷亮寄情悽惋真可以借金石感鬼神令人讀之嘔􅀈心腎流涕埀血無已也柟承此北嚮叩頭不勝恍恨竊謂柟刑僇小人未嘗接侍大君子顔範而荷眷如此獨以往時犴狴森密無由裁報中心愴熱忽忽彌年今始脫刑網伏迹茅茨將飾固陋之愚欵則辭蹇而瀆聽鉗口是尚甚非仰答鴻鈞播物之義故敢略陳微悃唯高明採察柟家世農畝無王侯卿相之貴鮮氣熖薰灼之勢繩樞瓦缶長大子孫獨柟顓蒙厠諸生講席會不能以此時對揚三䇿上輔明主又不能資藉夙儒鑒視已之毫髮恣睢傲物獲罪上下斯已自分投迹豺虎矣庚子嵗傭奴狗盜本家排塌巖墻撲死時賢不察置柟極刑囊首鉗足囚鞠幽室惡吏好貨搒楚毒至吞聲飲血苟活於溺溷之中者十二年焉夫柟始之以嫚􅀈之罪繼之以殞軀之禍濬之父兄信雖仁賢見柟如是固己視為螻蟻之肉而柟豈望全其首領復拜祖宗之墳墓乎明府小峯陸公蒞政之初篤察寃抑為柟平反窮辭極力於臺憲之際然後氛霧再廓天日迭見嗟乎時既逝矣魄既澌矣忽焉來復此何世矣所恨二親並暴二子同喪終天永訣弗克臨葬出獄之日託迹閭閻偃仰穴豂傍徨四壁臨日顧影悄然傷魂焭熒之思勞積曷已昔楊子幼既貶斥謂小人全軀悅以忘罪彼特以荒淫自娛良未極夫此爾嵗凶濬邑猶甚柟妻女八口親舂粳糢拾鳬茈草根以供煮炊夫數理所不能過者雖大聖亦不克免仲尼天縱至其變也厄於陳蔡矧柟胔胔之末夫復何所云竊又恬於利勢每讀烏倮猗頓傳見其賤市貴販逐倍萬之利輒汗流被靣貴人之門耻為曵裾蓬箔煙囱舉目言笑非唯世之喪柟柟以喪世矣縉紳先生見柟如是哀其窮時時存恤而柟亦逡巡惶惑不敢出見諺曰焚其齒曵其尾伊誰之耻斯柟之謂也抑豫又將何所怨懟柟鄙穢誼不敢以此言進者仰惟明公嘗出柟水火負戴之私切於夢寐其處已行事恆若凛越惟恐不能奉承德意以傷公知人之明惓惓之𠂻冒死上聞外録所作文賦詩共三卷隨楮呈覽乞叱入裁教幸甚幸甚與申洹野書伯樂適燕燕王請見曰燕雖小固冀北天下之馬藪也寡人有馬願先生相之伯樂曰喏燕王召圉人撁上乘以見馬肥而茁潤黃金白璧之光流於月題伯樂曰奴馬飾之爾明日撁中乘以見靡鞭策絶兩銜介睨騰躍而趫齧左右也伯樂曰骭馬不可御爾又明日撁下乘以見溺膠其腹菽汁液其髮骨象崚􅜤進之如有疑也退之如有思也俯而噴仰而鳴若有所言而不能也伯樂改容變色一舉而三失走見王曰臣相馬三日一不中法今見王之下乘夫下乘固天下馬也而王斥之外廄母乃枯之皮毛而不能索馬於牝牡玄黃之外乎燕王曰謹謝客寡人弗識也夫今天下之士華言善服者居上乘奔利據要者居中乘言𠂻行成上微君相之遇下見困於草苴泥塗見惡於鄉里者居下乘足下於貧賤之士則延之於閣賓為上客賜之坐及之話言足下胡不枯之皮毛獨能索士於下乘哉子相士之伯樂矣再上李東岡書柟聞魯使人於宋踰梁父之險捫纎葛陟鴻崖俄而力屈絶投墜大壑中三年飢茹松柏之葉而渴飲霜露吸夜氣風雨之所激射􅚣蛇之所吮齧山精魑魅之所揉捽艱苦殊狀其濵於死者數四矣然其人極聲號呼求救於途旅往來者然皆聞之去而弗顧也間有顧者不過攀危木踐滑苔側身俯首矉視默然駭栗輒引去不救然卒未知其人死與否也明年魯人伐宋攻其城公輸子載修具轒輼器械往過之而其人猶存活力疾呼之不已公輸子埀長綆千仞下飛櫓雲梯以致之其不及崖畔而康居者尋常尺寸之間爾然徽纆中絶愈益墮其人幾死夫然後知命之窮極理數之未至終自恚憤至死而無所仰矣柟嚮昔不遵師訓陋寡聞道瞑行徑趨傾跌殞仆沉居圜墻之中食惡糗糒飲蜇毒之水金鐵鉗其脛蟲蚤蠧其膚寃厲號呼之鬼振於夢寐震嘷哭而望救於世者於兹五年矣然亦有聞之弗顧者有顧之默然駭栗引去者竟未見其能披髮纓冠而往救之者也往年執事自諫垣臨治大名柟竊私心喜之曰李公位隆德盛道光而化普行獨而思淵浩然之氣塞呼天地執造化之契而施再育之恩者此其人矣於是仰首長鳴極其聲而號呼之時御史胡公行郡執事慨然與張公吳公明其寃而抗救之益力雖公輸之救魯使不過若是恩也向使胡公少有察篤天隱之意出柟幽谷隮之崖畔以抒執事一夫不獲之憂抑亦何損於政而乃隳柟淵壑踣躓彌年雖興哀望至竊恐公輸厭聞而長往弗顧令柟陳尸坑谷喂野鼠鴟鴉宗祀滅絶妻妾改醮則先人之柩誰能泚顙睨視覆以一杯之土哉夫柟罪文始末執事已悉今不敢贅但張杲實柟傭人彼家排墻撲死遍體傷痕夫豈柟一人一手所致佐見俱悉苟訊及之其情立見矣今刑部駁章覆勘坐此齟齬乃張公復令濬縣勘問夫積獄既久若使下官奉承刑部風旨羅織成獄是猶重關金墉而固之以鍵又安知死所哉伏唯執事闡公輸之仁哀墜壑之難接之長綆飛櫓雲梯以慰柟極聲嘷呼之望庶使墜者不死葬二親之柩全妻妾之節長育胤嗣以成我執事興滅繼絶之惠柟少長一日畢盡志願執事所賜豈有涯涘哉蠛蠓集卷一
