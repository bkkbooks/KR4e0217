body:
  text: 蠛蠓集巻三明盧柟撰賦幽鞫賦并序盧柟既用事逮繫濬獄與幽囚伍瞀憒迷惑目無日月不知晦朔仰天大息曰嗟乎聖人修身善道立命不貳賢者推運循理以定所天顧柟微𦕈離兹憲網問諸造物而已因作賦以自廣其辭曰帝顓頊之嬋媛兮皇波􅐹乎姬姜儃海岱蜿蜒於北陬兮靈宗嘉牒於范陽雲雷之霮䨴兮踥蹀改此南服淑浚上作甘美兮躡康侯之芳躅皇傑梧董道以迪恵兮母氏靜約而告育曰余夢文杏靃骫於霄漢兮芙蓉曄而尚粹溘焱熖儵而進兮應龍觺觺而下䀣偵蚴虬以舑舕兮頷仡攫而速端億錯措以羣號兮明駓駓而決眥倐恍怳以隕虚兮覺懷妊而因惎余母夜夢此有娠謇余降於衛滸兮㓜好姱而岐嶷岌青雲之偉冠兮挾長劍之陸離朝晞余髮於崑崙兮暮濯足於咸池擥招搖以為袪兮履彗星以為綦余長喟其歴之未瑰兮勔修余之菲芳裁薜荔以為衣兮衷芙蓉之翠裳集若􅉅以為藉兮糅杜蘅以為粻揭旌於蘭臯兮税駕乎芳之塘余迅淢靸以髙舉兮汩鎩翮而顛隕謂曾參之殺人兮談市虎而成愪蒼蠅習習其貝錦兮魚目敓明月之璀璨嫫母憗以姱嫚兮擯西施之頩娩而自眴蝮虺侁侁於几筵兮戈鋋森森以剚余目既阨余之瘁廲兮又囏之以􅎂拲低曼睩彼狴犴兮桀血齗而封矚窅闐怒以蹲踞兮視將躨跜而矯鵠檻樛􅔒以黝軋兮棟倔蠖而黶翳縲纚纚於伏棧以苦余兮仍反接而窘臂耳嘈嘈若有聞兮何迍迴而怫㥜目烱烱以或見兮佇鏗勿而復瞶神軼氛曶曶以􅚡瀁兮精憧憧而往來覺塊然滯此一方兮心􅓥􅓥而增哀鼷鼠淫喔以嚙余髮兮魑魅含睇而毰毸傫㗊㗊相喃以對泣兮禦糾糾而呵護般逮余兮紛豗繄鵬鳥之巢蚊睫兮焉能戢此軀也枕雕虎以燕憩兮又誰知不我虞也悲時晷之遄邁兮曜靈忽其西藏微霜淪而下降兮恐瑤草之不芳髙馳志乎雲中兮椉精氣而相佯王喬衙衙而弗顧兮赤松告余又荒唐行偊偊獨日暮兮安放乎不死之鄉横衝波而微舟楫兮天吳搖首而振怒歴泰山之坎軻兮魍魎絞盼以當路猨狄蹇以在柙兮雖輕捷其焉去鳯凰之罹罻羅兮縳茇茇之華羽抱鬱軫以顝處兮呼蒼天以為直戒五嶽與嚮服兮禆河海使聽殛咎繇逺以不聞兮𤣥武違而莫惻何羣神之豐豐兮靈炳燿而罔恤夫余既不能蟬蛻於兹蕪穢兮𦕈椉風而長鶩心結思於大荒兮魂焭焭而上度澂青雲之霏霏兮飄風回而霽霧載玉女於後乗兮飭豐霳以先路羲和儼以驂椉兮望舒翥而儆御征輕輬之闐闐兮八鸞鏘鏘以迥步承雲霓之氛靄兮靈旂繽紛蟉虬乎翠羽挹朝霞以為飡兮吸沆瀣之精英漱華池之飛泉兮聆鈞天於帝庭素女涕泣以淋浪兮間縆瑟而咿嚶虙妃欷歔以結軫兮潛咨語而沉情余凌軯虚而佚蕩兮將擥結乎三光撰余轡而馳騁兮問元化於勾芒採三秀兮眺瀛洲之微茫弭余節兮聊解珮乎扶桑睇南州以凌厲兮嘉桂樹之叢叢召風伯以驅燠兮謁炎帝於清宫何蒼梧之蘙靄兮重華穆以揚靈湘密鱗而㵾瀼兮二妃胡為而弗從決白門以西望兮覿蓐收於金樞氣澔澔以莽矌兮薄晻􅀈而誰須觴王母之仙姝兮挾瑤池之芳都指玉勝以為約兮歌白雲以相愉荃既媂余以好艾兮絶弱水而進輅齊玉轂之磤磤兮指寒門而並騖軼鐘山之幽黦兮令照之以燭龍召𤣥武為備禦兮勾辰翼乎紫宫託鷖鳥為之先後兮問太乙之繚垣靈剡剡以黝約兮鳯凰承旂而飛軒雷師碨􅓓轟􅐀以震盪兮烈缺傓爍而施鞭護屭屓以揕余兮闐咤噁而俾還卒攬涕反此舊都兮潔筵篿從卜乎巫咸曰天地無隘兮物無終始變化互渝兮斡流遷徙形氣轉薄兮或浮而沉造化沕穆兮禍福無門聿性命之難言兮誰知其極萬物糾以雰盪兮又安所止息惟大人齊物我兮以天地為廬舎總山川於毛髮兮騎日月以為馬夫有虞之潛歴阪兮當厯數之在躬夏后胼胝而陟大寳兮季有光於黄熊震龍漦而夏櫝兮顧駕禍於周庭白魚躍以膺大命兮劉氏顯而有功奚五羊以自鬻兮由余振於西戎尚鼓刀於海濱兮仲父射鈎而桓榮仲連談笑以却嬴兮胥重繭而存楚條相后而餓死兮贊搖筆以光輔墨不黔以衛道兮孔轍旋而微伍光狷介以自湛兮夷顑頷而振古夫道固無涯涘兮行焉知其所如惟恬澹與寂寞兮斯貞人之攸居從委命而椉流兮遊寥廓之鄉忽喪我而無是兮觀泰初之茫茫余託蜉蝣與遊兮曾日月之徜徉忽歸魄於𤣥壤兮又何足傷勉修余之俶服兮珮芳澤之幽蘭紉揭車之落英兮襞江籬與射干飾翡翠而綴珠被兮爛的皪而芊眠組綺縞而飄颺兮下結之以雙璠余嫓美而自鑑兮何媒妁之可攀夫君眩而弗御兮亦余心之㛹嬛系曰天地緼綸何時明我欲見之心徬徨輾轉懷憂秪自傷超軼絶世窮大荒帝極洪洞不可量緘悲歸來卜巫陽勵志肥遯含大章獲我所思樂無疆放招賦盧柟繫獄三年形容枯槁智慮殙惄若就死亡太卜巫彭往見之曰聖人慮事逺而識見明夫子懷志㥵憊魂魄滑異實之弗招迨就之替恐不能渡諸技焉盧柟曰楨榦彊固則魂凝精氣専一則神澄余無所用招為巫彭曰夫子孰與屈原踖踖斤斤懕懕揚揚而懷沙湘流窮招弗返􅞁音徒殫思於師陽夫生不用招奄者既遐而後偁衣長嘷宜乎長逝逺瞑與終古而寂寥焉遂大招曰魂兮歸來歸來何為乎舎君之脩幹散而之四方且捐君之先故獨無所徬徨且歸來歸來陽氣雜糅恐君之罹傷且魂兮無東東有巨壑且天吳八首壺鬣血齗且封狐九尾誒笑昻瞠且羿弧狼矢羽日緜淪且魂兮歸來不可為鄰且魂兮無南南有桑氓鑿齒袒操拔釨射蜮是食且俊妻甘淵十日嶤嶷且虦貓交踵儵􅝉千里齧人䶘䶘以舕其䐈且魂兮歸來離此不可測且魂兮無西西方之氣白澔莽曠不可識且吳姖晻昧日月所翳且黑水淵潫𣺌茫淠潏且女丑之尸蒙面竒恠且開明人面瞪視屭屓且蝮蛇侁侁蜼豹是植且蜪犬狺狺從首得噬且招拒是司往恐見癘且魂兮歸來無為逺邁且魂兮無北北方不可言且燭龍長瞑𤣥豹蹲且貳負反縳石室圜且窫窳龍首甘人吞且建木九欘棄繽繙且五榖弗育斵冰飱且魂兮歸來何逡巡且魂兮歸來歸來君無上此穹窿且帝神威昄馳使豐霳且豺身鳥喙被髮􅐢􅐢且巨靈淵目其音若鐘且操啖青蛇蚴蟉絜躬且􅚽㺒逐人不輟明矇且魂兮歸來慎無往從且魂兮歸來歸來君無下此黄壚且羵羊顤顟貪婪若餔且卬鼻血吻九頭殊軀且颿颿猗逐甘㗖顛顱且八柱森挺齧若槁梧且魂兮歸來君何取悇且魂兮歸來憩華夏且羲和儆御望舒䢝且四時軌運交受謝且玉燭均調昭大夜且昌光茀鬱八風華且象緯諧度道光化且魂兮歸來樂無射且山岳盤礴五丘延且隩樞窵窅汍流泉且巉翠漣漪兢秀先且偓佺隠淪往來間且瓊英玉津碧藍田且遐探掄採茹延年且琦環呈露俟嬉惓且魂兮歸來都便閒且神州華域瀰宇宙且伏后姒姓歴帝胄且朝市勔面宫殿湊且冕旒黼扆綦㑹秀且紘紞藻繂文數有且杠髙九仞􅀈羽翏且熊虎翬畫擁先後且三圭侯威神搆且獻法惟寛流澤懋且天徳離照多善宥且魂兮歸來美休遘且豕韋東壁康侯神且浚宫有嚴次龍鱗且户牖閒静媰嶙峋且魂兮歸來䁥親臣且夏屋阿閣抗虹梁且旋室㛹娟飾璧璫且三階平墄黝堊章且方連罘罳繚金綱且玉女牽牛闚緅窻且偃仰儼雅交佩纕且蘭風靡離浥蕙光且曲屏雕疏被芬香且朱繰䵋潔畫長廊且圗繪譎佹嬌飄揚且礱熏珠箔鴧翠翹且碧瓐緡縣熠琳璙且金缸銜壁幪絳綃且象俎玉樓蒻組繡且綺縞繽紛羅幬髙且珠被的皪綴瓊瑤且隋侯夜光蘭燭華且炯開洞房徴女娃且分曹代御靚婉娥且周鄭豔女粲芬葩且長若落英艾鬖髿且纎紈綺縠嫮以姱且調中易心都其可嘉且肌理膩靡柔恵婉且靨輔具齒宜笑嫣且蛾眉聨婘目光爛且長袖善翳恵音歎且曼睞微波流視盼且精彩神授志彌孌且琦姿艷逸殊瑰變且揚詩約禮靖不亂且離宫别館侍君之宴且桂區蘭畹密彤闈且繚簷鬬楶盤雲螭且穹臺倚榭鑿方池且碕礒小山扈溶涯且芳若射干施葳㽔且毗衃芙蓉縁波湄且文鯊赤鯉從塘陂且瓊簪珠級連姝麗且椉茵步輦極游嬉且魂兮歸來無久違且庖廪肆事殽饌盈且黍稷䴾麥剉香稉且秦薤蜀葵吳鹽蒸且越橘甘酸孴榛蔆且苦醢鹹酸八物豐且胾脯靡鑿膾彌精且駞峰熊蹻薑芷馨且胹獖炮麛桂椒行且鰋鮪鱧膽爚鵠鶊且鮮鸐臑鼈膳鉶羮且五齊三臡羞豆腥且酪澤蘇膩歠脂瑩且罍樽刻鏤雲氣縈且玉酒㶑灧九醖清且靈和希液夏凝冰且瑤酌芳潔娛協情且歸來故塾媮樂有寧且西清東序列巨虡且應􅉧摶拊考鏞鼓且倕鐘句聲塤箎敔且雲門五莖蹈大武且大雅既希鄭衛陳且女樂駢進簇巾綸且新聲絶妙窮徴音且激楚結風陽阿繁且美人半醉色靡徴且明眸皓齒揚朱脣且目略微眄遺精神且竒服交璫望之若雲且二八鴈次舉趙舞且颯㧺鵠驚鶣􅝎下且凌厲赴節動媚嫵且竽瑟闐奏枹鳴鼓且羽綸鱗回絙雙廡且吳歈宋音遞綿縷且危筵離徹藉氍毹且促觴交膝墮簮襦且沈湎繼夜勞珍厨且醁酩解酲戯侏儒且㠌􅀈鷸眈詭覬覦且鞮鞻韋靺儀林胡且躡銛蹋䰝縁都盧且娛酒既終步櫩衢且周覽岐視聊踟躇且攄翰撰思文璠璵且同抒賦歌畢歡娛且魂兮歸來恣所圖且瓊轂翠衡駟六䮥且旌斿承雲建格澤且貔貅擁趨桓輝赫且弧旌枉矢載鷹猲且罘罝遒被㚋逺獵且八陵十藪虞羽骼且麒麟驨虪伏圜柵且鋋連騊駼蹂貙貘且鳯凰鷟鵠鷆鴻􅫫且鷫鸘鵾鳴幪媁嫿且夐搜摭逐彌平陌且血輪割鮮多躪躒且游戯倦􅓈言旋宫且較施創刃招友朋且重觥錯几張華燈且伐鼓闛鞳鏗石鐘且絶夜連曙嘯歌􅀈且樗蒲角巧有瑤枰且象杯犀齒五木行且一呼十盧射先名且剝柏踔踸白日窮且懷思長鑠夀岡陵且魂兮歸來永安貞且淫佚縱度賢聖嫌且周穆八駿康遊畋且有窮不軌譊隕顛且肉林酒池商辛殱且惛鑑不逺魂匪湛且三后五帝憲章㢘且盛徳昭屇四海圜且馨香至道徹九天且丘索墳典載籍馣且禮樂苑囿文治淵且魂兮歸來端視瞻且亂曰青陽攬轡兮萬物發生桃李灼華兮芳杜蘅懷君之故兮超慌惚游覽髙舉兮窮淹沬蒼螭駟駕兮杠虹旗飄風往迎兮君不來魍魎睢嘯兮從後先被服薜荔兮飲石泉松篁叢靄兮杳不見天背行誘驟兮駞堂隍周游上下兮歸故鄉若木敷華兮翳陽靈白露瀼浩兮臯蘭辭榮時不可再兮日蹉跎鴻鴈嗈嗈兮水揚波崇期恢曠兮芳草茵方軌結騖兮車轔轔衛之滸兮伾之南雲溶溶兮發澄潭睎靈駕兮步晴嵐魂兮歸來胥盤桓惜毁賦太隂為室兮叢棧昏𤣥雲黮䨴兮殺氣淪䕫魍盱笑兮鬼啾啾鼯䑕呻吟兮虺蛇蟉蟣蝨鱗鱗兮被髮鬤精淫恍惚兮軼上蒼聖澤霈兮澧澧周道砥兮有枰狡童兮輕佻駞陂陁兮逍遙倀兮趫志驕蹇越荒唐兮華淟涊恫兮顓頑兮棄鵷鸞竒鵩􅒗鶬兮從嬉攀網罝繞被兮矰機綸捆徽纆窘觸兮殷憂結軫禍延考妣兮童穉離隕室家丘墟兮茀靃茷隠寘身圜牆兮𤣥夜長虹霓為孽兮日無光痛哭旻昊兮結愲招帝閽兮𦕈沬般自列兮莫聞痛際天兮我柏往者逝兮匪追淑將來兮安宅檻虎豹兮熊羆文威絶兮孰所為憲皇網兮寃頸反舊鄉兮何期山巃嵸兮緑桂枝禽獸號兮猿猨啼羈縻兮離憂𦍑長苦兮物類我思秋賦楚襄王與宋玉游於雲夢之臺舍蘭臺之館浮漢沔略江潭射楊林眺蒙山游旌蜿蟺法象緯嫿輝䕃三湘氣彌七澤猗蘭幽以承珮芳桂逺而延軛輦瑶華之繽紛翔翠羽之鶣􅀈於時涼月懸珪白露凝輝寒風鳴條微霜霑衣宵霧靄兮逺山崟暮煙横兮長河湄王迺抽牘揄翰以命宋玉曰疇昔雲夢之遊子大夫為寡人賦髙唐未及蘭臺之駕子大夫為寡人賦雄風方今日馳虞淵鶗鴂先鳴汘漫淒漺無以攄情子大夫未有説乎願為寡人賦之宋玉於是逡巡改容釋位離次跪而稱賦曰臣聞天地無閡乾坤斥衍剛柔沓分時序交禪春華發榮秋實振晏其為體也博確鴻固専翕㢘凝收歛象類參伍元英乾健不息弼成罔極上備天道下全王徳秋之時義大矣哉夫其朱明既退招拒斯昻蓐收弭盖少臯弛裝闢白門肅金方韜炎飇激清商焦溪涸而不流沸潭潛而弗揚爾其為氣也氤氲膠戾濞􅞡頽隤蓊翳綸􅌲掣蹠礴霈噏噏忽忽撞搪􅐀磥若迺觸土囊汙汚之口噭大水圈枅之竅熛厲叱嗃迴戯突嘯耾勃碭駭踾踧攅號倐拂改節和喁稍嘈崪兮若促絃柱而摛筝􅌙迤兮若逸擠攃而鳴塤囂絪緼窳圔横酸鬱陶爾其為容也澹淡晻曀皓暠曭㬒斥坱􅀈漫廓落鴻敞荒裔凌厲上下䆲䆡黤靄轉薄游氛軼蕩紛態横出蕰掁惘蕭瑟寂寥恫恨㦧悽孤臣孽子遷客棄婦莫不感心傷氣流涕増欷爾其童濯崯巘分披嵓􅀢䟽離案衍宣回㟼壑泐岸崢嶸羣山肅索劉厲彌平寂寥空䁨於是清𤣥海落長江抑舄澤熒扶桑潛渫浡潏密鱗漰瀼霜凝龍窟霰落鼉房鮫人泣珠海童滅光陽侯馮夷天吳􅀈像魂銷魄揚率悉愴怳若迺芟縻淼蔚泬寥林䧜隳葩榙􅭭伐萌沙橖繫精於松檜之林獵芳於桂椒之圃被杜若委庭蘭蒙江蘺夷射于翠葉紫莖朱萼秀華隨風振綺應日傾葩於是鴈遊江浦雀流海濱燕歸𤣥穴蟬寂窮林蟋蟀宵征鵾鷄夜吟隂凝氣萬物凋瘁倘有后敜後時削跡未逮披零雹衝凍􅀢拆跂裂吻而死者不可稱計若夫志士坎壈中人薄寒蹇産淹留感時增歎惻擴迮節忿瞀溷慁憭慓於邑絓結弗變此夫閉藏萬有撙節造化忌盛憂滿唯秋之謝王迺乗戎輅載素旂服白玉駟雲螭居明堂命將帥誅暴慢明好惡嚴斷刑脩法制繕囹圄决訟獄感氣順化應時承治所以張弛乎仁義之道彌縫乎禮樂之文於是東漸西被恩殫無垠脩臂鑿齒之邦結胷驩頭之民幪鳯凰箱麒麟縶猛獸籠文禽薦上國充珍肆於昭聿皇萬萬嵗天目山賦為孝豐封君南山吳公作吳王夫差畋於具區之野王孫彌庸驂乗大夫申叔儀御王望見天目之觀嶻㠔嵭嵣會凌雲橈茀鬱輪囷薄乎中霄王命彌庸眡之對曰兹所謂靈祲也王曰靈祲何如彌庸曰昔禹封九山含精畜雲觸石吐氣湠漫龍鱗蜿兮獨上剡兮阤崺紛紛紜紜莫知所以爾迺滋草木旅禽獸㚇僪恠填珍媾駢田隠爚萬物弸薈疇昔之見無迺近是於時申叔儀進曰大王察彌庸所稱纎懱參離巨體􅀈戾可謂㪺造化之渣滓而瞢於盛徳之符契者矣且夫維揚之澳碩人焱起翩兮若威鳯苞彩翔秋旻矯兮若游龍凌倒景昇河津皢兮如日渥兮如雲變化無方孰者為隣伯啓毓於竒石傅説騎乎箕尾兹山所以發精於哲耄作鎮於江汜若夫摭草菹之見頰舌之談臣雖仳陋荒所不敢聞也王曰願為寡人賦之叔儀曰唯唯惟吳后嚳兹夐壤兮嬃女􅀢其岑隈竦挑陗之􅳮嶽兮遼萖􅀈乎卭崍陟翠微以媻姍兮徑造天之崛岉踞虎豹而􅀈𦕈兮紽衆山之蔚㠥礹嶠􅀈􅀈之跟蹡兮峘矍矍而掩襲馺沇沇以轥轢兮巨石嶄嶄之獝􅞡南嶼屼嶁横山嶢嶢靈岩玉華鬱律崒岪嵾嵳波􅀈撣援獠􅚽碞洞嶰澮穵豁􅀈豂􅀈谺沕霩劫牾佹􅀈傾﨑崯􅠈䃒磷礨脽礐䠥􅍷譠􅀈隤靡横遌蹠盭彳亍拉拕睢洟蹲鴟噦霍山下還眺層巒㦽何煙煙雲霞濛澒崝嵤天霄㶀㵧宗􅢏霼靉澹􅡰乗風瀟捎􅀈如嘼擾冋若禽翺目不轉睞豔彩四暢滲淫離褷莫能形狀瀑㳍傍涌離潭瀐龍湫荻浦靈溪磢踖淈乎混流汜濫蹻􅀈蹶﨑石觸唐㟿潏乎湓怒洶浻澎㶖㳷㶒􅀈犺齧騰􅙟漺澇解䠶横流紛霈潼沫髙厲皤如白馬偃絀羽葢䖤僤咈喟汩汩去瀨憑陵磒壑碓投靁􅐀䂹硞潾隠砅轟訇湱滮滮泧泧潗㵫灊鏏枝洔蹇産􅀈􅡶漂駛淼茫逺輸紆餘東逝永辭天墟漭沆潒瀁安節長浮渨濥瀹瀦為後湖於是水蟲恠錯暴於洲渚黿鼉蟾蜍鱖鰻􅢵鯉鮫人淵客呀呷齟齬魂魂鱗鱗踏遝傍仵珍水敷榮璘豳叢生琅玕翠蒨珊瑚赩呈偃仰岐眄中搖目精灌林葱薉葩華掩㑹糾枝龓房㯅㯕砢儡仳離􅅋骫風流䁆藹隨波潭沲婀娜芔芾浥彩翠霞吸精沆瀣纎柯嚶吟颼瀏慷嘅緸寃隕抑或象笙籟尋變馳險八風肺沛馮虚聴響使人心憒麛􅡐貜父狖蜼猓然貙獌魋榖獑胡㹪蝯獜齗坐嘯裂眥互瞮驚透護略冪歴半㪚超巉巗騰陭岸捷䝉茸懸絶澗羣獪狡健燦兮若浮雲曾不可稱算周覽堂密隒隩瀰陁芳草靡施秋蘭蘼蕪唐蒙留夷鳶尾胡繩楚蘅江蘺谸谸絢絢茻茻萋萋肸蠁闇薆芬馥棃披鷦􅀈羣遊蹷揚躽翼瞵視嘲咋毰毸藻臆鷸子鵹黄鸕諸鶗鴂戴鵀石鳥鸒斯蒼鴰翬㪚陸離戯游山岊若夫琛希之賂金鑛涵朴雲精爥光瓊支昭華璇英白珩藍田縹碧赤霞流黄㟪磈山谷衍溢陂䧜碕岸不枯林藪輝潤滋液􅀈㵝光彩䗲煴於是乎嶽靈擁畤川后聮蜷百神焱雧儇儇燀燀泰乙薦鴻祗御蜚㢘翔蚩尤騖靡蜺旌駞翠輅飈旋電掣陽嘘隂沍煜奕偨俿萃於豐處瞗秀􅀈竒亶徹顯老瓌琦偉長雙顴日表方瞳星爛鮐姿雲裊宏懿儼雅俶儻要藐佪翔於道徳之林獵弋乎神明之囿覽觀九族之有亡與閭閻之變態錫羨餘恤不逮繕橋梁虞婚配裕後昆揚昭代金紫璧耀冠盖雲屯擬跡萬石越彩入閩然後肆志乎游覽履巍巍涉漫漫坐穹石揮五絃舞白鶴泣𤣥猿曳緑卭之杖踐赤玉之舄浩浩乎葛天氏之唱偓佺負局羨門安期或命石髓或翳紫芝相徉於洪崖之涯洪河清昌光鬱麒麟游鳯凰至蓂莢生黄龍戯泰華砥崿衡霍增靧風雲交通皷舞忭㑹信壯乎天目之大享靈長於億萬嵗酬徳賦并序昔謝宣城作酬徳賦以報沈侯彼特腴風雅之賞嚭國士之眷爾柟自庚子嵗被誣繫獄十年餘自分朽髊永絶人世趙王殿下憫然鋟柟四賦灑以睿藻用雪梧臺之寃壬子冬柟既以上命平反迺如趙朝謝王哀其窮錫之珍饌肉藥寵龍渙瀚天日疊耀方之宣城所感為徳何如然神以理超情以文遣匪辭之麗斯焉取酬於是因謝名篇聊著鄙賦其辭曰唯岯岑之培塿兮黎水淆而停秋淑氣殫以渧􅀈兮諒非𦙍之多尤羾蠛蠓之微姿兮顧厲響而長浮爾迺嵗既暮時將竭寒螿鳴流芳歇搖落洲渚泬􅢏丘樊千里直視黯然銷䰟情感鵾鷄愁凄斷猿悵氛濁之褊狹馳清想於天􅀈慨夸父之鄧林吊燭龍於崑崙緤余馬兮扶桑枝涉余轊兮桂水湍拾江妃之明璫跨湘靈之翠鑾於是嵓巘互起江河横變封豕卧啼雄虺坐眄夙露傷足晨風瘁骭汩海濟以傾檝歘凌風而鍜翰豈蒼蠅之㸃玉實萋菲之交煽囚圜土兮曵長纓俛寃頸兮泣吞聲仰飛鳥兮不可攀思日月兮何時明嘉虞卿之撰籍希黄覇之授經簡一閱而三嘆䰟竟夕以九升志沉緬以鬱陶氣於邑而填膺揮思彤管裂衷竹素秋澁就章風謠託賦信隂陽之迭運韙虧盈之無愆將長號於帝閽賴造始於英藩偉神聖之授彩播天人之名篇涆瀝液以淫灕紛藻潤而芳姸振金碧之琳琅炤丹雘之㻞斕羌雲涌以霞駁倐龍變而鳥騫皎若凌天河窺織女雲漢之章鏘若升清廟聆師㳙洞瑟之絃隮末伎於何李藉隆譽於謝田翼二京之可紹埒三都之並翾警司命之炯㫖欵士師之酸言爾迺聲流臣工華照八表市虎解䜛亭姬雪慘返景崦嵫合劒龍沼起灰骴兮發夜臺披雲霧兮天門開攬衣帶兮非疇昔聊躑躅兮心䰟哀於是緩貳負之虐械啓華表之靈思雖城廓其如故已人民之半非陟北堂以傍偟痛考妣之先違二稚逝以如往一女殞而方歸彼蓬婦之苟活亦老醜而堪悲涉園亭以凝眺見蒹葭之蒼蒼橋偃蹇以斷石壁陊阤而横窓雲幽咽於翠岫葉蕭瑟於銀牀瑶草委兮菸壑桂枝凋兮垂牆望佳人兮不還嵗將杪兮怨長於是季冬嚴寒北風騷屑江雲結凍海煙飛雪蒼隼凌颷代馬警節邁世懷賢銜恩赴國仰攀㠝岏俯涉清洌揭閶闔以延佇遵玉階而屏營壁連錢以銜缸牖疏鏤而瑣青爛昭華於東序裊翠葆於西清擬承明之彤廬或鈞天之帝庭冋虬顔之萃渥冠日表之竒熒侍螭頭以陳辭撫龍翼而若驚爾迺玉音綸發神衷璨亮天風四敷春陽疊暢八珍馨流三臡芬颺駞羮已霑鳯炙再貺醴酒陳兮泛翠瀾醉起舞兮嬌朱顔願君王兮恵一見夀千秋兮歌瑶壇精髣髴其如思情邑鬱而弗安步徙倚以􅀈陛涕淋浪而流泉將振翮以遐舉忽掩臆而長嘆𤣥雲鬱以凝盼悲風䬃而無端昔圜門之多險嬰金鐵之拘攣效魑魅之微軀望豺虎之一餐敢謬想於煙闕覽清輝於鳯鸞徳裕命而匪測恩潤身於無埏幸濡翰於蓺圃銜一羽而塞乎巨川迺為之謠曰若有人兮滄海湄吸光景兮馭雲螭時蹇産兮隳淵涯宛將逝兮長離思大人造兮參南離恢寃網兮超塗泥恵芳腆兮恩不訾誠既感兮我心悲揄丹悃兮歴賦詩彌億萬兮英聲垂夀成臯王賦梁孝王讌賓兔園相如在位王授簡於相如曰寡人夀願為我賦之相如避席再拜曰唯唯夫夀天地之希齡大王知夀然未聞王之夀大庶人之夀小也王曰庶人之夀何如對曰庶人凡夥品類各異若夫竒商巨賈征戍之客􅟮工浮游田父跼蹐黄冠𤣥袘緇衣閒適每遇誕期佳思聿興殽酒矜設招致友生縟藻匪施淫碧無傾帷幔起兮露色寒琴調急兮霜華凝曾為歡之㡬何旋紛擾而咿嚶若大王之夀元辰未屇百司豫啓瓊珠之宫金華之里象棲龜屏鸞茵犀几窮竒怪獸含香上馨雲氣四散化為僊靈綺麗慌忽奪人目精於是石渠金馬之士遝坐駢至充乎後庭炮翠麟胹霜鯨宴素日張金燈攘皓腕之鴛袖映繡柱之鴻筝調採菱之艷譜發遏雲之新聲歌曰帝子降兮金井寒集瑶池兮驂白鸞隮遐齡兮千萬嵗與佳人兮長盤桓爾迺分曹投博飛觥舉白促席交膝簮珥狼籍玉衡斜漢金虬水澁然後歛儀肅容悄然言别揚旍離館迴鑾東闕此所謂大王之夀非夫凡氓所得擬也王迺釋位就相如坐以酒觴相如曰寡人之夀若是其大微子之言寡人弗知也是後益親幸以相如為上大夫懷隠賦并序懷隠賦者明處士盧柟之所作也紫泉山人周子棲隠東山岩亭亭峙森邃巉石離樹望之蒼然蟬蜕之士嘗託心於此焉柟久嬰苛䋞沉思泉石於是因山人推尚㳿為斯賦是足貽笑向平云爾辭曰大岯輪􅀈兮冪東郭􅀈嵼岥岮兮深林薄山勢峬峭兮石爭豗谿谷谽砑兮水瀠迴霱雲霏䨸兮觸河隂𣺌茫横被兮張夕岑怊悵無侣兮發嘯音杳然絶響兮肅心魂搆元氣兮為壇葺朝霞兮繚垣􅟨旬始兮結綺疏揉列缺兮縈櫩瑤草兮堂下若華繽紛兮照予天潢兮搖波鸞鳥習進兮日歌以舞山中人兮搴桂枝狎文豹兮旅熊羆踐石梁兮貽所思縣藤千仞兮邈不可期憭兮瑟山圠岉洞嘈嘈兮魂髣髴􅢏兮廓倀兮壑禽嘼軋㰉林􅀈􅯯兮超汗作嶒峵嵺嶋兮磈礧碖碅􅀈齗獝佹兮芔翕粼隠樹沓雜蚴兮㯅㯕􅀈軫蔦蘿施兮􅤝草􅀢藴鷐風鶬􅀈兮怒啼血瞫貜父猿􅎜兮驚透健隕贔沸猋猋兮􅀈􅀈飍飍兮敃敃麋鹿兮豺狼睠顧兮以行嵗暮洋洋兮嗟無聊霜霰下兮北風飀蛟龍逝兮螣蛇遊山中人兮奈何羌長􅀈兮攀桂樹以淹留泰宇賦為孫滑縣作爰有東海大人先生北遊於空同之野返駕於廣陽之丘憩豢龍之館戯靈昌之洲馭輕飈以尚羊兮曳卿雲之煙翽將髙舉以獧騖兮游放志乎天外致明神之澄爽兮乃精一是僾鏡吾之無纎翳兮音穴霛音靈窙音囂􅌄音咬咸萬寂之涸會日月暾昈列宿逶行垂景岑夤荒勿無疆􅀢音瑤歕礴之混􅀈𣺌阬沕以坱圠緬積清之邵亢廓峭音峭㵘音島以旁魄倅翃鱗以㚛音戯浡􅀈音撥蹄髯以逪奭奄靈怪之昆䑄音㑹旅㳷煬以泡燡爾迺前引夀華後蟠燭隂左䕃肝榆右傶鄧林邈釗曠以􅀢㝗離襲馺以􅀈闗音分揭閶闔而曜靈閜蝦上聲營室而僤音突夜光慧譎而㰤苦訝切飛㢘銛列缺而薉豐隆沛詡詡以封􅀈倐煙音公追切煙以􅀈芒闕崑崙而韏古萬切符禺蹶泰戯而掌空桑跪夸父而摍卭崍頸帝囷而俘大逢訝育遺而洗幼海罅虎嫁切鯷壑而􅥼音匣流黄碎五嶽以兑崟瀺􅀈波乎九阬珥明月以為縣􅅋赤霄以為裾沓纁翹而曳虹暈帶貝葉而攝雲霓冠嶄巍而䪑音它虛蹻徑不周以少留浮氣車而逸神馬表乗黄而服駏驉使鉤辰按轡嬃女為之御青龍銜光以燭衛白虎擁鉞而先趨熒惑司法以警道太白斬關而建旟蚩尤之倫璘㻞煥耀以吐煙捷雄㦸而荷垂雲枹雷皷而震天陬檻環拘而踐􅥰圍斮天愚而轢泰鴻齒欽䲹而􅀈音昆略玃䖍山皷而摺計蒙劈巷溏而㨹據比挫陸吾而阤驕蟲抶英招而􅎗列蛸鏺耗􅂒而殊竒􅂒潎匹妙切六合之鴻梫瀉九域之紛洿聆金鐸之磅銀䁈口計切赤舄之委蛇黨姬文而鑑哲髯偕髙密而閑重華祖伊祁而援青陽將栖跡乎黄帝之途優哉游哉嗟吾泰宇歴萬世而誰何水亭賦太原王公好水亭客有美而賦之者曰伊彼翼野參井攸分旁瀀疆㟑峊嶒囷槩泰清浮三淵氛緼鬱律霞駮綺紛㬣曃蔽靄含隂吐陽若鬼若神迺毓岑靈挺休哲擢方英考隠澗石摭幽泉野爰搆水亭汾堤之下傍引濴瀾上䕃菀栁渟泓汳澀緑幄密偶石戸壤父此焉託處若迺春陽告謝朱夏騁途炎飈歘烈􅀈爄熛霞翳羽盖鳴翠騶祥鸞鸑鷟翔乃先驅爾其珍怪琇美沓其阿瑤草翕赩蒙其巔麟角馴擾遊其後龍鯉出没涌其前於是召鴻生延鮯叟陳樂方命罇酒籛鏗辟榖以蟬蛻羨門服氣以蚴虬𤣥鶴二八降乃天隅延頸長鳴飛飜迭擾雲光殊覆赮綵四興紛紛輪輪合遝杳𠖇於是為鳴鶴之歌曰曳僊衣兮何翩􅀈來廣漠兮集層軒夀天老兮歴萬年又歌曰涉沆漭兮緝荷亭覽日月兮東西生鳴鶴且舞兮希泰齡嘉至徳之昭曠應皇運以來臻奠珍璧於清壇薦馨香以攄誠介兹景福緜如岡陵崐崘山人賦粤唯崐崘之墟跨乾樞兮斡不周崪厲萬仞為帝下都羣神旅遊爾其磅唐顤巉岏陗􅀈鬱紆繆泡槩泰清摩赤霄昒昧靄鼆或黯或寥鬼神髣髴莫之能要赤淵繞其南黒水流其西汩滵豗潰觸於窮石放乎海湄迺有星宿之野濫泉之渚渾䑄爛煥雷呴雲擁一㵼萬里蹶䓗嶺縣龍門䶗底柱寖名藩波汰膠迴洑滮􅀈榮光四塞郁郁紛紛靈胥走水蟲喝龍伯翔鮫人竄於是穆王之子感而生焉俶儻綽懿崛竒雲峩目如電光氣若虹霓靜則淵停行即風披孤立長嘯天門洞開迺竦岋雲之冠佩飛景之劒御翠黄之乗詣𤣥英之館命𤣥武以開關兮剉大行伯使當兵轢巷塘之倔獢兮碾礕礰而扑攙搶踐􅖹娸婄奮獵獵之雲旗兮熏池訶䖔􅣔雷皷而撞鴻鐘梁弱水之溺溺兮檻離朱之榮攀玉檻以窺九井兮下無垉而崝嵤涉跡僊圃游目靈岑封巒詭赴離石斜蹲塌疊天頺傺䟷雲崩獸則開明人面殊形九首狡音厖吠豹文純擾鳥則白鶽鳴鸞鳯凰翬鶱蒙綵戴􅀈雝雝嫺嫺瑤碧之草玕琪之樹呈葩露色燦􅀈岡阜凌倒景飡赤霞濯華池戯𤣥洲吾順風以逺馭謇將遊乎汜林誘畢方使先驅兮走蜪犬之狺狺略窮竒以逶迤兮問據比之尸爾胡為乎作神姦夫然後背帝囿緬離侖歴沙棠登玉山於是西王母出而見之觴於瑤池之上獻錦組百純黄玉二㲄毳光散亂奪人心目乃為之謠曰君王八駿馳翠幄白雲在天岡陵出今子千秋尚復來何以贈之黄竹曲穆王之子畣曰嗟予悠逺在東夏山川間之石磊砢吹笙皷簧心苦悲何以報之復而野王母再拜謝穆王之子遂驅升崦嵫山乃紀迹於其石㠠昆山賦并序㠠昆山即古巴嶽也為梁蜀雄鎮俯臨巴江而其上多名觀産僊茅長慶中有服之者輒仙去銅梁張公愛其嵓岫􅳮崿遂自稱為㠠山云夫山川淑氣蜿蟺薈鬱窮極弗勝則鍾之而為人詩曰維嶽降神生甫及申大雅所著於是乎足徴矣公瑰偉魁梧職任簿書才兼藝翰神理清暢妙絶羣倫意者㠠山之秀篤授之公天或動之朕非黙令公取以自謂哉僕不肖偎侍公顔範偃仰締思聊著斯賦下里之音諒見誚於郢匠焉爾其辭曰粤唯㠠山之不可隠彠兮旅億類之鴻紛軼岷漢夐其無儀兮窣浮歊而粼峋道紆回之鬱㠥兮踐危石之嵑岉㒤蟬咺而下闞兮三江分流渱而並入巴流涴灗以回薄兮竟纚山之縞帶汨溭淢其㶏鱗兮􅥁興聲之瀨瀨㵥􅀈􅀈而長􅐹兮􅀈而横厲沬㵿㵿以曾沸兮􅀈轟靐之􅔫􅔫勢觸隩而互踰兮欻㵃漩而引㑹䬍噭呴而澎濞兮㠒抗激於天外􅀢礜㵫㵫之灘􅀈兮波㴸㴸而淪瀾谺曾渾之盤渦兮洪濤倐起而排山氣滃渤以磅礴兮象雰靄之搆天藏靈異之有無兮何變化之可詮傍睞逺視肆於無際下自山崥上干絶巘䃳㠎岥岮峭嶃􅀈嵼盤石􅀈􅀈錯牾還㑹岩巒遝崉􅀢嶷厓隤􅀈㟉離隳迤邐相追狀若禽翺或象嘼舞􅀈􅀈􅀈􅀈拉蹠僂􅀢偨池磒泐增㠅絡繹崆峒蹲猊崐嶁石龜逡巡蒼野出乎其下􅋂㟲崯巖郁郁芊芊截如雄虹舕壑飲川俯瞰澗底窅㝠䵝沕長風中號􅂒􅂒蕭瑟虧岸瀺瀺􅀈􅀈鳥翐屏營超忽慓魄爽魂令人煩憋不可具論膚寸之間雲氣歘起變態横生輈張徙倚紛紛輪輪若降於天若麗於人視為旌旃舛即麒麟幻怪百出伊孰與隣爰有崑崙靈室谽􅀈屈􅒸洞天勿密㳙滴成響燥熱生凓蒼玉磥砢僊茅葱蒨駢闐翳靄委乎厓畔爾其山陽漫羨廣衍芳草碧滋秋蘭杜蘅鬱金江蘺鳥蓮艾䋞香􅉅離翍酷烈四暢馝馞芬沛風流雲蒸黤藹轉㑹若迺隂崕瓌木羅生爩燚爛燦若天星久視不去盲人目精楓香冪歴滋液洤釃盧橘垂房連巻磈􅓓雜華紛糅隨風靡亹矮會惘散撢􅘍澹淡紆隃婀娜殊態異觀杈枒嚶吟聲似笙竽蹶赴詭變愴神銷精蛩㤨失衎逐臣銜玦放子被訕勞積曷已抆血増歎於是春氣瀜洩羣鳥飛還便翾刷羽噰噰雄鳴求雌往來其間鳴鳩負雀鶉子桑飛巂周竊脂天鷄聨翩翬彩􅀈絇遨遊乎山顛至若宛隆中絶崑崙斜赴樵採不通猛獸騰騖貙㺄豺兕䑛舑顧猿狖輕矯兢遊逺枝千尋獨往邈莫與期傍偟孤嘯使人心悲僊遊之輩廣成赤松羨門若士吞石休粻御風凌􅝙􅅋雲斿翳翠葢椉倒景上下霈慌忽汗漫周游無滯於是嶽感川迴天門洞開期應五百精徹上台降大人於遐陬兮倐飇起而神駭泰乙禺嵷灴烟以仿佯兮青龍􅔒蠖灕縰而䯱䰄霱熒熒以蓊􅀢兮焚鬱律而渾胚沓爾隂歙豁然陽炯霄停雲聳鸞翥麟披岐㠜俶儻淵璇鞾偲厖皇漊瀚崛略𣺌瀰飭太隂與搖光兮揉旬始以為旌赤熛怒之䎵屭兮㦻熒惑而轢欃槍蚩尤矔􅀈以警御兮伯僑之倫脅䦧􅀈喙而迅征遵不周涉𤣥㝠排閶闔遊廣庭􅀈威鳯於東廂㰣翠虬於西清於是天子迺命太卜擇日請見太輅法象建太常綏鳥羽鏗石鍾枹靈皷紹介之士一日之間蠭屯魚麗陟金馬登石渠虞清問待公車紓國瘁察廢滯規憲章資輔世䕫龍揖讓圭璋交輝以臻乎至治嚮非兹山之靈發毓竒秀惡得有是哉嵩陽賦為汝南劉嵩陽作楚王北遊登崇嵩之觀嵩陽大夫侍王迺涉蒙茸履嵬巋長御逺睞汜濫無際顧謂大夫曰壯哉山矣寡人於兹殆將脱屣邪嵩陽大夫曰大王之言誤若臣者始足與憩焉爾王曰夫山畜洩雲氣萬物所祖無貴賤逺邇皆好焉子大夫私之已有是何厚於自待薄於寡人邪嵩陽大夫曰臣聞之傳記鷦鵬搏雲鵯鶋悦羣物各有適故其所託者殊焉王曰夫寡人舍此將復有説乎嵩陽大夫曰唯唯夫嵩維巨嶽極於圓祗之中横帶汝頴崪陗於氛霄之上縁蒨靄之薄盛乎翠虹之嶂爾其三十六峯二室嶕嶢靈巖浮歊嶐􅾈㞾􅯱樷轢互分嶇陭傍迕籧篨偃蹠行者中亍久之􅀈息汗脅增愳若夫􅀢阬谹谾虧澗無底䆷􅢏窅􅀢長風颵飉扎軋吚􅀢流離轉㪚髣髴松聲天雨新霽萬壑灌瀨漰濤湢汃硸頽雲噦􅗟􅀢疊響􅀈歔鬼怪於是鵻鳩掩羽豺虎驚蹙慌忽謾台悚息川谷此誠山精魑魅之所穴處竊恐大王不遑託跡於此也王曰敬聞命夫大夫惡得獨憩乎哉嵩陽大夫曰臣少遊上都親侍諫垣陪列公孤尊三王貶五霸揖讓於魏闕之下爾迺南箕揚舌青蠅㸃白即墨膺䜛時人灑血解圭組脱鳴璫辭金凌風翔飄然遐逝迺昇乎嵩髙之陽故其怡神育靈則攀縁嶔崟傍眺瑤城陟乎泰清盡足力而後返於青炎之圃徘徊於松桂之林激嘯於汧水之滸將折若華之英􅅋江蘺襞幽蘭帶楚蘅猿猨媟於左麋鹿擾於右逍遙容與精神益夀然後檢搜巖穴探飲玉漿璧壇鳯笙銅銚石服希瑞呈露娛樂無方若迺王喬控鶴於林間密公失路於霧外少君捧節乎雲中劉根抗絶於人世莫不偃仰羣笑馮虚軒輊臣雖庸駑與通紹介故夫龍門三臺緱氏之嶺皆臣往來遨遊者也夫大王擁千乗之器妃嬪珍玩之御不輟於前焉能避世長往哉王避席曰寡人不能也子誠為嵩陽大夫梁苑僊人賦有序趙王客李九河同王崑泉飲周孔問園亭時余在坐酒酣談兎園事感慨悲恨有加焉於是􅅋思泉涌藻筆雲綴興之所至遂成短賦辭曰仲秋之朔顥氣既夕激風頽波微霜净石凌九河揚崑泉周子乗葉浮丘垂竿於是梁苑僊人感焉被炎洲之翠羽兮綴丹浦之明璫翳青霞之茀靄兮乍有無而離光褰裳鳬汀濯足鴈浦􅂱若昇霄翩如振羽風流雲停放乎泰宇爾迺步虚蹻於𡨕壑阽壁立之翠屏歌青䓗之玉樹􅀈參差之鳯笙赮輕矯以傍駮泉寃氻而小聲於是螺璋盤舞龍嶠斜帶百仞嵯峨殊赩異繪採珠濱之紫􅀈鏡具水之朱華冠夭蟜之雄虹蹴合沓之黿鼉戯赤岸騰洪波弄反景揚清歌乗僊颷以如往澹孤嘯而却在騁逸思於天墟寄𡨕心於人海雖炎光之已絶乃江山之未改帝子逝兮驚風遊簫皷寂兮埋中洲鴻鴈飛兮自來去城角起兮增暮愁感滄桑之浸變痛園林之愠休心一唉而如䘮魂九折而夷猶嘅人代之欻㫚若靈雨之墜天卒長騖而不返何華表之千年予既不能蟬蛻於兹溷濁聊將泛駕乎海上之僊山亂曰已矣哉江河日下兮勢不可與為防非夫憑虚御風以獨暢於九陔兮又安訪乎吾於泰鴻之堂滄溟賦有序嘉靖時歴下李公以進士補秋部郎中自號滄溟盖縁公家近東海云博物志言海中有三神山濤波險壯俶儻幻怪不可紀極是非王喬飛僊之倫惡能排氛乗虚往憩之是非女偊朝徹之客惡能忘形坐馳存想之公抱魄守寂超然神遊於物象之表遂擅乎是世之人知礙於𤣥適名絶於靈紀方且囚拘形有溘然與草木同逝不亦悲哉僕受知於公既久使無瓌美申之賦頌人將謂予為不知言於是作滄溟賦其辭曰唯帝嚳之􅉙臣若傅説兮精徹絳漢上騎列星的具闕以炤彰兮邅危墟而效靈天雲俾翼盖兮㣤枉矢而䡺犂􅛗逝兮非還擢兮非倚鯈神變化莫究終始光氛翳固天人崛起聳鳯質之苞彩兮撫龍翼而騰驤吾綴函山使衝牙兮華不住以為璫既濯足於明湖兮又晞髮於鵲陽爾其挾蒼虬窺海日歌雲謠薦泰乙遊覽乎昊天之臺徜徉乎招拒之館建素商之旃書青女之簡上秋之末塊然自失恍惚漭漠神氣四暢迺觀乎滄溟之壑左東極右青丘帶以鞠陵之阻浸以禺􅝠之洲東南一陂西北一涮缶甊九河湉江漢百川赴澒洞灅濊長浮乎天畔爾其始至也澀􅀈􅀈焉濞􅀈􅀈焉洚焉矯若素輈縞馬羽盖之涴翷兮又如白鵠之將翔沬滇滇之髙揭兮互踰追而􅀈躟壁壘重軋不可撐兮忽乎遝沓似軍行渾渾沌沌淘淘泡泡拉拉跈跈靁磤雲呴砰􅥁哊懣徒觀其淪濥之所齧淈飛澇之所激射魚不得游鳥不得下漰濤灑雪萬里􅀈㵼夫然後凌波谷捎潏山偃轡􅜚丘弭節甘淵便旋豎亥之浦􅀈浰晏龍之川爾迺靈胥包戈水夷澄鏡􅄓風不颺五兩不競霾煙清郭虚四映碧山嶦㟪􅤅兮象海水浮碣石霞爛雲綺苔錦雜駮勢嬛蟬以相襲兮壓層冥而送潮汐於是尾閭岐分汀淤傍處洊㳅濙浤瀖􅀈沮齲潭澹濥㴸峾溆嶼斜菼薍之瀯渨兮綸組瑍而􅠠巻紛海蘿以被離兮石髪䌪撚而縈瀾何蓱實之遼廓兮偎􅀈磊砢焜曅乎窮埏菟奚江蘺葭􅀢水松雲蔓陽厓風披隂叢彩理豔燦擢華敷茸若迺蠃蜯揚焆蜌蠯翕赩觜􅏲含光䗂蝓偃息紫魧曝沙以如渠泛䖳乗流而覆笠武羅屏首以蝹身帝江䠞足而歛翼竒蝄沉屍於曽泓潜􅀈伆吻以削侐海童捐袂於枉渚鮫人織杼乎泉室於是横海之鱗偃雲㟼薄天津翕鬐甲戯浟深叔鮪鱦鮀鱖鯞􅀈魵叢貫龍次璨錯璘㻞喁沬噴藻嘘噏漣淪㨗鬛掉尾隨波泅沉或躍脊而濺珠或􅧸鰓而哈雲畔漶漫於天光託亡是而為隣而其羽族則有鷦鵬鶢鶋鸂􅖥虞􅀈鷸綵縿纚鷩翬綪煥曳飛延鳴浮天溢岸搏風揮霍䟠如裂漢轟剨成響恢詭殊觀若迺厓隩之隈窮怪異嘼貔䝘驢麢猎猎獙獙􅀈􅀈狪狪麙子力負麝父捷稱山􅏈投人以顧笑諸犍銜尾而遐征迅蜼躡巧於逺枝狂豦摘石乎山陘爾迺背空桑維風帆擢飛雲涉廣淵跨渚毗弄少海汰波澄川后待天吳􅀈􅀈馮遲䬃躧譴喘􅻳沐揚靈渤澥閶闔輕舉隆頽凌混縱枻趠溟絶碕㳂洄潢洋􅀈溋𣺌瀰惘慌㫚豁略無端倪鴻鴈不及翔蜚黄不及駭翛眒電邁不崇朝而逝者億萬餘里於是䝉煙幘被羽裘觀乎猗天之闕踐乎相繇之區行乎泱漭之壄陟乎招搖之丘瀛海為池碧津為洲㚇横澣之槮竟垂雲之裊欃槍之偉竿緡明月之鴻鈎靡雄虹之巨餌連六鼇於天陬窺景温源嚙霞員嶠拂衣石林振彩雲峭優游漫羨乗風獨往以臻夫蓬萊方丈瀛洲之奥焉爾其逺望離處崚嶒岌嵑紫清近登山趾反在水底屾􅽚􅀢巖螺黛煒繪鬱鬱煙煙金闕璇室紫府洞門瓊畹不死之芝玿岩返魂之樹駢田羅列錯落乎其間若夫偓佺羽父之倫翳鳯凰驂麒麟戯奢比游無垠乃邀余於泰皇之阪以觀乎窮竒之民略𤣥股兼離耳延彫題覽黑齒登巫咸歴無䏿飲帝臺之漿擥蚩尤之旗玩弄乎夏后啓之儛是雖山川隔限於絶域靡不玉帛朝宗於天府然後乃知主上威徳之所留誠有得於滄溟之偉觀也余未作此賦時夢至東海上逺望山出海隅相去百里或五六十里皆霄綺離駁金根雲牙照燿上下海水振蕩若三韓朝鮮日本穿胸等國逺近環繞魚鳥雲物不能盡述以故余作賦時即以夢中所見聨絡篇什雖外加鏤刻然大約十得七八也豈余留心此賦而有是夢耶抑亦形解神遊真入斯境耶八月十七日作此賦至紫魧云云倦睡夢一人青衣長身以刀剖余腹抽腸出尺五許然其半未盡尚連絡脊膂而所出腸彼以手握之盤結如盂瑩㓗肥肪中微有紅黄肋膜然其人稍挽之覺痛余以手摸腹曰汝手乾澁當渥之以水若油使滑澤可入腹而其人曰喏即以水洗濯之置腹中遂醒夫是二夢前後雖不得其朕然亦大竒矣姑記之嘉禾樓賦有序嘉禾樓者明府銅梁張公之所作也樓在滑之西門上瓌僪巨麗為邑偉觀落成時有獻嘉禾同莖而殊穎㡬數十伯本云是樓西畆所産異者夫符瑞應徳斯至故昔之治化隆者芝生庭木連理黄龍翔於沼鳯凰巢於閣麒麟遊於囿張公宰邑三稔政和民裕道路以歌樓成而嘉禾至亦何怪與三國時吳會稽嘉禾生改年嘉禾夫是樓以嘉禾名盖亦古人造物託始之義云爾乃援筆鏤思作嘉禾樓賦其辭曰粤若稽古維明蜀有大人先生崛起命世撫厖鴻而凌厲兮紹曠迋之竒芬擥清颷以逺遊兮嗞滄滸而搏崑崙借劒闕揖崆峒絶轘轅指燕京振羽天衢馳聲中夏儃旌濮陽遊刃白馬迺廟略規九野履垝隍雷駁而風行緬天險之莫階兮悼西門之墜營觀櫓叨惏之涅圽兮萬夫仂關曽何足以當兵吾恐公輸之捷巧兮豈㢮帶之易勍於是羣僚闡議小史獻謀髦倪逯繠朂兹喣噱以相與成虖神明之樓據厚坤以特峙兮象雲氣之搆天揉參旗以繚垣兮緡東壁而軼三淵埒帝神之奥區兮泡燏焲而璘㻞偈夫􅱄首帶干將而趿四維兮闐哱而俯㠝岏馮驛驛以魂魂其相奮被兮歘凌雰􅀢􅀈以駢田離樓岪鬱紛沓遝兮􅀈豸夭蟜鳯􅀈而龍翩旁唐堀岉􅀢嶷䃳磼兮畔漶炤瀾奐而便蠉狀若碣石之嶈嶈兮又似虖巨鼇載員嶠􅀈迴川於是屬輿乃齊夫墄􅀈兮而臼華榱帥爾層觀兮灕􅀢蝹䖤瀖濩皛􅀈赽星流以電烻兮觸嘼瑣而排金扉憺􅌄窱以隂處兮洞豂豁之離竒􅀈砰􅗟其靁殷兮飋凌兢而増颸魄脅䦧以𡨕暗兮䀛北南之軋坱徒􅀈􅀈之忞忞兮精憧憧而􅚡漾憑軨軒以流覽兮紛譎佹而殊狀爾迺萬楹攅淈磥砢連扔飛杗虹繞浮柱雲征芝栭􅀈磊穹櫨傺傂拉盭傴僂枝掌糾㑹窺天窓而結綺疏兮翠玉樹之千尋垂藻井之芙蕖兮涵緑房而曳漣淪鏤太華之岳岳兮􅀈巒鬱㠥峆崉而嶙嶟流水滹􅣇㶑􅘍於其下兮汨㴂㴂乎龍鱗虎豹􅀈􅀈以陸梁兮熊羆舑舕而血齗螭龍躨跜於碞欒兮螣蛇􅝦蚪於柍桭爰有王喬飛舄赤松餌玉若士鳶肩羨門乗鹿據重桴以危處兮倚蜚栁而曼睩凌虚險以相徉兮若鬼神之髣髴錯粲珍怪品類竒英千變萬化窮極海宇隨色賦形爾迺表以通天之觀突以凌雲之臺建以靈䕫之皷杠以熊虎之旗賁育之倫仗鉞幪楯陳視乎左右騰躡乎上下者不可殫計盖王公設險以守國足以藩主上於億兆載也於是天地煙煙煴煴紛紛渾渾儲精洩靈肆乎無垠戒羲和以警御兮飭青龍而走太隂澂夜氣之灝灝兮焱朝霞之燉燉流青雲之靄靄兮瀼玉露之沄沄焚輪轇轕於豕韋之壄兮沕泱滲纚於河之漘岠乎鮒鰅之畞離乎天臺之樊被沃衍之溝塍兮挺嘉禾之秀穰茂一莖而兩穂兮􅅋葱蒨之竒芳苞金粟以岐翹兮勮偏反其光半散粼瀾蹶伆邈以長騖兮却偃起而回翔婉若神女之照灼兮施豔彩之章又如緑雪之靡漫兮薄翠岫裊陂䧜若迺霖雨新霽原阪始溉承以朱明滋以沆瀣琅玕青熒翡翠翳樻翬雉朝鴝以徃來兮摛錦翼之陪鰓蛗螽負蠜詵詵殷殷其振羽兮歰冷響而煩哀田畯皷儛於桑中兮遊女採蘩忽乎鳥舉而雲迴穌墳薄之累邐兮粲囷㔱之㟎嵬曽城瑤柯何慌惚兮杳玉榮之莫見碧珠貝葉不足與炊兮珊瑚仳離吾又奚取之而為㸑歸禾詠赤舄之姬公兮濟陽開禎非夫萬乗孰應期而紹漢夐千祀之夸美兮縁兹樓使再臶繄君子之孔良兮輔隂陽而摫判巨靈紛總總以僔僔其來翔兮相栁倔􅀈贔屭而承闉􅨬挾斯之麗譙兮摱白雀而釗羽林揆夏后山川之嶮􅇖兮崪二崤隘孟門二崤徒西阻於鶉首兮孟門曽不得扞乎靈津曷若神宇之掲崿兮拱魏闕而嶙峋爾迺嫳天槍殪旄頭挫蜚㢘摺蚩尤廟貌之所歆動威稜之所昭留東漸滄海西被太蒙南麗丹穴北馺空峒披髮左衽之民白雉縻騶虞羂卭卭絝駏驉縣車裹馬出於遼逖之域享獻乎明光之廬天子乃乗鸞路驂雲螭綴明月橋虹霓柴園丘燎泰虚招帝閽兮天門開跨不周兮騎轟雷風䬃䬃兮神靈致御馪芬兮酳𤣥觶福穰穰兮横岱巁天人歡兮衆聲嘅祥風吹兮雲霮䨴垂鴻聲兮彌萬世雲濱賦并序鬻熊之墟雲濱父居焉棲身嚴戸放志滄浪超曠之度方之瞿硎子真之流莫能尚已近時諸大夫各有篇什僕辱在草莽承風操翰聊為古賦以紹公孫嘉遁之製云楚山碧巖倚嵰嶮兮象圓海浮蜃闕朝暾夕瀣兮滋翠蝀蚒窮石北坱澒洞兮邈不可越嶙􅀈嶢嶆􅀈翁危􅕲蔽日而干霄降逮山岅􅀈􅀈磟硣鹿角傾碕贛浦縯撚於其垠兮彭蠡東注而雲佻㴵鱗長逝瀴涬渺曼淠泙㳷濊􅀈㳬吐吸踰岸互㑹斜沙潬之澨徑莎灉之隩如此者㡬伯千處焉爾迺翠幄􅀢搆蘿壁風褰芝宦椒塗錯落煙雲碧津離樹青輝玉葉丹蕋承霞素房垂月隳輪碅隨風歙鬛九臯之曲虞蓼都良芳若蔓荆蘼蕪不草薈蔚羅生苔錢離駮綴若華星郁茀苾烈隰滿􅀈平外則岥沱漫羨蓤蒲續斷蒼翠浥雲杳無圻畔至若白沙如龍碧磯如馬黠屈蜿蜒在波之下水鳥鴐鵞􅀢䴉鸏􅀈鵁鶄􅀈􅀈搏流飛灑弄景涔陽延鳴鉅野盖將指瀚海以為池望廣原而解羽也殆夫暮秋泬寥霜泂溪清槎江晩兮雲葉凈螺湖夜兮月華明坐磐石調紫笙吸鳯曲舞潜鯨猿啼北華鶴唳西平鳬客流思鮫人吞聲少焉蕭瑟風駛水涌􅀈灂磅􅐀濩泋轔觸萬籟俱動仿佯慌壑令人心恐是誠龍盤於𡨕陬蟬蛻乎煙隴爰有東郭谿壑之倫貌沛天虚靈含素真扶笻被羽嬉遊綘津垂竿魴鱮加弋鴻鴈􅌜鼈瀹胂臑鷤胾膳斟雉芳羮彫胡碧粲蔗漿縹清玉醴紺淡集讌於昭霞之宫披酣於苑風之圃浩唱乎猗天之臺張樂於洞庭之滸乃左覽清極右睨范林泐石封􅀈翕葉藏珍超然神往永此抽簮將遺珠於丹水遂埋劒於崑崙豈徒逐二女於湘浦抑將窺禹化乎海濱於是江妃感焉見於碧渚凌波嫣笑逍遙容與非煙非霞若雲若雨竒色麗質瑰偉曠世順微風以翺翔向江臯而解珮為之謠曰白玉鏤盌瓊為漿飲啄沅水雙鴛鴦􅖅夷賡歌曰蓬萊欲渡海水深麻姑千載絶華音雲濱父報歌曰協僊靈兮遊汗漫日將杪兮倚增嘆駕予舸兮凌赤岸胥鳯徳兮垂素翰遂虚賦姜次渠鄴之良郡貳為要路所忌徴入部士民傷之因有斯賦詞曰丙辰暮春壯游鄴都超反隩履平蕪羊腸走險鹿角通衢蕩隂開其南邯鄲掎其北左引衡漳之浦右據太行之塞誠京邑之藩屏霸王之區域於是鴻風昌慶雲蔚大人起神龍㑹決閶闔兮叙長雲瀰四海兮歴河濆翺韓陵兮俯洹野戢亶甲兮紹前芬若迺承流三輔翊戴王室目牛無全害馬迸跡春秋郊行生物蕃息士女謳歌鳥嘼翔舞式乎四國爾其優游暇豫退食在公瓦雀行案山鳥下㕔青苔繞户緑樹垂榮窺明月兮虚堂仰浮雲兮太空佐卧治於淮陽資芳猷乎廣平誠希世之哲匠乃邁古之化工爾迺梁父鬱興三塗並起靜無寧波動即覆軌蒼蠅鳴白黑溷市虎張真偽眩巾征車之闐闐兮去東陽之舊疆歴鸕鷀之荒陂兮趠爛石之峗岡虎澗罷嘯龍山蔑光瑶草就歇玉畹横傷風凄其而啓塗雲蓊鬱而飄揚𤣥猿緑犺睢洟靸踏排林蹶石羣呼狂驤於是賓北門張祖宴諸侯來方岳餞征馬鳴雲旗亂笳皷競起金石交作絲簧迭奏絪緼憭悷圉軋䕶濩發言為酸振衣為喟左右淚落莫敢仰視豺狼嘷兮路垂鴟梟鳴兮林間欲往從兮不可將獨處兮懷愆爾乃君門萬里一視無際天閽攫人闐噁贔屭虎豹環繞明月嶼兮珊瑚洲㩜朝霞兮不可見窮四海兮焉求翼神龍兮來過鳴鳯凰兮庭柯桂樹兮又何為兮淹留聊出隠兮與堯舜而賡歌龍池賦并序魏郡少方伯太原王公雅好龍池竊考括地志圖稱龍池山四方隆表漥中多水有龍出入食五花樹公以此自况其𤣥徳獨尚良可知己然負玿琰之器者必厲遏雲之響柟叨居南鄙濡公徳化苟非闡之以辭後將何玩焉於是聊著斯賦以暢公美其辭曰黄帝莽漠之野龍池之山彌襟帶而杳盭兮左禺􅝠右崑崙北繞三桑赤澤南馳九疑緡源紛未歇䖤渟沸灪𤣥津在焉若夫論其為狀也究其幻怪也爾其區域也則雄嶽磅礴方七百里嶒􅀈崉嶂岮㟇岋􅀈翹踛蔽連峯負闕韜日隠輝藏精畜洩熠虹飲雲木􅂒嘯月鬼神慌惚若存若没乃有碧樹抽煙錦草結綬五花爛熳九芝並秀瀑灥以􅀈放乎川藪鳯鳥之所嘯歌神嘼之所遊遨於茲託處者什殊八九焉於是泰洪擘其厓康回絶其紘天吳貢其波江胥湧其靈神濤淧浡翠浪連濴疊如紋羅澹若空青􅚡瀇浟湙淵㶎澂泓挾輕颸以長逝折􅣯碧而返觸矯駭天之羣龍翛決雲之雙鵠少焉安翔寂寥徐迴如解軍裝淧淧渒渒㶑灧乎碄䧜若迺水披紛於隂漄石髮捎鬖於陽渚緑蘋承流以委猗紫蔆隨月而容與莫不呈華露色或浮或沉髣髴江浦至有紫蚶珠蚌頳蟞文魮鱑鱨魦鯉噞喁水湄優游澄深儵往忽來逮夫朱羲既明精淫上漢㪚為朝霞靡離爛煥圖靈學僊翔麟狀鴈變化嶇﨑測之無畔故其神映逺田潤􅚃木之東葉影扶桑之西枝飲夸父於後澨浴昆吾於前涯嗟太液兮黄鴿㪚驚華林兮連蕋稀愁積草兮珊瑚晩吊疏圃兮明月低爾其層渾之淵洞溟之府有蜿若龍栩栩俁俁赤帶翠鱗鏤髯豐輔摛藻繪文章采瓓絢雕琢璘㻞舄亦外朗青熒内分蟺蝹輝瓊連蜎蚪蟉不可盡論若夫騰池表溘清埃馮太虚驅轟靁霖四墅徧九垓貫影河津掣電海嶠煙煴灼爍沌混却照逺而視之似神女遊朝陽迫而察之如若華流景光蔚兮銜燭耀鍾山之野隳兮啡漦涌夏后之堂於是豐隆警轡虹蜺衛趨飛㢘清驆列缺候塗雨師舉水族戾神蜦挂虎蛟嘅王珧沉鈎虵械雷兕殞蠱雕鎩授軒轅之符搆女媧之精效有虞之璽負神禹之􅦬豈徒躍劒於延平委杖乎葛陂雖飛聲於僊館終見誚於龍池也迺感穆天子之事起而賦樂池之歌歌曰軼八駿兮黄竹西奏廣樂兮臨𤣥池水粼粼兮失龍螭誠荒淫兮何所為又續而為飛龍之謠謠曰濯滄海兮欻翠翰錯金碧兮赩紅蘭遊淥池兮戯層巖乗九五之嘉運吐赤文於瑶壇佐哲䕫以典樂為聖后之納言君寧批徑尺之逆鱗願燦耀於瓊編夢洲賦趙王遣使幣聘盧柟往就見之王命坐諸客上曰蕞爾小國屈先生以言竊聞先生遊遨大􅚾薦紳之士往往搆先生賦有之乎對曰然有之王曰奚賦耶柟曰鄙人朴質蒙侍君子於羅太公為雲濱賦王别駕龍池賦董封君邃養賦李郡伯滄溟賦張户部㠠山賦陸大人作夢洲賦既成大夫亟有所稱賞而王未見焉王曰可得聞乎曰嵗重光赤奮若之夕中州大夫睎嵩髙俯河隂坐述𤣥之堂感牛女之故精神慌惚如將飄舉青揚微婉黄氣四湊乍若有喜不可究攄少焉就寢夢見二客造焉褒衣偉冠粲目貝齒進退尺度貌甚閑雅翦刈籍草坐棗樹下擢素手弄瑶芳􅀈饒碧飲寒漿極妙思樂無方爾迺乗鳴鶴之舟遊赤岸之浦超凌虚之樓憩飛雲之櫓髣髴杳瞑若出神怪修容長髯見一道士延予升堂體貌備至言笑甚驩殆昧平生詢之氏姓疆曰伯靈舍舟而途概三伯步石壁巨閽輝搖光爥扁稱瀛洲寔多僊駕爾其為勢也擬其為大也磅磄轇轕磓􅀈千仞􅼯峛㟋􅡲脇施邐倚緼隆豐柴㒴􅀈虧負逺而視之渾渾焉胚胚焉氲氲焉􅀈巖巖焉崇岳岳焉煙煴濛澒浮乎漢表迫而察之㟋􅀈離纚反在水底蓬萊峙其左方丈􅼐其右員嶠陁乎水涯方壺覂而不收其陽則朱羲清華盛夏凱焉其隂則𤣥靈温風隆冬燠焉是以山峪魑魍之所水府龜龍之磧夏后方貢之未專大章神度之尚洙爰有瓊璑赤瑕藍田江珠琪珣琅玕之寳禄碧璀瑍䕃乎𤣥濤草則石蘭木芝荃茝江蘺蒲荇菱藻虉綬緑莎木則􅚃木若華榙櫖豫樟枌梓柙青椶櫚沙棠扶疎櫹槮被乎西東於是珍異之禽神怪之嘼則有鳯凰鸑鷟鷦明鷫鷞鴰筩鵕䴊飛鳴翺翔户豹咆黄能騖􅍪􅪲羣蜼玃顧其水濱則有獱獺水豹蛟蛇石鯿黿鼉蜆蠯䱀䰲鯖鰱莫不噞喁淫溶咂􅀈菱藕閎汜幼靡或左或右於是徑掛􅆐之岩涉通靈之滸跨文石之橋謁玉虚之府長髯舉方師會命童子設饌具乃有苦醢之羮勺藥之醬滌菽肥腯九醖鬱鬯炮鼈寒蠵爚雞酸􅀈山麕豼豹之胎水蟄鱅鱸之腴腥菜錯異豐融苾蠁千態萬殊凡所以滋神魄養血䐈者充乎四隅乃使師涓鄒子之徒截孤竹制鳯尾控素頸流纎指吸朱唇離皓齒玉呌發龍吟起激清商靡流徴泣􅄔婦慕放子開九隂除積匯大音未希列絃奮蝟拍􅔊逸響小大互比武毅揚北音滯蜚㢘馳泰一嘅聲盤姍以隠約埶迅突而爭鎩嘆壯士之不返信猛厲之可喝招屈原於江潭起隋武於湮隧雖忼慨而莫覿其人徒心神為之搖斾忽東方之既白覺精魄之未沬一歎而寤筆之載記趙王曰善賜之絹百疋玉二㲄文馬一乗盧柟攜之歸衛上九騷并序九騷者濬人盧柟之所作也柟被誣抵法逮繫詔獄十年餘上官考驗率避嫌弗肯原庚戌平湖陸公宰邑治政㢘明為法不苛察其寃平反之今年秋以不事權乃遷南京祠部主事柟痛失所天不勝其悲哭别離之思於是作九騷以攄其志云嗟夫山川之鬱块也𦙍秀兮掲日月而載光矯節兮若出浮雲凌厲横處兮超未央發軔兮聊將與行決轡兮徑度乎紫宫䎖翝容與兮圜視之無垠踜􅀈攘袂兮抉衊而輔新釀化兮士女要藐而流誦聲欻逝兮物愛之不可懲惘愴兮而私自淪雉漸漸以飛雊兮蟬嚖嚖而搖鳴鷰翩翩以窺巢兮蟋蟀哀響於戸庭悼犬馬之餘齒兮荷君子之明馨仰㳙涘之無報兮徒嘔裂乎血衷獨竭思而忘寢兮若羈旅之無雔隣望南雲以慨嘆兮心搖搖於斾旌右一痛世之􅇖嶮以詭襲兮偭徽纆而枉度謂騕褭之竒驟兮鞿羈之使遵此陿路夫騕褭諒不有於羊腸兮靸驫飂以夐騖嘅造父之不若是兮或今之人善御黄鵠一息千里兮夫豈爭食於鷁鷺聊濯羽於枉渚兮終䎘䎘以逺去顧豢龍之㨗巧兮視神物如犬羊儵奮雷失所處兮悵孑立而催躟苟大人非可乗兮胡為是之淟涊臨池水以凝睞兮又何䪾此軒冕吾奉堯舜以為君兮忽不知其􅑬嵼表獨行之耿介兮歴九折而不返伊䞇負䁀以康后兮甯戚飯牛而商歌儻斯民之翼􅀢兮聊折節以委蛇騕褭逝兮𤣥闉黄鵠翔兮紫氛觀者浩歎兮如煙跼馬睠顧兮河瀕夫神龍􅝦蚪以行天兮非䗤之匹倫固將視之澤此后土兮終迅往符吾所云思江海以為竭兮涕淋浪而横集願附君之車塵兮身窘束其未得俟結草以抒忠兮何枯骴之足惜恐年嵗之超㫚兮旅糞壤而無益右二吳艎發汱兮櫂翠翰秋風嫋嫋兮吹河干鴻鴈嘹唳兮絶羣難徘徊翔視兮血汍瀾涉蘅臯兮辭逺客䰟煢煢兮將焉薄捐珮兮洹滸結長想兮江之嶼願留斯須兮恵我語君不顧我兮苦復苦旞羽逝兮没長雲望不見兮涕横紛攬浮颷兮不可襲立沆漭兮長太息超既邈兮中莫侐精淫淫兮増慌惑落日恐兮絶響歸來兮申且昧之未極右三竊獨感此鳯凰苞彩之九章兮揭重冥而離翍覽冀州之有無兮舞徳輝而下之顧斥鷃之盱笑兮彼亦奚知夫鳯凰之所訾將無量於蔽詬兮猋振羽而高翔心隠憐之惋􅀈兮固無俟於君子之見明特滑鬱而緘處兮中惘而無傍余陟岵以望君兮君之行已云邁眺白雲之髣髴兮儵幻擾於江介山㠝岏以横厲兮水渁淼而縈帶羌神􅀈而形留兮極勞心於天外諒覆盆之曠蕩兮繫日月之大明􅀢垂照之無已兮永篤恩於夏蟲右四闢白門以周覽兮邈秋氣之汪洋悲梧楸之委約兮葉菸邑而有霜撤朱夏之恢蕩兮然怊悵而不平六龍杳不可頓兮王喬逺又奚足與存日㫸􅀈以下舂兮月載魄而上營嵗崢嵤以不處兮老冉冉而相循奉不肖之賤軀兮厯四十而有七恥功名之不建兮㡬墮身於鬼魊枉浮生於斯世兮終佯狂以自適繹大命之所由兮託深衷於罔極擥清􅀈以寄悃兮飛㢘誑而莫將因贈言於黄鵠兮喟余又不能髙翔羌媒絶而路逺兮志緸鬱而弗彰立蒼莽以竚望兮徒結想於微茫願假跡於楓葉兮流洞庭之煙渚常宛轉於舟檝兮得見君之容與蹇儃佪而弗進兮悵疚心而齟齬右五繄余幼感嘅而好嘆兮矧仳離之多故歀賓從之動容兮懐征人之徃路日淹暮兮風颼飀吾登長隒以騁望兮君始沛乎方舟貽貝璐兮捐明月吾與君期遊兮江之汐思溟涬兮旅璘珺吾欲自遂而趫徃兮徑絶欲寃頸而愁處兮無隣然中道而瞀瞶兮忽不知其所從羌疾心而反視兮歴肝腋而抽誦顧愚欵之難變兮信常揣乎丰顒竊仰北郭騷之抗行兮盡一飯之竒報媿駑蹇之弗違兮恐斯名之未紹夫梁父之非所乗兮東海余莫能蹈馮鬱邑其害己兮乃抇衷而自劭食草菹以為飽兮御毛褐以為温朝臨靧於清流兮夜託宿於孟門遵市南之先軌兮揖伯夷之清芬將要之以没齒兮奉君子之玉音愁亹亹而無端兮思嬋媛而不解䰟髣髴於江漢兮願朝宗而赴海右六慨美一人兮跾逺遊翺翔凌厲兮臨河洲迴橈䩊睞兮心夷猶鞅罡無聊兮若失好仇沙棠舟兮青雲幔朝黎陽兮暮淮漢決層冥兮送蜚鴈蹇誰慕兮淚如霰彉余眥兮山之左雲英英兮而來下瞭千眠兮塞原野挑飄䬍兮君奚舎采芳杜兮䃳石林霜􅀢􅀢兮雪紛紛惋憯憛兮倚莫贈君懷我兮思不任滄波之臣兮𣺌煙檝滕魚龍兮食海月我思君兮阻天闕虎豹咬兮熊羆咆􅒗鶬鵩鵵兮夜怒號風颵颵兮山木寒思公子兮増離嘆右七偉終南之松檜兮挺直幹乎千尋託竒根於􅤆嶽兮掩枝葉於𤣥津􅀈蕙華之競敷兮望風雨而先零君獨服此勁質兮諒非衆芳之所羣􅀢薦喏於榘彠兮願當君之夏屋顧枘鑿之横施兮乃終罹此怨讟心閔閔之隠軫兮哀斯世之蹇齪指南土以翩翻兮汨滋邁乎芳躅託鳯鳥之先容兮藉鷦明為後乗謁重華之離宫兮奏雲門舞六䪫鄭聲曼靡離逺去兮麤穢除而虚清懕衷􅈺儀以沕宓兮䕫龍軒翥而並迎夫賢臣作忠固無逺近兮量自信其所長堅白支離吾弗與辯兮雖頷顑其何傷竊余離慜以永思兮俟一見之何時痛江河之愈下兮恐青雲之後期登宛丘以望君兮君之門萬里沂江潭以直上兮謇余又畏乎龍鯉仰浮雲之互逾兮杳鴻鴈之難攀心低佪以怛􅀈兮積遙夜而永歎右八皇天之不逞於一物兮禠余魄使有行乗􅇖嶮以集憩兮被倨傲之頑名苟視履之無􅄽度兮身焉取此純纆唯神理之降罰兮假豎奴兮用殛銜惌鬱於夏臺兮欲一鳴之匪得惜既往之莫咎兮愳將來吾不可測迍馮馮而無終兮怊􅍵􅍵而罔極竚慌沕以孔䵝兮精煙煙而逺襲揆堯禹以為像兮揖仲熊與為伍余孜孜日夜以呻誦兮尚欲奮聲於天下然傍偟而絶術兮衆噂􅊱而􅀈予嵗困敦之罹網兮至今十四年而始原微大人之鯁介兮余又焉能使常存􅀢犬馬之無恙兮歡既至而霑巾慟唴哴之曷已兮信感泣乎路人昔越石之當乖兮晏子聞而解之苟鮑叔之少忍兮仲孰與乎宥之感國士之竒遇兮彌千載而仰之思鬱悠之尠暢兮判淹離而晟之送佳人之娗娗兮擁千騎之嘽嘽載雲旗之兮疊鉦皷之􅀢􅀢左青龍之蜿蜿兮右白虎之奰奰屬雷師之轟轟兮御豐霳之翽翽飭帝江使混混兮戒陽侯之貅貅叱黿鼉以為梁兮靜蛟涎之泅泅二女翲翲而來翼兮馮夷偠㒟於滄洲令江水無波兮檄九河使安流𣺌長浮之㵾澹兮還期君之舊鄉嘆處者之莫從兮徒憊心之遑遑夐不忘茲厚徳兮將坐見於羮牆忽乎君之髙蹈兮顯光烈於虞唐右九蠛蠓集巻三
