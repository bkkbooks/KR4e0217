body:
  text: 蠛蠓集巻二明盧柟撰啟為濬諸生留賢令陸侯啟濬學生某等齋沐企悚謹奉啟大台輔侍御楊公臺下某等頓首頓首死罪死罪某聞有虞膺厯而咨命羣牧夏后宅揆而式叙九功哲懋官方業閎天緒聖神罔極茲焉託始嗣是載徃雲涌川徂若公旦報政緜魯惠於優渥尚父奏功揵齊聲於標亮漸摩淺深之術𦙍祚興衰之運世固可得言之矣昔子産蒞政訛言屢騰滋世殆乆詠歌始暢卒使楚師望塵於溱洧晉人捲甲於曲冀由斯論之履任乆蹔之效不可誣已且夫卓茂遷宻境􅅸飛蝗牟融宰豐治存異跡史雲萊蕪釜魚蜚唱孔奮姑臧盤蔬育馨蔡肜偃師詔書増秩劉陶順陽童謡發嘆之數公者權僅百里之用秩非萬石之貴囿時奪物職豈無由夫泰山之坻詎一朝之霤城門之􅁤非兩馬之力聖人乆適其道王者期世後仁稽古載昔風猷弗舛爰惟有濬實衛故墟河山相薄雨暘互患夏燔槁燼秋旅魚鼈杼柚爇燬倉庾糞穢國賦報征官師淆亂男女劕劑馬牛逋沒困頓狼狽流離貿遷櫩宇之餘鞠為禾黍􅄔婦坐嘯野哭晨興村塢蕭條痛心在目雖賢俊繼踵頗加損益然宣尼不著世䘮道矣介石獨徃皆懇於守經者也人皆守經則天下幾於無權矣是以結繩之政治秦則紊干羽之舞敵愾則靡何者勢窮於不可用則用者退事適於不可禦則禦者來若廼昧淮南墮髪之論𦕈孫卿百仞之㫖執閔損仍舊之談陋董子更張之喻行類刻舟智侔膠柱相時之器殆其不然竊惟濬縣知縣平湖進士陸侯肇自下車識量洪邁治俶烹鮮法由社䑕凝思風草流潤脂澤功緒宏綍名紀父老故其建學興師首先風化恢啟金墉綢繆廨宇浚流距川駢歸閭族讐校驛傳蠲除里需藉賑備荒貸稑通畆流競􅀈賄靜一奸宄罷斥山石裁抑傳置捐俸養老分禄賻士甄表忠貞洒雪寃獄是皆命世成務反經合權行昭日域思曠天波銘表太常之旌功綴羽陵之簡豈徒郭子賞識許公亮鑒而已哉是歲十月陸以三載考績如京咸曰上當見留上當見留則濬人鮮終矣濬自孝武皇帝以來靡敝不振尹是邑者若上饒工部侍郎楊公鎮以亷介太原監察御史魏公持以公方然卽政非人鴻澤未䆒輒見擢去陸之前事稍集方期大效殫之歲月乃可底績若使政訖小康功虧一簣長未洗之瘡痍亟轉加之塗炭民命弗堪亂離斯瘼我心悠悠謂之何哉夫超絶窮壤非尺蠖之力馳騁千里必騄耳之駟終陸之政希陸之人時或改轍僨功立見屬者公車告啟攀轅若在驪駒戒路截鐙如存闔境髦倪傾方士庻人蓄怨慕家懐訴書惶走交頓翼陳魏闕昔宼恂河内願借一年焦延小黄乞還舊職以今方之何有乎爾或乃製錦方純遂斷機長徃割雞未竟卽觧刃弗顧甘棠虛召伯之思緇衣勞武公之詠甚不然矣夫萬物之所不通聖王因而不奪長譽以顯朝著之用何如好民以樹藩籬之固夫賢哲善世民所弗能忘也黜易漸危民所弗肯遂也奪其弗忘與之弗遂是謂政盭是故朱絃洞瑟希世之音師曠之雅好天球琰琬秘異之珍宗廟之至寳也賢人君子民之愛也亦然某等素荷徳教樂育菁莪偎榮桃李簡勞至公愛而無厭輙敢進聞儻以秕謬之言枉垂聽覽矜某所懇進呈聖裁特停選擢俾以原任衙門從事則彛章無毁治化有終遽爾不效治某以誑誖之罪不勝丹悃屏營之情謹具陸知縣十八政隨啟奉白某等死罪死罪記滕王閣圖記柟少聞南昌當呉楚雄鎮而滕王閣則俯瞰西江延引甌越瑰琦絶偉為東南樓觀第一及讀王韓所為賦諸所稱引益竒常自語以為當及壯遊徃視造物之妙於所謂滕王閣者庚子歲柟坐傭奴事擊獄秋九月廵按監察御史樊公白其寃平反明年殷公追寘之大辟由是愈益錮其身不得之南昌觀滕王閣矣戊申山東石公以明進士治濬加恩囚儽柟法少寛因市諸所蓄故物得畵一巻曰滕王閣圖自閣道始傍達連房阿觀旋室㛹軒離檐倚楶戢孴翔翥於霄漢之上怪石幽篠危松蒼然䕶映屏障俱㸃綴人物山水圖書象態呈露咸極巧麗獨恨僮僕數輩不可役使黄衣客兀然吹笛無聲焉爾閣隂穹山嶄嵓横碧黛緑騰赴環抱流泉瀐沃㑹為洲潏石衣萍藻委靡悠然而可賞者是誠天作地藏以助茲閣為天下偉觀者也於是撫巻慌忽若失縲紲栩栩乎若馭雲軿而超越江漢飄飄乎若遺浮埃之表摶扶揺而游覽於閶闔也廼知嚮昔王韓所為文賦不誣而柟亦得覩所謂滕王閣者竊償其私願焉失滕王閣柟未之見所傳圖畵又未知真得肖其形與否今遽喜躍為慶幸如是設使柟誠得一凭覽盡江南臨觀之美卽當乗元氣遊六合灝乎長徃與世相棄豈直今日苟活為僇囚依圜牆溲厠而已邪柟幽拘多感毎戍卒更番至則道故舊事或曰某游宦業美田蠶園宅今丘墟矣或曰某見某服輿刀鼎竒器在若州縣葢售之也或曰噫某死矣其子孫不能享有富貴窮且丐也嗟乎柟待罪七載視猶瞬息斯世已有陵谷變遷之意而滕王閣獨淹蔑吾廬無聞於縉紳士夫是不幾昧於天道徃來消息盈縮之理歟假令斯畵為匪人有不過資覆瓿之具抑安知是圖清淑之靈於柟無啣而吾燭物之智不見晦於滕王閣也龍川孟君思才儁豪爽尤深畵理於柟齠齔友善因持軸語之曰是宜與君卽柟不幸死君可日哦其下以慰吾滕王閣之思幸而見原則吾與君觀天下形勝登㑹稽渉彭蠡泝洞庭越衡陽臨漢水以望方城獵雲夣窺荆門下岷江還行淮海之間貙䑕所隣蛇龍所居歷幽顯﨑岨之觀以求所謂滕王閣者周章而徧覽之柟雖駑蹇尚能為君歌詠其事舊所藏圖畵烏足為之羨嘆云因戒之曰去汝好適孟君家待吾考訂姑作記與汝别世義堂記秦皇帝令烏倮比封君以時與列臣朝請而巴蜀寡婦清亦以資見客為築女懐清臺夫倮畜牧長耳間以竒繒物獻遺戎王清窮鄉之婦賄財免侵犯俱未嘗顯徳澤物益當代而乃禮抗人主名敷四海者何哉周人都河北走汴宋汴宋天下一都㑹也屬杞東賈齊魯西賈上黨南梁楚北趙中山饒材木器用魚鹽筋角漆絲巵丹沙銅鐵連犀齒革珠璣瑇瑁農工商賈率歲巨萬息故其民豪傑富者糓千斞釀千石帛續紈䋤千鈞錦千純薪藁千輛􅀈千引馬千蹄耳䖍牛羊驢􅇾千齮臧獲指千鮯䱝石首千䰝夏屋千楹耚墾膏腴􅕨千萬畆則負氣任俠巧悍為一切不法丈夫相游戯悲喜無常怒卽相超距椎擊或居訕誚善罵行姦蠱是葢不如倮清之適用財守其業自衛也獨杞巨族張公欽廷恩氏㓜岐㠜好學濶達寛緩足智好議論嘗以忠孝大節自許可語其人曰吾治生猶伊尹呂尚之謀孫呉白起用兵不足效也乃取之以權斷之以勇守之以仁義乆之家遂不訾𢎞治中軍儲告乏廷恩以八伯金徃助邊天子嘉之授昭勇將軍宣武衛指揮使是後歲屢歉前後輸粟六千石金千餘兩廵撫李公俱以事聞詔下附國史又出遠田六千餘畆給無力夫家留邑田三分之一供饘粥由是夫家子孫能免饑寒者無不感廷恩徳云廷恩既卒二子長希仁次希義希仁嘗為國家捐金五伯兩粟一千二伯石助賑廵撫潘公奏績詔旌其閭授指揮使卒而希義承父兄懿徳尤克自隑􅀢能振施成名家閥閱以故長女為周康王妃康王府屬有以罪逮繫者或求救遂絕之曰惡去吾以禮輔王是豈可受干謁者里人鬻女償逋責希義問之曰所負幾何對曰五千緍卽與錢五千贖其女人有稱貸乆不償則焚其劵約三千餘兩而士大夫假藉者無算焉戊戌秋黄河決縣官卒不知所為希義出錢五萬募夫塞其灉嗣是軍國不給則接撚輸粟三千八伯石而廵撫河南都御史徐公魏公俱以䟽上自兵馬進階指揮使賜三品服色嘉靖丁未秋七月希義以疾終于家子三人長曰衍祚美儀度尤精藻鑑處事咸中肯綮談仁義樂道詩書傳載通籍諸侯擁葢拉轊束帛之幣屬望於陶雎陳鄭間四方文學之士爭與交遊無不欲望見風采葢翩翩然佳公子也次景祚𦙍祚其所著與兄伯仲孫一人曰樞雋逸愷爽篤志力行無異於諸叔語曰君子富好行其徳又曰侯之門仁義存跡張氏所傳累世善祥今親見其後如是彼烏寡之行何為哉夫富者人之氣勢所關匹夫得之可以雄斷鄉曲權奪卿相力抗萬乗者也今夫百金之家一當意則汔所有以誇閭巷餙冠劍連翩車騎為富貴容市駿馬走狗弋射漁獵與少年相馳逐由是天下學士大夫聞之囘面褁足不肯與之言其視張公子孫世義不亦甚可羞哉詩曰貽厥孫謀以燕翼子易曰有子考无咎葢張氏之謂矣序贈郭増序乙已歲濬醫學乏承羣醫白之令令曰人無恒心不可以作巫醫夫天能生民不能時其飲食節欲於是乎授之父母父母能養民不能察其寒暑六滛宣洩之宜於是乎授之醫夫醫固所以寄民命驅慝癘而安吉祥也孰克膺茲命羣醫曰郭増氏可令召増問之曰卽令若掌醫其何以供事増曰藂輿藥之材取必菁華達必性情盧扁之所推也可以供事與令曰麤跡雖足以衛民未可與善政増曰表裏六脉洞察虛實聲色喘息不敢怠逸黄帝岐伯之所問對也可以供事與令曰敬通而思惠可與善政未可與無力増曰淵黙潛通守一弗易行乎神明達之庻績宓羲氏之所以善世也可以供事與令蹵然曰此聖神之化也狹士之所以褊心若焉得有是夫命掌醫政於是増乃教膏醫和𠂻癰醫眡標耆醫養老穉醫慈㓜嫗醫釐婦瘖醫資獸鳩以空青硫黄犀象茵參勃溲之殊以辯盧扁之用焉質以𤣥脈肥脊五内升沉吟思癎夷之寓以極黄帝岐伯之㫖焉顓以鴻潜淵嘿旁通裁運之機以知宓羲氏之化焉靖虖癬疥潰虖縣疣仰虖戚施馳虖㓕趾邑用康福國無昏夭札瘥之民繇是對養於父母以合生虖天命之曰天醫以復於令令曰善遂世掌醫學事贈劉丞赴興州經歴序明有天下尤謹於東北西三陲四方歲時職貢京師馬類千萬數而太僕遴選中式者則嚴符劵飭司養以備三陲庸調或夷狄猖獗將士得馬長技則能轥轢成大功國初濬編甿馬幾千伍百匹春秋例上太僕者十之一有司以是為重請設丞一人主之訖嘉靖丁亥大臣議縣官經用大空宜捐冗貟節用奏罷可由是濬微部馬丞者十三年歲已亥復建官守而吏部推朔州劉侯適今任侯被命之明日冠帶入見今工部左侍郎上饒楊公拜且辭公曰濬某舊治邑東瀕大河故墟西連崇岡浮壤礓礫之原值暵則赤郊無草木潦則淇衛湓溢長澧諸陂澤汜濫渟滀湮禾黍壊民舍人將為魚鼈奚問馬今君臨茲土驅罷民以供軍國之需其必有術矣侯曰諾適治先陞任廣東道御史太原魏公今山東益都進士石公尹於濬皆嚴明不輕可與暨侯語悉合因竒其器而委之以政侯於是竭慮殫材勵精博施爬壅觧紛搤撮關要䟽排而曲暢之搯擢而延引之間見疊略令民貧富貸貰期約取盈唯其褒大於時故歲或甚絀而馬無漏一之患有以嚴刑說侯者侯愀然曰某儲貳有罪無罪惟長令在予無所用刑為遂不易其政而民愛敬之一出於忠悃用是見楊魏石三公為知人而侯亦不負人期望云歲丙午月日奏報侯陞興州衛後屯經歴先是侯著聞上下俱次第薦揚褒異極優禮及是濬士大夫聞之皆扼腕曰屈侯於其行無歌詩以道之是非納民大公考賢昭徳之義也因著詩以餞之曰帝奠民基在黎之陽河水三東厥猖以狂訖今千祀浡潏而圮禹蹟既湮金堤沙里右連積灉左介浮沙螭盤狨啼孰蓻蔬麻林有飢鳶壄有枯骴孰克乃來蘇我怨懟帝曰冡宰選侯視良俾侯來尸佐此大邫侯之來尸不遑寧食擢剔腎胃以蘇民䀌拊之姁之飲食慰之節之罧之砭而劑之凡我濬人謂侯予父侯有嚴程孰敢侯侮草之油油載彼郊坰騋牝三千齕之有聲泐溝如鳬積蹄如鐵碨礧連􅎸顧影驕齧浟浟河流雲霧晦𡨕簸蕩黿窟蛟龍降精行天匪龍行地匪馬羾此王國以藩函夏侯之為濬載籍有徴豈曰無糓乃有斯行驪駒在門攻車在路誰為長綆繫此日暮日暮柰何送侯河干願侯壽考億萬千年贈楊生序孟軻氏稱孟施舍之守氣以為視不勝猶勝也豈唯兵為然雖士亦用之夫士抱經藝適有司或不得其當雖屈抑頓踣而不能奪其操力愈攻業愈顓神凝而守固不動其心以挫其氣而卒全其技此老師大儒之所失守者是豈㓜冲學子所能練要耶是故幅巾而方抱操􅒀而摛思進有榘退有度翦綵組繢鱗綸煥耀而游軔乎文苑者肩相摩轊相掛也求所謂遇屈抑頓踣力攻業顓神氣不爽而卒其技者孰足以當之是非孟施舍之徒吾獨不得其人楊氏子某年未冠丁未歲文戰於銓衡失利歸而求之師覃研摭割馳精於翰蓺之林獵英於綺藻之囿愈益憤勵淬湛盧之劒求犀象而剸之挾軒轅氏之瑟合律呂歆鬼神以試乎清廟也是年復戰於開以大捷歸此夫孟施舍守氣之驗信非㓜冲學子所能練要者與夫孟明視濟河焚舟拜晉之賜曹子手劒而盟刷魯之恥古之克復舊物光顯社稷者皆敗衂之餘也今楊氏子若是非兵之豪傑則文之良將爾比其選余為之辭既以高其材又以壯其節且令懦者聞之有立志也贈常翁就舉鄉飲禮序三代養老之制唯周最備國老由胄子著通籍濡染之化深故其老昜尊尊亦不枉所舉獨庻老發跡鄉塾寡問學之道故其老難尊尊不得其人則隳憲典蠧風化官司有冐公之讓是故州縣有所尊則辯於士考於社諏於閭閻非上壽不如讌非資於故實可辯理而博物者不如讌非夫黜凡鄙崇嚴雅以極乎温恭盛徳者不如讌讌惟庻老之賢者始就舉焉嘉靖庚戌十月朔有司遵王制行鄉飲禮於邑庠諸生其偕鄉長老若干人舉北岡常翁如讌以狀聞濬侯陸公是其議届期賔介正犠罇陳升歌清唱琴瑟和鳴翁乃峩冠裒衣淵淳嚴翼誾誾循循陟阼階磬折之容無爽於度數夫是為盛徳之徴考軒羲之跡紀時王之典錯綜乎人文之變篤尚論以鎮雅俗夫是為博物之驗鮐其背齯其齒礥植筋骨熊經鳥視以隮乎期頥之域夫是為上壽之表夫上壽博物盛徳庻老蓋無幾也翁兼有之於是乎遂如讌浮丘盧子曰為政之道尊賢為上養老為要陸公治濬期年得常翁其人豈非賢令尹哉周廸以里閈之材與翁孫茂才遊能䟽其行丐余文亦世之賢也嗚呼尚矣辛亥歲孟春吉日盧柟序贈李伾巖遊太學序伾巖子將遊太學濬之縉紳夙友執腆幣入賀者幾數百人其内兄浮丘盧子獨病以最後至就坐伾巖子以巨觥觥盧子且懇之曰某不佞得侍兄通籍三十年猷順友悌無遽聲無苛色兄之待某何如也今某有筮國之行兄復惓惓然亦將何以教某盧子避席蹙然曰僕刑僇餘民也奚足與有言雖然抑聞之曽子有曰狎甚則簡莊甚則不親故君子狎以勸交而莊以成其禮吾少也於子甚狎今長且老請濟之以莊何如夫聖人之道廓之則體夸散之則用細夸盡而細遺雖大不行命之曰曲士其說有似於奚仲之為車正也夸與細偕乗之以慢心焉則備行之業荒命之曰墮士豢龍氏法之故其術衰行成業修由是君有所弗砥於治也民有所弗潤於澤也命之曰棄士公孫僑恥之故獨著夫夏后氏以奚仲為車正也輈􅀈輪輫之屬備獨亡鍵駕之使行則覆焉不進尸子曰文軒六駃無四寸之鍵而車膠者小亡則大者不成也豢龍氏好龍求其嗜慾以飲食之未幾志怠龍亡去鄭公孫僑者博物之君子也與子皮俱事簡公定章服比井廬備火政應對辭命雍雍揖遜於大國之間西平晉南禦彊楚卒保鄭國孔子曰子産古之遺愛也伾巖子能以奚仲周於事豢龍氏儆其廢公孫僑懋其業於戯太學吾無足與游已贈陸侯擢官留都祠部序癸丑夏南都祠部王政闕貟大臣議以為是部典秩所出宜簡授材俊以稱禮讓為國之義於是冢宰治齊萬公列侯名以聞上可其奏卽日馳驛馬齎符促侯履任其少尹徐君夣龍叚君瑭幕史初君學禮設祖帳於黎水之陽遣使丐余文謹按侯治濬其邑西鄙馬湖長豐諸陂澤田歳為水所没者三萬餘畆侯至則命賢佐鑿渠㳿其水於河民始耕穫逾年計得利數十萬斛歲飢倉廩不繼侯請貸於郡守不可侯曰縣之民非郡之民耶守語塞予之粟千石是年秋乏種侯又權宜處麥七千石助民播殖之民以垂亡餘得自立飽食思有所致效莫不流涕感激相率力以奉侯命由是雖大㐫歉而溝壑無轉徙之民焉濬靡敝傳置無所供上官取便道徃來侯輙不應以是皆觖望去三年蠲費數千萬緡民不覺利而侯亦無所訾哫若侯者為民任怨是豈當世循吏所易及者耶虜窺京師侯謀於士大夫察便形勢高深城池樓櫓觀望制勝於千里之外有諫之者侯曰賢者制之不肖者守之後蓋有知我者吾何恤其臨治首先倫彛修葺學舍殿廡時時課諸生講習然皆自振奮丕變斐然有可觀蓋侯寛明亷仁不事苛鍜處大節尤擊斷無所顧避故有此治效爾嚮時鄉耆馬質魯輩不忍侯遽去率其子弟數百人詣闕上狀留侯如漢人借宼恂事天子下其議至是復以侯屢被薦剡義不可乆淹擢今官吾以為禮官人必先之以論辯任爵之道然後進之有漸别等威貴賤上下假於人神以享乎清廟爾使治政未協遽凌之大位則其人必喘息頓踣䝉負乗覆餗之誚今侯所措立赫赫如是而其績又已升聞于上行若所職其功名事業又何止於治濬也且䕫龍在位必將與侯同寅偕力以光輔主上三代之英翹足可及也侯復何所疑南都去侯鄉甚近而封君胥山方切倚閭之思侯歸而以此獻􅂰下以恱其親享億萬年無疆之休而柟誠有所望哉送高少尹致政西歸序嘉靖甲寅歲關右高子以濬少尹亟致政於有司有司謂高子能賢絶弗去踰時高子益自陳懇懇乞罷御史馬公以聞得制可歸焉其同寅大同叚君福山高君張祖帳南門外奉辭於令長右坡董子曰少尹在願大夫行事大夫颺觶前高子曰嗟乎夫子奚若是之行也吾請為君擇言高子曰唯唯大夫曰竊聞之濬衛舊邦左大岯右河黎南走梁宋北距燕趙形峻勢固河朔之雄君佐治三年民無怨嘆之音而士夫重儒雅之望是故行李告戒則閭閻閧然脫􅆖服要旌竿戴目仰首願留斯須而卒不能遏屬騎之清塵意者君有不殫之懐與是何果於行邁而莫之恤也高子曰然大夫曰燕雲之闕京室鬰起三事五侯貂珥之家人摩肩車掛轊紛紛紜紜霧麗雲綺日夕沓雜笙鐘鼎沸時序代謝不知其逝夫聞長安之樂者西向而笑過屠人之門者嚼吻而徃君之意既有所歉故其去者或在是乎高子曰否某雖陋豈敢望外事大夫曰鵬摶九萬非南溟不足以戢翼驥馳千里非荒阪不足以捷騁故太阿之劍必斷犀象明月之珠不照蔀屋何則治大者恥侵細窮逺者惡施邇也君負高世之姿被下僚之慙張敞自謂無竒東方生故設客難以今揆之殆不出此乎高子曰否吾不是為也大夫曰岱馬嘶北越鳥巢南橘柚不踰淮鸚鵒不過濟故夫莊舄寫東甌之唫鍾儀服南楚之冠君雖通籍王臣鄉土之思能無少攖乎高子曰否男子以弧矢射四方吾不為此也大夫曰琨璐之寳豈池隍之毓琅玕之樹非園林之株臂鷹垂思於觧韝豢龍逸神於頓轡是以莊周曵尾塗中不為廟堂之龜子真遊心物外躬秉巖石之耒君乆膺纒冠冕脫屣之意廼今為之兆乎高子曰否鄙人奚足語此也然相其貌宇氣溢廣顙恍乎投刃大窽矣大夫竊視高子之志已得六七遂恢曠其說以進之曰大道無跡其虛太空君子察理微之有形日中則昃至月盈則晦來膏之見銷明為禍胎蘭之被爇實香為災知機以運神執左契以馭物恬身以退蕩放予志以自徃樸吾樵漁文吾詩書盱盱于于瞿瞿喣喣孰謂之宗以天為墟故夫庚桑順化不釋於老􅅨之言王倪坐亡無見乎齧缺之問君誠徃寧復有他說乎於是高子躍然而喜曰葢大知識夫大賢要妙之辭足以破我矣因酌酒與大夫别折衝巻後序銅梁張公守滑之三載未奏績輙陞北京戸部主政期行王子大伾侍御孟子思汝再劉子炤文昭咸詩賦以頌之而其事則擒盗繕之則折衝巻或誚之曰張公蒞政特折衝也邪張公雄儁惠裕足智量觧紛無梗縻境雜軍屯田而其長又皆武夫儳僈獧􅀢乃張公則仁覆威約之有弗敢背畔去者故其經務剸蔽藴利乗時推化與民偃息天下稱最焉未幾河南賊師五亂修西城樓保障廼感嘉禾明年饑大賑民生活者萬計御史馬公亷其能疏上天子嘉之詔賜銀十兩纁一襲所在有利徃勞夫張公雖不由銓考此其譽已籍籍升聞奚以之奏績而後擢也由是又惡用夫折衝巻所云張大乎哉柟曰不然夫萬物對茂無可稱名廹冬則松栢獨也其色青青是尤擇夫異者邪今之大夫從政規廟略樹竒功者無不被召命夫張公政雖美猶夫大夫也張公折衝不猶夫大夫也初張公視事忽二人稱錦衣馳入挾之以匕首要萬金丞簿未入義農未見䝉鍤荷畚之夫未進公乃孑立與伍於存亡噓噏之間啜杯茗溢言笑坦坦訑訑神色無變而卒以計縳二盗設使諸大夫處此吾未遽見其得如公否也嗟乎聞震雷者失箸突麋鹿者目瞬駭投璧者按劒志不足以禦氣易䘮焉耳矣昔曹沬手刃於柯齊侯色懼毛遂頸血未濺楚王與之盟彼二君者豈非張公罪人哉傳曰三軍可奪帥也若張公所謂不可奪者矣柟受知張公既乆乃因兹巻槩序其折衝之義於諸君子後然而未悉乎公爾則亦不忘乎公爾為孫兩生贈張㠠山擢曹郎序太史公曰韓子稱儒以文亂法而俠以武犯禁二者皆譏悲夫儒者顯易見俠士之不偶可勝道哉設有慷慨奮世少有取於俠士者去之日又不得杯酒彈劒以慰其悲歌别離之思是葢有數焉不可逃非苟而已也劇孟任俠呉楚反條侯乗傳車將至河南得劇孟喜曰呉楚舉大事而不求孟固無能為矣夫劇孟布衣耳見知於亞夫豈易言哉今年夏濬兩生孫紹芳傳芳詣予指其從子采曰是父吾先兄承芳以俠聞游燕趙間嘗一應募塞下捕虜首功還射於衛沙中滑侯張公過望見承芳召問力鈞石兄卽以􅃓許之未幾疾病屬後事目壁上鞬曰必以是贈甚勿令我食張公􅃓卒僕奉其弓徃張公曰噫俠客哉翼日臨奠為之哀乃返今張公擢北部主政届行乞為我辭何如盧子曰游俠之徒投分歴肝重取予然諾徑徃不顧千里稱義挾聲名雄郡縣者非承芳之謂哉昔孟嘗春申原陵之徒皆以王者親屬藉卿相之富招天下傑儁顯名諸侯張公以郎官之貴為匹夫下弔方之史所稱忠信賢豪者是耶非耶諺曰蒼蠅千里卽附驥尾夫承芳所謂附驥尾者非耶然其行必跈其誠必遂存亡死生不易其要而所望張公者奚若今車已發軔曽不得為鉤鍵天之厭毁斯人不已甚哉張公見徴廊寢澡易思慮僶俛以自立陳匡勲庸施之鍾鼎其榮著可量哉是猶扼腕嗚唈引領不斁者也昔昭代之士唾手取功名歴臺省鳴珂鏘玉乗欵叚馬朝夕從容出與張公遊或有人避地而處之上下不交冠履頓絶拾草菹節粒與雀鶩爭食卒不得追希高蹤如承芳類者何可勝算也竊甚悲之然猶以為性也有命焉又何怨詩曰緇衣之宜兮敝予又改為兮又曰蔽芾甘棠勿翦勿伐召伯所茇鄭武公為政人愛之及其衣召伯循行南國人思之不忍戕其樹君子樹厚徳重愛與人人未嘗不以徳報之孔子曰以徳報徳於戲鄉曲武斷之士修俠砥行其所攀附不如張公者惡能垂譽天壤哉予素知張公者於是因兩生之請而寓之以言善政實録序傳曰鸞鳯諱枳棘而百里非亨衢此言易喻而學士多稱於世云殆夫以儒術起家立卿相翊贊其主上垂勲竹帛與三代賢者顯名此非偶而已也古今事何可勝道哉至若朱邑召信臣葢閭巷人爾其為嗇夫上蔡長襃大如長者亷平不苛以愛利先物所居見稱述故其去之日謳歌見思而二子卒以大司農少府九卿著若是百里信易籍枳棘何負於鸞鳯哉今人翫習耳目即有良二千石若長令不合於時乆而弗調者遂指為口實此即虎豹在圈應龍盤泥沙昧者謂其絶文威終不能登天澤雲霧而雨四海者是不可大哀也邪嗟乎難言哉難言哉君子於賢者之不遇亦可諒已愚觀董大夫蒞政行事未嘗不扼腕而嘆也初大夫銜上命尹濬而其俗好氣任俠射機利一切猲獢不均則誶嘯而訟之丈夫相聚不得則瞋視怒詈相豗繫休卽六博樗蒲作機巧行娼優女子則彈鳴絃跕屣其謡俗猶有衛之風也大夫曰百姓之行淆在上者汩其源爾於是先學宫建青雲樓勤博士弟子員職業日省更定殿最覈名實邑中婦人賢而有節者不時問遺米鹽衾襡征戍丁壯分翻武呵於鄉里者趣寘之法不敢復誰何民間先是徭法倚重民多逋負大夫料民産率平易使自占占亦無所隱而復増益數千口白寺長豊諸陂多積潦没民田大夫循行澤間眡地洩水勢築金隄防之歲饑粟石千餘錢吏懼不敢白則大夫卽上還報開倉賑給以紓其敝田中官馬臝多水草不任乃下令禁馳負畜益貢内必得賢屬吏徃計上之其敝獄必悉情稱法必及典章民自不寃以報大夫大夫亦樂民之弗寃也時時益自勸所部鍾寺野多蝗隧師未及捕有異鳥羣萬自天下食之殱顧以後沃其禾弗灾衣冠之士重亷恥黜奔競持重而矜節閭閻之間休息安堵相忘於耕鑿洿貫之習一變殆盡嚮非大夫徳化深至又曷能歆動上下若是也今年冬大夫將報政於天子夫以大夫治行宜擢之以不次然猶竢夫三載考庸者其㫖甚未易明也大夫宜自信而已卽入天子問君何以治濬大夫對如王生告龔遂者曰皆聖主之徳非小臣之力也則天子數其績恱其讓尊顯大夫必有如渤海者矣舍人促裝行將祖道北門外大夫誼不得自序其績乃縣官弟子某等若干人傷大夫之賢不早大用於世也遂撰其跡為善政實録以自附於太史氏若為大夫立祠歲時祀享則問之父老或亦有取於斯録也大夫姓董名某字某癸丑進士河南鈞州人碑濬邑石侯碑皇帝即位乙巳冬十月山東益都石侯茂華字君采以進士來尹濬御史按是邑者考侯政異跡屢薦章報越三歲已酉吏部尚書萬公疏侯治能以聞天子嘉之授侯戸部貴州司主事比去父老咸扶杖流涕爭取擢軿幃牽裾凝視侯靣目遮道請曰侯何徃我等得侯如父母育字腹㝅是頼奈何忘我怛痛遽舍去侯何徃侯何徃是時上方嚴命促侯不可留遂去後人益謳歌思侯壬子歲邑耆老某偕鄉民若干輩議為侯立碑以永厥思乃盧橋氏從徴予文竊惟濬地北沙東鹵西簿長豐泊白寺諸岡緜絡塪嶮熯卽焚如或時滛潦洳漸濘溼艱於蓻樹賦煩政擾訛謡繼煽民將轉徙維侯下車省視方略磢制汰度夷阽險日融春煦薰蒸既至衆廼大固先是太原魏侯鈞賦已久媮偽滋甚侯將事預請監司受牒之日出宿佗舘飭部吏諸不得有所關白羸精魝思推誠萬夫鄉胥史保罔肯誑悖丁口息養輸不下萬計明制十年覆籍民縁為奸貨賂交至侯多方裁革老吏咸咽􅎱白手無一錢御河水漲自淇門東下汩汩走百里没民田舍侯曰防以制水猶墉以禦盗墉可乗奚盗之禦於是築堤距丈廣如之命監者曰明年堤潰罰若役以償由是堤完固無漏處河南賊王經率徒幾千人刼掠於延鄆曹濮之間渉侯境侯宻出竒畫掩捕禽殺之侯為治務大體不拘小節人有過即不問再則决責之無少貸外峻内仁在邑三年無苛忒之行是以民有恒業公鮮逋負閭閻之間生長孳息日益蕃殖今濬或載有稱舉輙曰某事侯所建明某事侯所罷斥其治行類為人所愛慕如是嗟夫中世縉紳以官為已私挾聲勢蠧民徃徃見惡於世人唯恐其不速去故尹子心治長安惡少年爾史氏已不少假籍其復何有可愛者即令他吏能善又皆見愛於臨去時獨不知其後果愛與否今石侯去濬已四歲而邑人思之為刻碑是豈兩漢循吏所多見者哉因為之贊鑱諸石以紀其事辭曰維康侯建國于衛徳愛弗匱享祀永乆嗚呼邈哉詩稱蔽芾甘棠勿事翦伐召公之徳懋著於南土石侯以山東名族割雞茲邑翼畏黨敏寅亮天工斯民懐賢勒石頌徳其殁世不忘之意乎使侯後時乗風厲響享高官巍爵致身台鼎輔聖主流治化垂聲名於千萬世者顧不在是哉顧不在是哉滑令張侯碑蜀之先黄帝之裔其孫揮好􅃓矢主祀弧星因以張氏故張雖子孫遍天下獨銅梁之張為近始云侯繼其胄名佳𦙍字肖甫以嘉靖庚戌進士來尹於滑先是靈寶彭公蒞政治效循良侯紹前烈克勤克慎飾化竟務天明地徳光照四鄙甲寅歲乃感嘉禾數十伯本侯為起樓濬人盧柟作賦以紀其事臺史持節察其才能逯繠薦剡乙邜夏四月召拜戸部福建司主事於是老弱隨號創悼崩痛攀轅持轂横當車軔遂强喻間去次於黎水之陽百姓欝邑思侯其父老秦綸等將表生祠如桐鄉故事列狀先請勒碑傳置予好其欵為辭以慰之曰㠨伊岷嶓徹滛開陽鯀湮禹𨗳大陸昌傳山嶽降靈精氣旁魄拂欝瀜擾鍾之於侯膺碩敏之姿懋天人之萃以躍跡於魚鳬之里北遊京師灑然釋褐帝心簡在授以是邑稅鞅弗遑折節皇術撫循耆舊問民所虐痛水火貿算衡石輕重抉剔薆壅敦㥶龎固靡不䆒極但邑故洪河之軌西塹白馬東侵瓠子沙灉墳薄萑蘆横翳高下鉅湮民用蛟鼃大歉未竭癘疫踵至夭殤札瘥之厄家纍巷哭逺邇交望侯閉閣深自刻引奉職無狀傷為流涕廼延庻富裒列差等以相助籍然又命岐黄家寄以生死選開方藥洒濯燋爛憂思勞瘁逹諸靣目由是民生活者葢不下數伯千計廵撫艾公特章以聞上異其績賜之纁一襲白金十兩邑境軍民淆處閧嚚詐牒雲擁山峙兩詞俱造龍蛇隱形聽之人無不扼腕者侯不事鉤鉅片言析理應機立斷訟者恱服侯為國家均徭恐攖夙弊乃内設方略外示䟽逺舉事之日霆發鷙擊里書錯愕不易晷而占丁口幾巨萬明年睅虐甚侯徒歩禱雨出二十里外比返甘雨隨澍歲卽大穰侯恥邑乗湮滅治政不著則綜核史載章具典明成一家言以凌轢遷固先是燕人有任敬高章者詐宻㫖挾匕首以千金刼侯侯形志晏如神生智長不渝刻蹶二盗於罇爼之間逺近聞之靡不頷首濬尹平湖陸公平政愛民嘗城濬民戴之如父母侯謂陸公曰滑與君邑實為聲援而其城睥睨􅀈壊不幸有變若臨以衝車誰吾與守於是易之以甎基殻廙緻與濬城等時邊人猖獗河北諸鎮大城小邑為之惴慄獨滑屹屹恃以無恐若侯者將不謂為今之長城哉侯白靣少髯温恭懿塞遇大事則雲蒸雷奮果敢不避譬之青萍干將隨用轉利無施不可翠黄汗血之馬翹陸歷塊不崇朝而致千里矣侯之休光令聞垂之竹帛夫豈有既詩曰蔽芾甘棠勿翦勿拜召伯所說邦人思侯何以異是哉因為之刋石稱伐以盡銘贊之義其辭曰梁益之墟粤惟坤維金精麗天哲人與期豹變龍升千載來遊於皇景運寔命於斯作帝股肱慰民雲霓興伏頗峨發􅟨殊肬智攄神殫紛自化裁人安物阜厥惟侯哉悠悠白雲似侯之斾我欲從旃閩海増波海波不増侯舟沛嘉青翰赤羽載遊載開遵我滑土以紓我思福禄自天維侯克配滑縣東城門見山樓碑滑古顓頊之墟隆安中范陽王徳㨿之名為南燕天造鴻紛雄圖割有或登或叛仳離反復世代不絶故漢酈食其說沛公守白馬之津以示諸侯形勝之勢曹操亦遣關公刺顔良於邑北魚池里河朔有事爭城以戰議者必以滑為首乙邜歲上海孫侯以新淦令起服來蒞兹土明年丙辰島夷入㓂瀕海諸郡汀漳延邵乗勢偷攘腥風虐焰煽動江淮土著之賊潛發肘腋揭竿斬草誰何於延衛之郊侯行邑至東門城闉傾軋飛堞危觀寢廢弗治廼喟嘆曰易稱王公設險以守其國周官掌固修城郭溝池樹渠之阻今滑如是卒有兵變其誰為干城耶特部行事官師人卒鳩工建謀隱略基址舀授財用斪斸板幹材􅃮縚堊瓴甋之屬靡不纎備乃肇窮臺爰始磐石連絡磚甃闔扉落時櫽以金銕旂牙劍壁虎豹雄踞䡾䡾崯崯矗如山嶽上建樓四楹輪廣高下法制應圖浮柱連櫨雲征鳥逝雜遝複疊若元氣搆天方地承輿乗墉敵愾萬夫奪氣丁已三月旦落成侯暨僚佐酒酣登覽前引鄒嶧後擁太行左大伾右石丘四山環繞雲霞映眥侯顧諸從事曰美哉兹樓之觀名曰見山何如衆謁之曰諾凡此役不干時而績已懋著帑藏不啓民享遐福帝心克厭嘉社攸傳風雨時至品物滋潤士女商賈載歌載詠鼓舞忭笑充滿路衢非侯盛徳何以極是縣丞王錡王文輝主簿黄甲典史謝鎮等遂劖隆石銘勒功伐垂號永乆以風來哲其辭曰鬰伊殷墟奥區蕰隆白馬作鎮黄汗瀆停四隩匪宅三民告愴戈矛横騖若騫若烹哲侯來臨温恭爾雅緇衣逶蛇有斐君子行城循隍東門告圮啓閉之菑孰不覬我侯曰噫嘻斯誰之尤匵篋見毁龜玉以偷爰召耆艾爰諏爰謀敬爾挿畚郛爾有家京臺既起飛甍既㑹積石鏘鏘威儀隆嵑撾此羯皷建彼雲斾百城之特萬里無外康衢井井乗夫嘽嘽飲酒謔笑樂此喬關孰能為是介帝雄藩孫公泰宇億萬斯年檄大名太守移州郡讓農檄歲壬寅月日大名太守某檄州郡諸父老曰某不佞膺天子寵命來守茲土作爾邦長牧爾唯雍熈實守之休爾之弗克若化若育唯守之憂天命民隱上下寅畏予豈唯夙夜遑遑哉先是予踰河徂蒲抵陳留界道遇流餓控訴屢極俾予心有戚戚焉夫為民父母行政令其子弟老弱轉徙溝壑而莫之省􅡣惡在其為民父母也曩者渉冬燠温隂陽奸忤使其民大無麥禾后茲雨雪有濡澤渥后土陽癉湓溢黄膏流懋然而農事未講也方是仲春檄爾諸父老其悉心聽之曰繄唯古昔聖王踐大寶垂鴻猷馭天立極匪唯􅃓矢戈矛取威定逺足以示武也匪唯城郭溝池飛堞楄柵足以固險也匪唯法象圖數足以應天也匪唯典章足以約民也匪唯黼扆圭冕兕虎鮫韅彌龍豼貅足以章制也易稱耒耜書載璿璣玉衡用齊七政詩詠豳風春秋書六月雨周官太史順旹􅓊土贊王耕墢庻人終畆凡此靡不以農事為首務爾諸父老附山澤依阡陌負暄曝背顧弗躬率子弟深耕力耨遂令腴腯封壤墝埆弗易榛蕪延蔓使水火之化不行夫然後上違徴科之令下凍餒其妻子貰貸不足則棄鄉里背墳墓散而之四方使其廬狐狸為穴鼷䑕跳梁蓬藋横翳過者指為丘墟不亦悲乎且夫恒産所以養恒心也以故子弟多孝弟使無恒産爾欲使子事父弟事兄天懿無犯者得乎哉夫天不秘其寶地不藏其利盡天地之能而利用厚生者存乎人爾父老惰其四體五糓不分極之流離困苦而後憤怨天地咀呪民物是惑也夫麒麟鳯凰苞彩翩􅀈不足以充餔球琳瑟瑟碧珠琅玕不足以供炊沙棠桂㮵揭車之菁江茝之英芳香酷烈不足以給㸑爾父老滛習竒異急於耳目之所難繼顧不近取諸舉手投足之至易者何耶夫考𤣥索隱探性命之賾談天人之藴者士正行也靣方眡勢制器尚象極􅟮工之能者工緻考也積貯市㕓行居貿販以供征榷者商通經也而農薉其疆里舍其鏄耒徜徉出境何所事乎且予聞庖羲樹蓻五糓肇始也唐堯平秩東作重務也有虞敬授民時勤政也夏后成賦中邦則壤也夫聖王崇高富貴方且畜之樹之翼之播之不恤胼胝愍愍仡仡如是爾父老悾恫顓䝉頑而居約企視聖王萬萬不逮而顧求所以過聖王者是邪非邪予又聞周制九年耕餘三年之食一糓不熟曰饑二糓不熟曰饉三糓不熟則國非其國書有之曰民非后罔戴夫民以衛國也國而非國誰之咎與曩昔吉囊窺夏大入薄侵太原之墟積粟殷陳卒老其師以挫其鋒仍致大俘向使投鞭河山以東之國農務既弛杼柚其空爾之子弟化為􅧍羶爾之妻孥披髪左衽豈唯餓死溝壑委骨函夏而已哉方今春氣融龢爾父老其親率子弟躬耕􅅵畆者故喻對對衛大夫問衛大夫問於盧柟曰聞滑令張君肖甫以才量僨二虜先生越境逺唁謂非馳辯以詭世與何偃蹇誻刺之已甚也盧柟莞爾而笑曰然誠有之大夫固以此誚僕僕亦誚大夫之未盡善也請復以所聞楚王好康瓠委積如山三年不收而化為鯘好黄支車渠帑之以䋪縞好周之彛商之鼎夏后氏之龜𤣥纁十襲藏之秘府朔旦有事必齋戒沐浴而後敢見其物益珍愛之益貴非獨人為然鬼神亦自有之也是故黄帝張樂洞庭之野享山川洽羣神臯揺乎層霄之外夫瓦缶之音奚足與之感天地哉歐冶子鑄干將之器泰乙鑒壇飛亷鼓槖雲霧晦㝠升降乎上下夫鉛錐之末豈能與之動造化哉非獨鬼神為然士亦有之也夫君子鍾山嶽神秀崛起佐世將銘功山石雖少膺險難而神明已禠其賊夫草苴之智抑安知天之所為哉大夫退曰先生行予小人也誠不能知若事傳申氏傳周道微而棠棣之詠興晉室衰而揚水之賦作先王立教始之義詳著於飲食慎宻於閫臬非苟而已也將謂親親之道足以昭逺逖而聯疎梗也敦天誼齊民情比之以里閭同之以鄉塾締之以姻好交之以社臘連之以溝洫㑹之以井牧視患難疾病而差相弔慰鄰有䘮舂不相里有殯不巷歌先王之教民淳風懿俗亦甚厚矣哉及其既衰離父而居背母而炊違宗黨而贅富室竊娣姒之資而充婦屋蹀血裂眥於鉏耰井臼之間官長歲敝於庭里胥日鉗於市由是亷恥之道䘮禮樂刑政之典闕矣濬鄉鄙民申銳弟遂嘉靖初俱析㸑以處役力阡陌給食耒耜備養各適其力以撙節恭儉教子弟畜雞犬黍釀待賔客儲粟帛以供繇賦渾樸同塵偃仰村舍雖泰古之民日與草木禽獸媞媞相處者何以過是哉銳卒戊申歲距前異業時約二十餘載銳子文選遂子文進各以材給為府縣掾屬言動法於宗族行能飭於鄉里聲譽昭於士夫不謀於私室不議於朋友二子各奉其母還合前業廐無異馬用無定器衣無常體奴婢無卒主歲時雜拜堂除飲酒稱壽愉呴懽欯以娯其母鄉人貶刺則笑甚則拱而退故當時聞者始則斥中則疑終則賢之樂與處民間子孫負貪嗜財産者率直之以鍾寺申氏而先王設里閭鄉塾姻好社臘溝洫井牧之教其義於是著焉浮丘子曰孔子有言禮失而求之野先王典禮草茅所未習若鄭莊魯桓諸侯之貴獨於兄弟不少假焉者何哉有能繼聖統紹易傳法春秋游志詩書禮樂之際而既得其意者予何敢誣焉申氏先人循民俗異土託處亦古人裂封之義至其子孫能忘町畦合室廬絶無忿悖乖爭之意其視尋常不亦倍萬也哉詩曰刑于寡妻至於兄弟以御于家邦申氏殆庻幾矣讚張公讚夫聖人明時而變化賢者承運以立義故象緯之數物理之化造性命之微極情文之藴有非洞𤣥源發真閫者不足與議也唯至人者約天地於毛髪摠天地於肢體通之為川塞之為淵升之致雲雨下之澤膏土是故傅說版築卒相高宗尚父漁澤濟顯牧野此葢乗風以振響與期而流福澤所以神變化也子胥浮於江大夫種滅於伯屈原沉於汨羅賈誼沮於長沙馮都尉老於郎署此葢明世偕否各適其適不亂行以溢志不徼欲以叛道所以樂命運立義制也安陵張公為濬三年治政亷平百姓讙誦未幾以病三致政於有司得歸嗟夫此非微於變化篤於立義者與吾聞張公有言曰榮行不如適性兼任不如守約夫進則仕職得聖人變化之權也退則樂行得賢者立義之真也易曰君子見幾而作不俟終日張公以之矣苟曰上下易方台衡有司易遜張公陸沈宜若不相及然葢不知黄鵠一舉千里斥鷃翺翔蓬蒿松菌同斃彭殤齊年此皆逹天地之化忘物我之觀者也且夫李斯嘆黄犬邵平匿東門張湯載以牛車長孺没於淮陽董賢赫於成室楊雄隱於太𤣥何得於彼何失於此哉張公非台衡之任則有古傑士之行其陟泰山踰梁父跨溟渤尋務光揖㳙子御六氣之辨而遊造化之外也余何言辭故濬尉靜菴蔣公哀辭公諱某字朝用世為登州棲霞人自公以上至曽祖大王父皆以端慤直方見重閭里然亦不大顯公生年十六以明經補邑諸生遂籍籍有聲公年少負盛氣逴躒魁絶探賾經史諸子百家之學浸貫濡潤深入閫隩人有測之者淼涵渟泓渺然無津涘可窺至其為文則洪放愽衍紏㳫搯擢描寫古今人物治亂日月列星水火雷電山嶽河海鳥獸龍魚菑祥事誼變態無不纎備一時朋輩咸貼然推公稱首嘉靖初有司以公名貢京師天子庭試中式例卽教公􅀈然太息曰某讀書當拾取甲乙科第益自奮㧞樹功名見用於世卽不遇則已又安得逺名流齪齪與壁魚蠧簡册中乎因拂衣去遂病風癎家居十餘年丁未歲或勸之仕辭以疾既而曰官無崇卑以盡職為能孔子不羞乗田委吏急為行道爾始發軔詣吏部補濬縣簿時山東毅菴石公以進士宰邑事政精明吏無私交上下斬斬端僚讋服公與之言咸中委以政公廼觸微洞姦椎堅疏壅治具張弛民咸懌恱未幾公疾發大寢濬自縉紳大夫下至圉臺司養之士偕走交致醫藥朝夕唁吊無懈明年春三月癸邜公卒年五十二嗚呼登州距海數里海中多山穹竒黛碧而貽貝玉珧珠蜃之屬徃徃依附興吐雲霧變化城郭樓障船車旄纛旂幟其靈異之所窮盛之不踰則鍾而為人必有忠正文彩琦瓌之士生其間若公者殆非所謂其人耶或者疑公之事業不集早見厭棄謂其靈異所感神怪虚幻以為華而不實之驗若伯夷魯仲連晏嬰田横雋不疑薛宣匡衡公孫𢎞逢萌皆海濵賢豪是何清淑之氣特盛於昔所謂神怪虚幻華且不實者獨嗇於公耶識者必為公辯云因作辭以哀之曰夫何東方之大人兮矯烟霏而翺翔軼游鑣於扶桑兮㩜若華之朝光被雲霓之錦裾兮倚閶闔而延佇顧余心之侘傺兮歸弭節於海渚茲幽蘭之芬蕤兮悵愲鬰其誰語永修姱而匪遁兮曰予竢時而輕舉擬南昌之仙尉兮躅衛上之清塵視康侯之先軌兮霈洪澤於蒸民翼岡陵之弗墜兮願徼福於鮐耉何造物之膠戾兮俾梁木之先朽歲涒灘之吉辰兮揚翩翩之素旄騑馬哀鳴以四顧兮悲風起而長號指青兖之修阪兮君於此乎逍遥送予懐之悢悢兮擬江南之大招誄滑尹張㠠山祖妣哀誄嘉靖三十三年三月十七日滑明府張公祖妣大封人訃報至濬盧柟素衣縞馬聯詞越境就其主再拜哭且為之奠禮也羲月罷彩哀雲結觴庭瘁纎柯池凋素芳痛泉室之永隔悼蕙帳之如存想殯位而軫念撫靈衣而霑巾國藴閨彦之思家墮母儀之泣輙興辭於下陳翼旌徳於罔極其辭曰渾胚既魝象緯殫形式維綸紹肖以儷營緬彼岷梁閥閱締礽蘭光啟度金魄降精鍾兹美媛於蠶之里竒馨苾馞豐靄迤瀰㓜而嚴凝長則斐亹棲景昭華應圖女史待年既至比跡乗龍玉䈂載珈瑇揥有容如山如河象服是崇懿此昌軌惠我王風鵲巢既居泉水斯賦孝先蘋蘩敬惟保傅陳詩挹藻彠禮思裕展如之媺緝其永祚兆運冢嗣發祥元孫岐豳蔚鳯㝠海飛鯤影礴方輿聲蔽崑崙芳猷殫著義訓聿敦閫闑風清簮襦霜屑春融宗婣秋照臧獲弋綈在御紛華匪恱壼政淵宣隂英之特造化沕穆斡流變遷氛翳畫晦䨮散宵捐玿質既毁瑶魂無還隳音虚漠佇綵空烟嗚呼哀哉閨扉晨啟素帷夙開䀀醖微陳槃飱將頽􅀢銷殷沃裷組䯱䰄遑遑有求莫之能陔嗚呼哀哉鵜鴂鳴兮黛草殘秋風起兮變羅紈音容靄兮長夜暮金膏滅兮華簟寒雲仍擗其號咷私倩痛而汎瀾顧視天之夣夣雖蹈地其何攀嗚呼哀哉大漸斯臨四顧彷徨執手唹唈神色沮䘮願遺言於白馬沓萬里之莫將卒飲恨而長逝寄永愛於琳琅㠠山之岊巴水之鄉壘馬鬛兮啟𤣥臺綏靈寢兮壽黄腸諒佳城之不可渝兮享千萬世之休光嗚呼哀哉祭文祭李復齋郎中文維嘉靖三十二年歲次癸丑十二月癸酉朔越二十日同邑布衣盧柟謹以少牢庻品之儀敬奠於故河東督轉運鹽使司副使前工部營繕司郎中李公之墓再拜哭且告之曰嗚呼士有慷慨悲歌杯酒彈劍意氣相傾者少罹􅀈患即為之决胸臆刳心膂痛哭流涕無已者則其心為何如邪若廼掊鎻裂垣澤及枯骴權奪造化之私惠洽茂育之徳公其視慷慨悲歌杯酒彈劍意氣相傾者有間矣一旦天隕玉棺世䘮遊龍逝川莫返大夜長扄琴軫雍門之調歌傷蒿里之音其罹禍患顧謂之少邪即令僕不為之決胸臆刳心膂痛哭流涕無已者是不可得也已昔公首宰咸陽繼佐大郡𨗳河治民何若風采官曹擅兩部之英王命獲三錫之顯古稱良吏若趙中大夫白公魏西門豹公豈遽出其下哉既而權奸扇仵詔獄逮加公獨處之晏如謫判寧國人固以此高公矣讐者銜公誣以他事去公官公之來歸一無愠色教子課農容心澹漠此豈愁慽嬰心汲汲於功利要勢者所易及邪始僕被罔在獄公於當路曲為觧原當是時僕貫三木負明刑葢不知公果能出僕公亦不知僕之有今日也今僕既出乃公之墓木已拱把思為公陳視形魄伸展衷曲極平生寃頸頓踣之苦者而今不可得矣且公之葢棺幾時也長掩泉壙幾日也未亡者尚不知公之亡矧公之既亡又安知己亡者今復不亡邪公邪我邪乃大變邪抑亦恍惚不可為辯邪或謂禮䘮者之墓有夙草則不哭公之塟已久而子哭之或失之緩審如是僕前所云云又何為邪夫哭之及時者物理之精不可哭而哭之者吾道之窮公之靈憑日月騎星辰御六氣之辯以浮游於兩間者其必有鑒於斯他復何論哉祭晁次山翰林文維嘉靖三十四年歲次乙卯三月丙申朔越十有二日丁未濬布衣盧柟謹以牲果致奠於故翰林庻吉士次山晁君之靈再拜哭且告之曰嗚呼次山君少年起甲科登翰苑聲名籍籍於京師方二載未幾棄世長徃天之奪君亦何速邪次山鍾毓竒秀風思俊朗讀書渉瀥瀚無所不至肆之詞翰僪佹瑰琦若周之鼎商之彛陳列左右渢渢乎如朱絃洞瑟升歌於清廟也識次山者謂其材鴻氣固為福壽之徴乃一病洽歲體孱孱而憊心􅀈􅀈而疢脉理不治卒骨立以死者謂之何哉昔次山以事如州治余時在論貫三木金鐵匍匐道左君睨之曰去余竊望次山額角骨隆然􅀈髪豐頥竒歩逺視夫人貌六法象俴薄者弗壽倠而横蹙者弗壽殙囘闡謾神不櫽括者弗壽次山形宇超曠宜躋遐齡而顧不永年者吾葢不得而知之矣說者謂麒麟鳯凰不久畜於家卿雲不崇朝而散希世之寳造物者所愛夫次山固天之至寳也既生之而復取之則亦何怪耶夫不可怪而怪之者吾又深痛惜乎次山矣嗟乎次山余刑僇囚傫也以君父子再覩日月是死者復生生者反死將謂天道為不爽耶就令余侍下風聞續論又安可得耶徃歲次山訃至即欲拊棺一哭而阨於貧賤覊於官府萬萬有不可道者毎輒東望慌汗交作余固知次山將原之弗疑而又幸亮其不果於負徳也次山乗元氣上下宇宙其必有歆吾之享者矣蠛蠓集巻二
