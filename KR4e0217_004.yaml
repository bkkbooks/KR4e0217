鯨鯤明月漾中流軼蕩六朝賢簸揚崔李舟佳興滿呉雲輝光耿千秋我昔聞此時交際増百憂欲往一見之天路窮阻修瞻望邈不及涕泗長河流孤鳯棲椅桐應龍游重淵神物固有託變化胡能詮爲是討幽客解組歸山田石徑掃行跡蘿衣拂紫煙目送羅浮雲手揮龍門絃道腴物固小閒居心悠然茫茫下世士大笑奚足賢屈原傳宋玉子雲鑄侯巴哲人多啟迪講道臨河涯至今江漢輝炯炯凌朝霞風期託深恩千載著名家媿非桃李姿焉能敷青華俄然栁生肘物化終欹斜何由重升堂大造裁滛哇秋日寄上晁春陵内翰五首扈聖陟秘閣整轡游文林揚輝比密玉許身偕兼金神風駭八維靈雨潤四民濟濟登龍客闐衢耀朱輪承顔接𤣥談浩氣如浮雲回視阡陌中涸轍多凢鱗揚鬐皷泥滓而與螻蟻隣不惜及雲霧提攜入無垠白門凉氣發蟠蟀鳴庭闈念此感物化中心愴已摧掩淚歸幽房含情當訴誰微風扇羅幄明月耀雲崖良辰亮在茲容華難久持佳人隔城闉永嘆徒爾爲嘉樹何鬱鬱南山桐與梓柯葉苟不强樵爨從茲始天道良苦艱甲第遺空壘棄置勿復道鉛淚徒瀰瀰一身當轗軻誰能慕鄉里毒痛結我腹願君察識此瞻望太行嶺還視長河隂峻節何局促變化孰能尋大火流坤維繁霜霑衣襟澤薠沉水湄松蘿罷長林號獸走曠野鶗鴂噭哀吟志士悲凛秋惋嘆傷明神矧茲鞠幽客悽惻固難任夙昔游帝京雅志好絃歌師曠調清徴湘靈皷雲和一唱再三嘆游魚躍雙波調髙和彌寡返駕渉滹沱還顧望五原殺氣横嵳峩誓欲掃龍庭長驅出交河壯心忽不偕白日空蹉跎歸來觸羅網傷哉可柰何孟龍川自京師旋爲余言秋部李滄溟聞寃慨然有脱囚之志因作詩四首寄上滄海何淼茫廓然含太清餘波浸九壤萬象已崢嶸化機詎可測聊觀天地情乗風徒空言安得越蓬瀛太華長松樹顦顇伐爲薪東風恨來過枝葉暗知春女蘿拽碧帶𤣥鶴窺丹津危顔倚窮石猶恐剥蒼鱗緑驥驕龍媒嘶雲嚙蒼昊誰令服鹽箱西上太行道伯樂一見之脱鞅恐不早回頭語紫燕報恩期瑶草晨起坐嘯嘆永懐在簮纓託風將情素吹落鳯凰城聞鶴感陸機顧影憐嵇生願垂清鑑姿持照萬古情聞張鵝山侍御巡按甘肅比嵗當還敬以此寄上漢葉奕千載中興氣益振離照撫萬方天狼避紫宸泰階無纎埃青雲翊縉紳昊穹挺神秀應期誕絶倫翩如鳯峙嶽矯若龍翔津鐵冠指嚴威白豸行嶙嶟投章失衛霍抗劾無齊秦犯顔一折檻奮世獨埋輪有時趨螭頭雙履躡星辰風采動萬乗何言折大臣持斧出王郊揮䇿向西巡將帥謁馬首武士騎鯨鱗亭邀茐嶺騎幕遮輪臺賔羽檄夜交馳旌麾晝紛綸龍庭間白日天塞生陽春萬古斥鹵地能令風俗淳命駕旋直廬行瞻帝城闉黄華反使節東山傷我神衣繡簪白筆再覩漢儀新竊從文翰塲氣節凌秋旻許身報眀主圖畫驚麒麟此志邈難嗣傷哉難重陳市虎遂搆患曽參乃殺人寃頸在囹圄日與囚儽親風雲凋壯志衰謝誰當掄眀公立天衢卓然持大鈞宴桓遇苖公脱難誠有因鮑叔救夷吾曠世孰爲鄰天地妙化育寜辭芻狗仁傾誠望舟楫千載收沉淪獄夜書愁敬呈呉少槐吏部天帝一震怒貳負縛暝間石室梏兩足仰無日月攀我稽潯陽囚迢迢如玉闗妻女阻㑹面何時復生還衛水東北流日夜恣漰濞如何來枕上化作萬行淚申包哭秦庭七夜救楚地掩面今三年猶爲蒿里質天命安可知長吟慰顦顇書栁川弟壁二首春風昨夜來吹此庭樹緑好鳥皆芳鳴紛飛繞茅屋乗興坐花傍一飲傾萬斛日暮倒玉山歸來卧幽獨如何東鄰兒冶游矜華轂衛川狹春㳺翩翩佳公子衣劍何照耀馳逐矜鄉里我非揚子雲草𤣥常晏起坐觀桃李花秋風亦云已送張㠠山明府轉户部五首銅梁張仲子割雞河水濆一朝荷聖眷白璧照𤣥纁鸞鳯起孤嘯飜飛北天雲昭王親灑掃遲爾勒功勲慷慨國士遇投分知己恩一語已肝膽刎頸即夷門何云明月珠吐之隋侯軒顧茲千里去輾轉悲心魂鬱鬱太行雲離離衛川樹啾啾𤣥猿啼䬃䬃驚鴻顧五月搏長飈將之千里路努力黄金臺相期共天歩張公有神劒飛入延平津雄去雌空留灑血漰龍鱗天路既云濶變化胡可親所以道傍子哽咽雙飈輪詔出彤龍樓官辭白馬縣落花飄雲游英風緬京甸欲射聊城書解此閩海戰去去復何言悲歌振林霰書懐投李篁臺外愽背余江海思凌風恣天游回覧鳯凰臺薄行鸚鵡洲玩弄頴水月吟嘯箕山秋緬想古人風飄然不可求挾劍適燕雲裂繻游皇州昭王去不還金臺長秋草樂毅徒空談劇辛亦枯槁痛哭九陌中迴飈起蒼昊六噫辭漢京三山事幽討結廬大伾麓蒔花黎水陽饑飱赤城霞渇飲華池漿舉杯酬阮籍彈琴招嵇康放浪期九垓枋榆安足翔天造誠寥廓一夕生欃槍光芒動圎象浩蕩亂天常南箕乃長舌牽牛遂服箱寘身在昭憲夙夜守圜土剥膚咸豗蛇剚心皆劍櫓隂卧魂毰毸澂視鬼傴僂日月將焉施胡不照聾瞽父母荒殯階兒女死秋堵嘔血徒傷心斬衣事終古悠悠九原思厯亂攅肺腑篁臺百世士瀟灑落風塵談經施絳帳講道開河濵有時瀉璣珠萬斛光璘豳鎔鑄能幾時席上羅佳珍貶道理凢材褰衣訊幽谷煙雲忽一開婉如熈春屋靧面行嘆息力疾對芳牘覧聽殊未巳猶獲玉雙瑴强成啟口笑無復論羞恧感此忘形骸片言通鈞軸願爾垂神光乗時慰䠞蹜龍荒如有待萬里騎騼䮷秋日奉别王元美比部詳刑還京四首送君沙麓野延望漳水濆爾登黄金臺我棲青桂林雙鴈起前浦雄飛雌復沉相背一何速顧念隔長雲逺眺碭石宫巍巍紫霄岑千里益相思鬱悠傷我魂願言䇿髙歩圖畫終麒麟爍爍天上星皎皎巖際月蟠蟀感夜吟凉飈遲晨發山木既云蒼江楓亦已脱遥望百里間茫茫但寥濶鴟鴞鳴園陬虎豹歩庭闕臨路别所親悵然増華髪思心獨徬徨誰能爲解結安得瓊芳枝慰我常饑渇清夜張宴㑹桃李沓衆芳微辭吐椒蘭穆如清風揚東序理瑶瑟西清弄雕簧長歌遏流雲四座無髙倡離思動顔色杯酒空激昻悵望登髙臺痛毒我肝腸泛泛白飛鳬刷羽長河㵝有如客㳺子辭家逺留滯衣裳灑秋風飄揺青雲􅦘仰視霄漢間景星何􅀈麗瑶光忽若遺棄我即逺逝低頭空復憐白髪茲衰替遲君報明主偃蹇卧松桂奉贈李于鱗憲副之陜西三首曠莾龍首野㠨峍九嵕岑應龍駕祥飈上下乗隃隂靈威施鞶榮五采絢相尋駘蕩誠足樂悵念詎能任願希晨風羽招揺出平林凌厲赤霄間䎖翃待嘯音神物固超忽棄我長河潯崐崘萬里髙海水萬里流感此慷慨士飄䬙順風㳺明珠多按劒久玩知自孚蕭艾豈不芳蘭􅉅良見羞得志信湏臾展斾西石樓念彼席上珍硌磥行當收還節汾晉間冠盖前雲浮鴻儒富華實履道固其常顔笑破秋日罄折如春陽有時發幽微珠璣盡輝光室中列爼豆堂上羅圭璋鳴琴一再彈清風惠時芳𤣥沉亮髙節變化信無方瞻望濶璇儀悲嘯愁我腸贈子青三首燕客懐白璧別余長河洲杳若蒼梧雲飄落南天陬三楚彌芳旬九江接春流喟言㳺此地孤嘯誰能儔贈別無凄顔臨風發長思劒解雙芙蓉上刻延平字然喏輕一言縱横託深意勿作羊腸悲且馳千里轡衛川發白馬散下緑楊堤醉别闗山月歌傷白苧詞樅江猿掛影皖嶺桂横枝定有登臨興題詩慰我思送顧聖之游楚時余將往金陵三首春山送行子春草惜離觴不盡孤雲意徘徊古道傍望望荆門曉悠悠郢樹蒼此中滿髙詠遲爾寄江鄉迢遥巫山陽曽佇神女節君今過此地坐見綵雲滅葳㽔瑶草芳窈窕翠華結爲我一致之沉念紫煙别君作楚鄉客我爲呉㑹吟别離在造次杯酒更相斟鳥逝清泥浦猿啼白石林感茲無限意引領各霑巾宿蘇門山夜懐王龍池别駕有詩未就因追之以此昔登蘇門山獨發孫生嘯悵念青霞人披襟可同調落月照林薄迴風吹海嶠相思轉陳跡俛仰憶悲眺適金陵登魏武讀書臺奉别李覺齋丈魏武建雄圖虎視何壯哉秪今霸氣盡空餘讀書臺登臺覧四野蕭瑟悲風來饑鳶獵平楚寒狐鳴城隈林木鬱蒼然煙霜日空摧咄嗟此山川千載埋雲雷我亦慷慨人與君逺追陪酒酣拂寳劒肝膽厯然開遥望南溟間鯨鯢滄波頺相顧起叱嘯坐使風雲迴楊僕擁樓船聲名冠崔嵬富貴吾自取他人徒驚猜投鞭自兹去千里騎河魁寓譙邵宿魏武臺下贈羅汝龍漢帝滅金鏡靈氛黯中原山川忽破碎海水日飛飜蚩尤拓大旗時拂紫微垣奸雄竊神器霸王氣并吞平臺起崷崪西北眺陵園千載乃丘墟秋風散雞豚爾來值嵗暮感此摧心魂託宿茅屋下偃仰徒自論中逢豫章客夜半延青樽酒酣起視笑飄然虬鬚掀開口復縱横厯厯陳萬言宛若黄河流渀漰决崑崙然喏在一時逸氣驚鴻鵷逺望江路塞蠻烽照天門誓欲指雄劍直斬南溟鵾而我豈不能與君同騰騫風雲苟未合且復侣猱猿隂符掩玉匣寳劒藏寒墦拂衣一長嘯髙風振丘樊水流還大壑日昃仍朝暾待予乗景運一灑清海渾别李希賢譙城冬日白渦水隂雲霏與爾經别地相看淚濕衣旅思隨鴈盡鄉夢逆潮歸芳草他時滿令人寧久違贈紹易殿下二首鳯凰巢玉樹翡翠集炎洲自非鍾靈匹孰能從兹㳺副君懋明徳端凝無前儔動揺瑶華章光映西龍樓登髙賦蘅薄愛士開瀛洲桃李散芬芳圭璋咨皇猷佳遇良在茲清風安可侔翩翩魏公子千載誠足羞撫劒發孤嘯振羽翔林薄西㳺古鄴城僶俛興著作日夕侍彤廬凌晨登綺閣虬顔希再覿虎變驚一愕謬承瓊珠音恍若烟氛廓感此國士心屏營淚雙落駕言旋故鄉因風逹魚鑰冬夜汪北津郎中過濬索詩因以此贈霜霰驚嚴夕初月照林杪皷吹入寒城雙旌來還道清飈何悠揚拂此幽垣草草色凄以腓澹蕩望春輝早晩矜餘顔永承瓊樹枝聊此奉徽音庶以昭寒微過内黄宿圎上人講堂兼呈張沅洲太守寳樹開五葉輪風發光綺圎公棲碧巖戒得清蓮蕋延我諸天竺説法雙樹底𤣥談莾浩曠恒河沙瀰瀰十年始鏡徹澄心見秋水靜卧薜蘿寒彷徨夜中起仰視天漢端凉月掛玉壘魂清境亦寂萬慮俱頽靡顧彼下世士紛華競郷里何如虎溪客妙悟叅禪理冬日獵射畢同艾瑞泉從子擢挈酒藉草坐飲醉後作此寒風吹林薄白日愴以黄呼鷹登髙臺走馬硊石岡狡兎起草間裂腦厲秋霜割鮮青山隅藉草傳羽觴落葉入我杯細細波悠揚平楚正蕭瑟感此情彌長雲中恣夭驕邊塵暗邉疆殺將屠我城主辱臣未僵徒令哂千秋何以慰遐荒合當捐微軀雪耻左賢王讀史孔明昔未遇㷀然守幽獨蓬蒿深沒人髙風滿山谷時來乗雲龍天人播芳馥三分割梁益伯王氣始肅斯人已云亡千秋仰光躅感此傷我懐臨風一痛哭秋晩赴井汲水採野蔬供飯衛霍富華屋原憲隱蓬蒿物理各有適而我甘鴻毛靄靄秋欲夕疎葉鳴林臯開門忘所事瓶􅑥行自挑素綆汲深寒何用扔桔橰欖衣採藜藿灑濯西城濠豈曰薦玉盤慰此饑者勞併日偶復爾欣㑹忘紆陶歸還讀我書杳然青天髙俯察寒螿吟仰視雲鴈嗸萬化紛倚薄吾生安足騷如何綺紈子失路増悲號雙唐賈客詞雙唐復雙唐白石何齒齒笑殺新安江水深清見底君家住新安松蘿帶翠巒年年隨海舶歳嵗客長干長干風色苦何如向陽武袖隱博浪錘權輕萬乗主胡商自古雄多在塵埃中使君儻未信請看陶朱公贈董明府迎侍四首皇阪多麟趾天池必龍翔明宰乗兩鳬列宿動精光閉閣鳴絃琴沉思逺髙堂嗷嗷林鳥悲悠悠風木蒼撫枕夜五起慕愛結𠂻腸詎言何從事白首飡黄粮昊天列光景清輝緬赤縣少微垂髙雲婺彩明河甸𦕈眇寰宇間習習祥風煽茲匪巨孝蒸孰能撥靈變回頭語中州大養非珍饌持此金石開㑹膺紫泥眷鬱鬱山上雲油油磵中薇嘅彼寸草莖宛映三春暉仕漢信亮節游楚傷方徽物理尚可鑒逺邇相因依陟岵揚哀音白華播芳輝藉以凖時哲千載將同歸昔聞荀太尉白髪能孝養英風邈海隅至今復清響鳯嘯必椅梧麟㳺非草莾託跡豈不然寄心且逺倣合符一術間總轡萬事長所以不匱姿垂聲得淑儻喜艾子紹二子作此天馬來何處本自濯龍媒蹀躞闗山道黄雲萬里開嵗晩將名駒矯矯非凢材長鳴噴緑雪嚙膝眠紫苔神駿一何爾倐忽遺纎埃異時獨不見飛上昭王臺題王龍池彭籛圖兼夀其嶽東谷安期留玉舄王喬御飛鴻夀命偕元始精神茂華嵩展玩瀟湘幅愛茲方瞳翁焚香紫苔石揮手白雲空六龍且按轡乘汝㳺無窮君家泰華老意氣與此同身騎綺鳯凰飛出秦王宫三月初度時簫皷迴層穹環珮出洞房清切鳴玲瓏既稱瑶池飲亦薦嶓冢熊佳哉良宴㑹千嵗成始終持此丈人意逺謝石樓東寓目水石藤樹人物青天出片石古木垂寒藤下有太古士姓字不可稱暝坐㳺九垓元氣隨所乘恐是無懐民縣車避朝徴人生苦勞役視此將無懲方爲槍榆鷃何羡天池鵬陪成臯王太虚觀齋居感鶴至夏后騎兩龍上下扶桑津青陽登帝臺俛仰觴百神張樂豈洞庭感召即精禋𤣥鶴西南來盤舞紫霞宸清響落雲間指顧環河濵重華未云邈大孝方此倫鄴下贈呉山人聞官軍與倭戰不利慷慨燕市歌蕭蕭易水風至今多感激常摧壯士𠂻鄴中逢吾子正值風塵裡劒歌爲爾開一語肝膽是西北戎馬喧東南海水翻爾我俱草莾誰能期報恩白馬河上馳翩翩欲何爲三軍氣已死主將無復知君有魯連箭赤羽不肯見請爲約矢書一解聊城戰送呉東原還蘇門少年負意氣客㳺長千里八月秋風髙揚㠶下江水江水復悠悠送君臨清州臨清花月好錦障帶珠樓誰家妖冶女彈筝日歌舞忘却湖南商無復相思苦相思能㡬時還家定有期庭前芳桂樹攀取最長枝隣兒問野叟椎牛勸美酒夜深起相視君鬚近長否輾轉東原㳺思君不可求魂夢一見之多在石湖頭重寄内二首青山横東郭白水流城西欲濟微舟楫緬眺少丹梯唯當見眀月相思俱沉迷此時遥相望知汝流玉啼浮塵暗芳鑑蛛網生蘭閨一身在罿罻八翼垂沙泥汝非蔡琰人長跪解覊棲好爲小兒女傾心聽天題白日有返光出雲還舊谿㑹面秋風前勿作頻酸嘶天運無停機隂陽多反復起家藉儒術願汝佇金室詎云罹羅網鸞鳯各離羣鹿門邈難嗣舉案徒空聞羅帳歇春風玉砌生芳草覩此傷朱顔誰云未成老重闗不相見無柰别離心精神非間隔何啻結重衾作書謝美人淚濕瑶華字青鳥一致之爲予問顦顇七言古詩奉答楊六坡推府隱居見贈幷序余讀書浮丘山性癖山水負烟霞之疾嘗披覽匡廬圖跡巘崿之盛侈有飛志遐思飄然如在五老峰下雲蘿翠壁掩翳錯疊左右外視形骸不知我爲何如人蘧蘧然也因慨然太息天下髙眀之士何限物相覊鞿其誰相與放浪天地之外𦕈萬物俯八極瞬息古今包含宇宙也哉嘉靖乙未固原楊六坡以大名推府謝政卜居浮丘之樊治亭榭花竹水石與壄人相還余毎過之便有髙興佳作自謂匡廬之志雖未即遂而談𤣥吊隱亦足以渝洩一二盖吾人胸中自有山水何必攀蒙茸躡巉巖而後爲髙致哉辱六坡草堂詩見贈遂援筆奉答聊著雅尚若木𤓰瓊瑶之報正不必論爾我昔住青都玉樓揚紫氛靈妃散天花把弄坐層雲肌膚瑩瑩婉氷雪孤嘯常隨鸞鳯羣閶闔長辭九萬里帝樂仙音那可聞失意山中尋瑶草白雲引入天台道桃花流水非人間碧椀彫胡待終老遥望匡廬歊九天屏風九疊石磴旋香爐返照赤霞晩雙劒迴空白日縣雲霾四塞龍虎睡嵯峨一逕猿猱前陶公鍊液呵赤電李重還車躡紫煙長揖謝世恣同往緑髪方瞳列上仙青谿卧聽松風歇起向山中弄明月獨立蒼茫望九州漠漠黄塵毁金骨聞君獻賦長楊宫飛章絡繹四海雄光輝燦爛動眀主天書降問恩隆崇風塵侘傺解圭組歸去滄浪作釣翁結廬小傍浮丘麓幽洞巉巖蒼翠簇清風臺倚金露寒白石橋連水清洑當堦竹引鳯凰毛背户青松走麋鹿婉如匡廬落我前便欲因之借休沐夫子值此格氣豪秋來興與南山髙寄我五花雲錦字讀之飄然若雲翺自慚才非盧照隣敢與楊炯爲伍曹楊盧千載各一時異代風流如有期爲君倒囊彈素琴清商繚繞陽春辭歌罷拂衣五陵去眀月青山湘水湄秋夜望雲旅懐秋來五色雲在眼浮花蔓草相鮮新天空似是巫山繞日暮更與銀河臨凭欄久望待不至倐忽變化蒼麒麟衛川𡨕𡨕在何許我意乗此尋歸津終然翻飛不可去棄我還從銅馬塵贈别李性菴還任丘燕郊十月飛繁霜臨岐送子各盡觴腰間笑解延陵劒雪花墮地蛟龍翔都門佳期那可顧相思開遍三花樹歸時倘遇浮丘公爲予接引嵩髙去送崔秀才南還孟冬送客臨沙浦蕭蕭風動薊門樹驊騮銜轡不肯行一鶚南飛過天柱燕臺擊筑且髙歌清罇酒盡紅顔酡五更皷角星野平看汝騎駟凌天河長歌送王翰林旴山還保定國門識君與君遇夢㳺十度攀花樹朝搴李慿彈琵琶暮宿倡樓聞曲度燕臺草色送春袍小苑花枝轉葡萄栁色偏濃金殿露鸎聲醉殺後宫桃白馬翩翩過戚里笑指落花雙燕起遨遊不數新豐兒調笑寧知太宰噽别去開罇重酒籌春詞樂府倍堪愁白雲自散蒼梧影眀月常懸彩鳯樓贈别南田楊子還晉石并序十五年余㳺京師馳翰苑獵文囿延師士之肆㳺軔冀野窮覽燕墟曰壯哉帝王之居也迺攬轡西市遇晉石楊子景新與之論皇帝王霸之要雄姿風發皷劍悲歌慨慷泣數行下於戯士之負傑烈不覊之性曠世相感一至於此哉今年秋楊子還晉石因作詩識别我本衛川豪君作燕城客意氣各千里相逢在燕陌燕城燕陌跨京華青煙作帳銀爲沙五侯龍馬耀金鞭蒼螭寳帶屈盤拏層城日出歌鐘起繡戸珠箔幌羅綺遥憶䕫龍集鳯池亦知衛霍矜戚里笑倚青萍劒耻上黄金臺昭王非帝胄樂毅自凢材燕丹空有心荆卿徒悲哀白虹沒長雲易水不能迴瑶華翠葆浮雲沒錦石雕甍秋後伐古人已見覆蒼苔今人空對西山月西山月出宫殿寒坐愁白髪驚飛湍風雲萬里不相待白羲垂耳蛟龍蟠雞鳴開九闗天狼若可攀勢欲請長纓遙繫燕然山長纓繫就心不朽君去青山但揮手落日天風吹海波月眀來勸一盃酒酒中慷慨樂事無據地酣歌玉唾壺晉石山川爲君迓千巖萬壑來長途往日春光懐我處竒花不盡相思樹葡萄露下餘空醅終日待君那能顧滄洲今已暮瑶草不知路欲乗黄鶴一問之爲予凈掃南田霧留别馮少洲進士春風吹緑雪湖水生微波與君上河梁攜手哀情多此時客意難舉觴道傍楊栁鬱金黄欲折一枝留郢客柔絲冉冉斷君腸斷君腸勞君顧離思𦕈𦕈青山暮青山暮兮傷我心我車南還執子衿贈爾媿無英瓊瑶倚馬聊爲梁父吟送友人南還鳯凰樓外雲氣長青袍白馬生輝光送君千里促羽觴鳴筝清歌如故鄉相思眀日忽分手誰把青驄繫緑楊送人之塞上北風瑟瑟宛馬鳴君今棄我何逺行隂山雪花大如掌黄雲出沒單于營萬里龍沙那可見將軍大小七十戰捷書奏入建章宫寄我雲中一隻箭贈孟龍川二首李希竟何罪緝捕搆千金介身胡越間南北任淪沉託跡魯朱家髠鉗奴僕心英風豈不特所懼禍患侵主人誠多賢脱難青萍鐔權門一命輕鴻毛三士殺之費二桃虎畧詎能讐國難龍泉一日成鉛刀人心如風波凌徑𦕈難度適此血𤣥黄雲雷何䨴迕思君若饑渇引領望瓊樹瓊樹瓊花别有天迴風吹雪繞龍川相思遥寄藤蘿月洗濯輝光待我還又白龍魚服㳺滄海豫且鳴絃不相待洪濤一悮失精靈耐可乗空訴真宰海水東流渤澥深風雲漠漠杳難尋慿誰借與升斗水飛上青天作帝霖五哀詩五首有序學士抱藝博綜典訓效業而弗鳩建辭而弗賔父殯母隕未就窀穸之事室饑而病二子交䘮而不獲永訣待死圜室哀孰加焉遂作五哀詩其辭曰有父有父濯塵纓棲栖逺在滄浪溟樵蘇不避芸且耕春泥秋雨淇門中泰山巉嶄忽頽墮怒豕舕熊立向我蓬蒿一望盡烽煙髙樓蹀血宵滂沱嗚乎一哀兮歌始發青天黮黮沉眀月又有母有母思晨軒蕙帷縞帳泣且漣蒼梧𦕈在白雲間臨江哀竹心悽然慈闈一夕歸眀月怨恨千秋那可歇何言寸草報春輝號涕苫廬毁筋骨嗚乎再哀兮歌已烈皇天爲我開金石又有室有室在衛塢蓬髪連蜷守空堵浹晨不爨井泉苦布衿如鐵冷秋雨髙堂灑掃心魂摧金華翠鈿空塵埃良人欲委長城窟此身早晩隨寒灰嗚乎三哀兮歌彌長寒風四起激清商又有子有子驕且冲兩兒如玉垂瓊英花翻蛺蝶紈綺叢意態婉娩雙冥鴻阿爺銜寃在網柵汝心長望成永隔桑樹那忘白玉環夢魂哭汝東山陌嗚乎四哀兮歌正苦回飈蕭颯吹庭樹又有客有客號秋旻十年不得逢陽春柴門反鎖黎水濵前朝屈宋寔所親皂棧連翩淹驥足出門十歩九覊束燕郊六月飛胡霜漢史終然恐失續嗚乎五哀兮歌聲衰長江東逝流酸斯保定兒留别沙麓風塵暗河縣漳水東流疾於箭落花别圃誰可憐南去北來一秋燕汝曹自是中山兒垂首天雄識君面意氣相期何有無分手一言淚如綫亦山巉岏秋氣髙似與君情同繾眷眀發騎馬渉滹河長歌逺贈北門餞春日後贈王任菴五湖昆季春日澹靄西日微浮雲流水爭光輝一雙白璧動燕趙光揺海宇青煙霏早聞妙譽今見之酒酣大呌心思飛幾時攜汝尋滄海明月秋風一釣磯七夕銀闕含秋星欲爛天孫脉脉渡河漢仙鬟玉珮那可聞佳人夜半開簾看階前月色疑有霜獨坐穿針向畫廊東方日出烏鵲曉天上人間枉斷腸送醫還山洛陽買畚逐世貧金華藏名四十春歸來浮雲變城郭矯首落花輕拂巾堂中㑹飲遝賔友低户雲光散罇酒蹔乗白鶴謝時人㑹向山頭一揮手九日寄孟龍川憶昔登嘯臺蕭瑟湖海秋酒酣迴舞袖拂落桑柘洲青雲動蟹螯白雪霏金甌兩邉坐笑如花妓呉趍白紵飛清謳戢翮入牢籠忘却山陽道菊花爲誰開沉憂日衰老此日長吟獨憶君巉巖欹壑掩浮雲何處龍山堪落㡌風流醉殺孟叅軍欲託雙鯉魚錦字寄滄溟願君細嚼茱萸蕋夀比南山千萬齡寄謝逸人四溟二首漢京詞賦多風雅前擁鄒生後枚馬四溟旅人興最豪馮軒落筆長河㵼醉中一别十經秋落葉翩翩嘆白頭思君恨無黄鵠羽涕泗遥瞻滄海樓又海水飛動凌三山巨鼇出沒流其間人生風波有如此颯颯秋風凋玉顔魯連自是紫烟客倜儻長揖二千石一朝談笑解聊城東入海溟𦕈無跡寄汪員外南華海若東游没海濵白魚况非白龍鱗豫且鳴絃偶相值卧看鬐鬛飛黄塵謝君㵼與天河水乗之免作涸轍鯉他時雲霧或晦冥海底㘅珠報知已襄國飲鴛水野亭奉懐張㠠山明府秋盡野亭鴛水隂平沙落日青楓林寒花爛熳不自愛霜風一墮柴門深我來對此沉吟久况是㠠山别離後何處浮雲晩未還散愁且醉襄城酒贈李山人朝登崑崙丘遥望煙雲海三山徒渺茫六鼇今安在昔時中山衛叔卿身騎白鹿㳺紫清仙人一去不復返霄漢空縣千載名白日無回輪紅顔易頽老何如恣天㳺山川事幽討萬里擔簦尋冥髪煙水漫漫幾超忽乗時小憇蒼梧雲因風復弄蛾眉月蛾眉月出照海湄夢裏猶聞猿鶴悲傍人不識君所爲白馬青袍一笑之君胡不解清溪囊示以瑲鏘五嶽辭贈張長公鳬墩五句四韻長公割股愈父疾蜀山萬里青雲迴鳬墩縹緲超浮埃霜刀一拂金石開清風獵獵不可見慿髙西望心魂摧再贈張雲谷僕素聞雲谷自旅次與之靡談遂神醉婉若登羅浮渉洞庭泛彭蠡尋孟門雲霞靄映風思飄然盖竒遇也已同謝四溟田莘野約爲小律今不暇待先作此見情云爾昔聞金陵地乃是帝王州冠盖六朝賢名與青雲浮往事千年不可道别苑離離長秋草酒中慨此復霑襟落日翩翻送飛鳥今時再見金陵豪白疊小側薜荔袍凌風起舞鄴城月長呼興比南山髙四溟情同五嶽雲莘野調流三峽濤雲谷此時發意新開巻調笑如有神萬里煙霞起胸臆驚翻白鵠翔麒麟飲我催詩酒倒却頭上巾君身孰與儔似是洪厓隣早晩笑攜盧敖去坐看滄海成埃塵登西城嘉禾樓重送張㠠山赴部髙樓西望縈空煙南風渺渺次河船碧沙細草逺相送一夜飛過黎陽川驚魂如縷隨君還恨無雙翼凌青天魏闕霾隂雷隱怒灞水横波不可渡此時揮手重堪悲千里相逢未有期燕臺倘值悲歌飲擊筑先尋髙漸離送李滄溟太守入覲襄城太守濟南客夜發雙旌揺海月城頭箕尾超天河城外征人吹曙笛父老扶杖前致辭太守此去人皆知内史親傳大官饌野人共拜甘棠祠黄霸功名何足數公車詔入鳯凰池送陸明府夢洲入覲爾時登眺黎陽山松門蘿徑窮追攀昨夢巖花散幽色髣髴百里開心顔覺來欲往無時閒思君玩弄雙瓊環天寒日暮愁蹇産漳水横波龍轉眼浮雲北向徂髙旌海嶽驚看在此行異日層霄不可望好將書寄鳯凰城雪霽後過周紫泉山堂紫泉山堂在何許衛溪東岸蒼山麓青松偃蹇雪意寒孤光晩映琅玕竹紫泉調笑宛在目亂雲竒壑相縈觸我欲於此傾􅌬醁開襟醉卧青山屋絶境幽林不可留野狐夜呌猿嘯秋别去長懐紫泉客滿林楓葉吟颼颼詔獄結後書情敬呈王龍池二府兼致謝意蓬萊出海底金銀樓闕浮空烟蓬萊仙人與我語授之赤明玉字瑶華篇長跪讀玉字五内發金蓮欲持紫腦訣常從上清仙上清一去無窮已回飈吹落長河汜晩將辭賦上燕京遂使明時笑巴里北闕風雲不可期歸來小卧青山垂竒峰秀壑常相隨千巖度盡松風吹馮髙把酒呌明月桂魄蟾影皆參差醉尋劉伶頌醒詠阮公詩泰山雷霆何足有渌水洪波可戯之烈烈雲間鶻翛翛蓬下鷃何意見相猜罹此血吻患羽毛灑平蕪骨肉不敢盼圜墻一去幾時回桃花坐見十三開青春憶月秦人洞白日呼霜夏后臺我欲乘風震天皷前摛脩蛇後猰㺄九江濤湧未是哀太行輸摧不言苦東海陸公真神明决垣掊鎖㔃長纓古泉楊馬連章八制可始放南山耕生來感此國士遇何限千秋萬古情入門一笑復何有女㑹縫裳妻白首竈下尺薪貴於玉盤中粒粟皆瓊玖惟有牀頭劒鋒在夜夜精光射牛斗射牛斗待張華神物詎肯終泥沙不然飛入延平津今者蛟龍昔鏌鋣鏌鋣蛟龍孰可判眀公義氣通霄漢爾時我爲入幕賔贈之豈惟青玉案霞杯綺食飽我心至今側身倚增嘆東風嫋嫋沙草春衛河緑水波龍鱗欲將輕棹尋仙館其柰楊花滿河瀕楊花不可亂河瀕不可極待余攝衣起舞龍門前坐客滿堂驚太息嬴女鳯圖秦臺明月下照見乗鸞女玉簫聲不聞緘情空復許相思何處憶離羣欲報佳期隔綵雲懐中知有瓊華字復夜清光獨映君送郭侍御劍泉謫永安松栢圖蒼巖鬱鬱長松樹石甲龍鱗挺天霧雨澁霜洗幾百秋似與君心同歳暮君今謫宦永安城閩海愁雲日夜生㑹待明時宣室詔定從江浦望雙旌春夜與呉山人飲穆前江宅招妓彈琵琶不至我昔弄月沅湘浦靈妃飄風鬼灑雨遥看江上數峰青寳瑟如聞心更苦春風小落前江家髙開玉燭燒殘花青蛾何處不相待北堂一曲空琵琶琵琶聲已歇空餘胡地月黄雲塞前水北流霜風夜嘯猿沉秋古來蟬鬢已寂寞何令此夕獨生愁不如與君飲美酒披襟一笑輕王侯贈陸夢洲古琴兼以詩寄朝讀夢洲書暮望夢洲樹思君不見君徒向夢中遇遺之緑綺琴不語可知心早晩弄金徽爲宣白雲音白雪陽春古所稀自憐素髪老柴扉乗風寄語豐城劍看爾輝光徹太微蠛蠓集巻四
