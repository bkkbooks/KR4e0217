body:
  text: 蠛蠓集巻四眀盧柟撰四言古詩懲咎詩并啟一首上大名張太守鄮西呉吏部少槐李翰林東崗柟頓首啟拘幽五載二靈未塟兩稚繼死宗祧有絶食之憂日夜悲號煩懣湮鬱播爲不仁啟偏枯之漸葢志塞則神瞀氣秘則形緩可以宣龢神氣滌蕩邪穢遭遁世而無悶者取要虖音聲焉是故言之不足則發之以詠嘆詠嘆之不足則殫之以詩賦然楚恭寤言隆以美諡子服補過隮爲上大夫古之君子過如日月之食更也人皆仰之詩賦之作宜莫近於自訟也己曏昔柟引見御史臺時諸公神眀察柟寃誣力挽之不出夫並物茂育者天地之化也燭微垂光者日月之明也矜愚兼養者慈父之仁也潤物無跡者元老之器也聖澤汪濊時雨灌沃枯槁之民蒙被滋潤勵結草之思懐刻骨之銘晝夜寢食一夕匪懈第以天網難於頓解人心可以道固沉緬垢顔追思罪戾蹺足嶮巇游志坦夷文之禮樂以從事虖春秋大改過之義望風承顔馳精羽麾傾聽鐘皷刀鋸之警歘若遺失作懲咎詩一首走獻下里滛哇無足採擇秪攄下情云爾柟不勝悚懼頓首頓首其詩曰於皇眀祖厯數在躬龍翔淮甸鳯時金陵哲后繼啟寔爲太宗滌宇沙漢定鼎北平􅜈鳥肇跡篤生我皇文思欽明武烈威揚九壌流化八葉載光越商軼周方軌於唐赫赫眀聖鑒臨下土閲兹藩魏在漳之滸政狎民逸不克時叙咨汝宰臣孰寧予處天官曰􅚾張公臣隣懿思淵塞邁徳種勲三揖緇衣五馬白脣錫汝淮陽以優王賔曰若李公維帝喉舌逆鱗補衮持稷紏契執憲匪回萬夫之特投章出郊藩此南國曰維呉公環拱紫微縣衡泰垣曳履龍墀三台中拆駭慄天維懐玦之屏絶景超輝象服有韡式讌嘉㑹劒履雲行徽章霧麗丹霞扶軒流飈承珮相協天人調和鼎鼐振舉頽綱綜釐羣紀肅肅公徒峩峩俊士有懐克綏無頗不圮神人胥悦黄耉稱美繄余小子髫齔載年圜彼橋門執經陳䖍虡磬玉鬯琴瑟洞絃官師儆惎我弼我愆嗟余小子般樂肆射禽色交荒曽匪日夜日居月諸忽焉代謝長老有言固而弗化履霜堅氷積雪維霰福始禍基致毁匪嫚臧獲跋扈竪牛之漸駕言鉏挺搆兹竒怨誰其爲梗職此厲階行人牽牛邑人之菑匪曰狡狂孰爲斯媒沉思窳圉遐不愴懐蹇蹇王臣侯來於京雲馳四表靁動八紘霜飛天鉞秋冠烈纓如追放豚寘余典刑羣公窮燭察我寃隱灑以甘露潤此槁軫爍燹燎原撲滅可近三宥弗張六極迭􅀈犴狴勿密纒牽永殛卧無曲肱行有顛踣日星安施違此昏墨維紲之儽與余偃息大夜何長佇視虚照魑魅僛偲既嚬亦笑招之不來迤邐入廟非予作孽斯焉取造瞻彼衛澳有蘋有蘩祁祁士女大珮瓊璠以嬉以游俯仰如神豈不爾懐畏此棘垣麋鹿榛榛虎豹伾伾號走曠野囓肉茹爢夫我無食不如爾怡欲往同羣騶虞在逵伊禽之介黄鵠其羽千里一息不遑寧處蕩蕩𤣥霄儔克與伍有泚厚顔莫不能舉嗈嗈鴻鴈唼喋江湘弋人何簒實汝瑶觴汝之匪覯亦自云亡罪豈碆盧俾我悲傷何我人斯不如獄草晨光朝晞零露夜灝草之油油孤秀斯寳嗟予小子胡不自好嚴父辭堂慈母去闈二靈並暴風雨中摧圜幽五稔誰掩葛藟心膂慘傷髪膚當乖兩稚失怙咨命不永厥緒斬㔃誰繼余統馬牛風埏牧竪登隴萬嵗千秋涕下如綆妻孥牽裙將柰若何我有嚴刑遑恤其它生當來歸死當長嗟兹其余辜怨豈在遐諤諤三公奕世䕫龍投分紹運駢翊帝𠂻力侔造化志與神通何惜覆盆照此微躬蠢爾黠虜窺我華闕願投有畀親冐矢石搴旗瀚海奮劒沙磧靁轂鴈門電掃張掖捐軀國難解頥龍鱗血化爲碧膏塗鉄斤薄劣既弛少謝陶鈞死雖一轍肝膽殊分天未悔禍憂心煩勞懐賢如渴徳音式昭夢寐赤舄仰止嵩髙王澤弗竭鑒我時髦雜興五首輕車載脂良馬且閑于盤于游游覽山川緑蘿髙林鳥鳴闗闗神逸志悦踞石飲泉劃然長嘯鳴谷振煙青雲何意翺翔我前欲擥以登倐然上天整巾頓纓薄暮言還巍巍蒼山湯湯洪河鳥集于林魚游于波飛潜攸揚物謂爾何遵彼脩陵顧景髙歌手弄暘熈神渝天和日月迅邁胡爲蹉跎采采石華薄言江沚婉美者誰中洲之士目余有成惠若桃李遺我九垓倐忽千里澹然遐思俱兹流駛揭旌蘅阪弭葢崑丘礪齒石林洗耳滄洲仰矚歸雲俯鑑川流從彼物化操我虚舟𡨕心大壑超然神游是謂維何列子好仇月生蘭圃雲流華軒微風扇閨曲池有瀾㫖酒既清嘉殽且贍爰御琴瑟一皷再彈申此徽音懐我所歡永言莫晤云何吁嘆五言古詩叙隱五首仙槎隔溟渤天漢嗟無梁桂樹含丹葩瑶草限年芳我生無羽翰飜飛不能翔攬衣歩宵月撫劒臨秋霜欲問嚴君平此事何渺茫伯陽柱下史曼倩金馬門大隱在朝市何勞避世喧和璧與隋珠慢藏盗斯存投售一失所按劒足已捐徒爲惻丹心悲來胡能言鳯鳴千仞崗苞緑麗天雲髙士有竒姿光華揚紫氛蘭蕙樹百畹琅玕植千尋託跡在巖阿悲嘯有餘音歌終忽不見杖䇿爲鄧林逸翮奮霄漢髙歩躡天闗褰衣在椒塗長風吹海瀾瓊樹繫游鑣瑶華代朝飡恣情戯靈景靜嘯諧鳴鸞浮世信淆濁焉能濡余翰幽人何髣髴乗化游丹谿雲裾佩瓊璠焱轂駟蒼螭揉弄緑蘿烟蹀跇紫霞輝薄言佇山椒璨齒修羽儀髙舉謝塵寰長揖答夷齊雜詩七首迴隂翳朝日薄寒履微霜緑池潜㳺鱗飛鳥歸林翔北風吹蕙帷馨香發我堂攬衣下堦除屣履獨徬徨豈無芳草思欲寄愁春陽憂來人莫知悲憤結𠂻腸山韞玉含輝川沉珠媚光所願崇明徳別離何足傷皎皎明月光照見東大樓天風吹綺疏櫺軒一何幽上有憂思婦頺顔懐良儔中夜鬱長嘆悲嘯含清秋借問怨阿誰不語彈箜篌清商激中曲音響何凄湫大絃回陽春小絃咽泉流精誠逾金石烈思揚清謳蟋蟀鳴金閨霜霰披梧楸日月迅推轂鉛華安久留願爲梁問塵隨風入君幬丘中有隱士枯槁不可識渴飲潁川流饑餐首陽栢薜荔爲衣裳蘭湯沐芳幘鹿麋戯左右猨狖相牽媟朝引洪崖公暮延浮丘伯揚袂渉中洲落英蕩桂檝我願從之游飄忽𦕈無跡佇望立澧浦飈風起我側攬轡回故鄉白日忽西匿感彼空冥鴻翻飛振六翮谿谷饒氷霜幽澤多芳草朝煙滋緑輝夕露發青藻芬香披原塗弱葉亦俊好佳人殊未來繁華易枯槁悲哉君子心綿綿在逺道嵗寒見松柏可以喻終老髙樓有佳婦窈窕青雲端左䕃緑桂枝右紉芳澤蘭臨流戯珠浦拾翠游芝田蛾眉衆所妬時俗尚無鹽捐棄蓬蒿中誰來希令顔徘徊嵗云暮拂衣聊長嘆驅車泰山阿梁父何崔嵬狹路阻且難車輪不能迴磊落百丈巖空冥千仞谿悲風從中來樹木鬱森竒鴟鴞號我前熊羆䑛路垂四顧絶人煙零露霑裳衣逺行多轗軻傷哉心獨違回思駕方舟川廣㠶檣危徘徊在中途執靷思沉迷僕夫疲以痡我馬復虺隤日暮隴阪長行行將安歸始知阮歩兵痛哭各有爲征夫嚴夙駕負羽即長衢天山白霧滿瀚海愁雲紆日暮向何處彊藩爲我虞前年雲中擾主帥涕漣洏敵騎從北來鳴笳間旍旂今年遼陽騖干城失邉隅桀驁我皇使髠奴緤長組險阻掣重闗氣葢連東夷欲揮天馬撾指顧定邉陲惜無晨風翼阻此風雲期奮身臨飛觀遐覘還四區長城袤萬里上與浮敲齊耳虚聽刁斗目竭迴旌旗安得楚雄劒揚鍔震天威塞門背捲甲沙郡面渠魁緝安兩鄙民扶持四海危掃清黄池塵放馬華山歸䘮元在溝壑馬革裹屍回贈盧潭城二首六龍推飈輪四運無停軌日暮薄虞淵月朓昇玉壘飛螢流雕甍微禽變𤣥海寒露被陵苕繁霜瘁江􅉅缺隙馳白駒人命易頺改赤松既渺茫安期亦誕晦苟非青雲身焉能施後代鳯嗚振綺輝龍飛薄霧靄歩趾須芳林揚聲欲珍彩豈維工雕蟲立心貴鼎鼐君懐璠璵姿輝光茂真宰朂哉勤令圖雲衢㑹相待凉風越秋海吹我東階樹柔條歇芳輝密葉垂豐露玉殿鑒凝霜金閨疊紈素念子居無衣薄寒隱天霧芰荷凌晨宵雨雪恨遲暮嚴黍沐晩澤青松挺隂沍尚父釣河濵寗戚飯牛寤天造時康屯雄發霈霖雨貞觀詩書塲毋爲悲世迕我希呉延陵寳劒非所顧敦義篤情親千里共竒歩奉和王大伾侍御賦雞冠花有命輒和一首東方有神鳥髙棲紫霞山赤雲生羽儀列缺飛雙翰據身蟠桃枝長鳴開天闗青都閃玉樞白日照幽𤣥帝怒振威譴摧落頭上冠墮地餘仙姿化爲百花觀繁曲何逶迤茂彩亦蟺蜒峭葉滋碧輝墨粟含珠丹軒發若揚音蹷撲迅衝欄窈窕信幽遐翩翻誠足讙歳暮厯凛秋霜華浣其顔愧與卉草伍豈惟松柏堅金谷乞嘉靈梅庭薦髙賢左右娛樂意圖書生清姸無爲長毛質飛去終難攀贈道士雲靜玉虚敞霞明金闕深鬱羅棲祥煙中有長生人饑餐瓊玉英渇飲華池津不笑亦不言綽約含天真爲問此阿誰渾沌即與隣元始覿幽光鴻蒙揖清氛暝坐合運㑹揚眉倐千春寄言下世士尋兹入無垠太子洗馬童公内方扈蹕謁陵有命輒作春日曜陽景榮華何郁郁崢嶸繁卉菲葳蕤紫薇簇禁光信清遐蘭寮親直宿我君感雨露禋薦信非凟龍章翔玉璽鳯儀戒黄屋流雲滿靈旂焱風夾飛轂鳴鑾發春渚迴旌陟山麓白日麗蘭臯晨光清􅉅隩極目眺神京祥煙紛四矗皇心亦陽澤七陵發秀毓人神愜歡情海嶽拱清穆聖孝燁重光薫蒸浹九服豈云藐姑射盤游餌羞恧微臣諒薄劣揄揚慙尺牘願陳駑馬姿清飈侍坤軸孟龍川許送芸香不至走索兼以詩寄管鮑古名士聲譽何輝爚夙期貴相親感激良有託我亦慷慨人卜居耻離索岹嶢望龍川颯沓煙霧廓之子住翠微影響見汋約作賦凌清霄愛飲臨大壑翕張龍鳯姿偃仰猿猱矍東園吟嘯臺幌如青天落憑覽望八極寰宇真空擴仰飱眀玉霞俯拾金光藥調嘯宛孫登清風振山閣攬懐腐草質潜身在菉藿深夜撫長劒江海環其鍔安得説楚王一揮萬人爍功成長揖去與君尋溟漠暝坐焚芸香髙名辭衛霍回看九闗門湫隘如大槖朂哉重然喏毋與世相攫王大伾草堂五首幷序嘉靖己亥歳王大伾侍御築城南草堂成朱明既麗時雨方歇兩山擁翠雙岸迴繞髙臺騰吹以承雲木客唱舞而赴節賔客撙坐羅衣從列非有琦瓌之詞曷申厥美因著詩五首三五已淪替覇王氣不全末流信頺奔至道中復難賢哲叅時中奮志摩羽翰棲身柱下史託興擬周𥅆道違身即殉棄世復來旋來旋自廣庭希世濯塵纓草𤣥合太始茗飲通神靈物化在握紀周章游無窮漢儀委蒭草魏闕寄鴻𡨕心閒理自得志澹物俱輕物輕亦徜徉塵廓非我鄉誅茅逺城市結廬近山陽前沼含雲澤後臺凌寄蒼萋萋磵谿草春秋生輝光日暮㑹佳賔嘉樂陳中堂中堂嘉樂陳紛華羅錦茵巴僮激清徵越女流商音一奏驚回飈再奏生陽春中人莫云悟歌者徒勞心所以重考槃永懐嘉樹林嘉樹清且圓䕃彼城南田層枝棲孤鳯奕葉鳴寒蟬幽人懐澹泊日夕獨磐桓桃李雖容艶早落春風前何如主人樹茂育長千年繫獄敬呈王大伾侍御李復齋工部丈六十韻乾坤日慘淡蚩尤薄雲際哲后振淮海應期拯頺世金陵王氣鍾石頭雲影麗風牧效威靈䕫龍掃氛翳奕葉三百年皇風紹帝系天子坐眀堂南面稱王制冕旒垂天光玉劒通霄霽太微廓纎塵萬里見毛毳元黙籍儒術恢宏資聖叡宣室訪鬼神茂陵求俊藝大岯起伏龍南溟恣渀㵝行空作霖雨少答聖明惠晨趨紫微垣暮拽青雲履抗劾無中閹紏彈懾戚第上方斬馬劒入目决雙眥清戎大梁郊按轡于越汭聳身一鷙鳥霄漢獨凌厲迴登黄鶴樓笑謁蒼梧帝赫赫江湖間髙風捷虹霓東家李北海倜儻執英袂仙宦浮江湘芳聲播燕薊詔爲滄水使寛此漕㑹計疏鑿九河空導流百川細三呉十萬艘朝宗轉迢逓雍絳各一時泛舟同康濟至尊假顔色徴入承明砌御屏疏姓名金馬晩留憇紫宸揚清氛飄䬙偕蘭蕙讒疑動明主懐玦各長逝悵念平子詩頻流賈生涕懐沙