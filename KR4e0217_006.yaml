body:
  text: 重刻蠛蠓集引吾郡盧山人者以詩文雄一世而當其時則人少有能重之者今沒去二十餘載而所撰蠛蠓集始出焉集始刻於吳之太滄州乃鳯洲王公家藏抄本􅀈崍張公手自校讐之又自敘其刻之始末以成兹集集傳至吾郡見者以為琬琰竒珍轉相抄録日不暇給殆若平子賦出而紙價為貴時矣余邑竇尹寶泉雅好時文因謀於余將重刻是集以應求者且計省價於筆楮之費者當什倍也乃刻之兩月而完刻之字迹即翻原本頗不相下文事於兹其有興乎竇尹欲紀其重刻之意復屬余為序余惟山人詩祖六朝文賦法秦漢評之者已有定價而其人豪宕不羈扞當世之文網自罹大辟幾瀕於死故其詩文多成於三木金索之間見於自敘又如此俱不必述也獨感夫詩人之言曰詩文必窮而後工乃今於山人復見之故史稱丘明失目厥有國語孫子臏腳兵法修列屈原放逐乃賦離騷不韋遷蜀遂作吕覽詩三百篇大扺皆詩人發憤之所作則山人之集可以觀矣豈獨於人物亦有之松柏必生於巖澗之間遍厯冰雪之慘而后木理之堅不等於羣材寶劒不埋於獄中嚙蝕於數千年之塵土則亦無以衝斗氣而發光華也向使山人以職務縈其身或安居無事日徜徉於沙麓風月之間則雖未必無所撰述以成一家之言然必不能如斯集之工也閲山人之集者可以哀其志矣􅀈崍公又述山人逰太學歸痛哭於申考功之第謂太學為空洞無人而醉賦紫騮馬篇纍纍數百言有飛黃萬里之思又其方出行狴手械未除邑令命茶即與抗禮至引越石父對晏子之辭而邑令大慚即此兩事則山人超軼之見磊落之懷出塵埃逺甚故冝其發為文詞淵深閎肆力追古人即顛仆備至而略不涉寒酸語也兹又可以壯山人矣萬厯乙亥嵗中秋八月賜進士第吏部考功司員外郎魏郡少春穆文熙撰
