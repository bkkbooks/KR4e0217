body:
  text: 蠛蠓集卷五明盧柟撰雜體詩伏雨嘆二首隂陽薄蕩雷雨急江峽出雲溪夜喧煙霏似與秋色逺黃鵠垂翅愁飛翻九壥溷穢不可住晞髮陽阿阻煙霧東走豈應還問津回頭變化空桑樹山雨下澍白紛紛憑髙莫辨牛馬羣江寒自駭碣石浪日暮猶合蒼梧雲破厨濫釜煙水黑玉盤金鯉無消息直欲上天呌帝閽閶闔九重恐顛踣史平臺夜宴詞漢史玄以宣帝大母家封為侯於外家親居多得賞賜簮貂弭世寵溢內外明浮丘山人作史平臺夜宴詞髙堂膩燭嬌紅春麝爐掣鎖銀麒麟掌中舞袖回金縷背後落花覆錦茵夜半歌鐘起洞房繡羅香暖對鴛鴦旋徴玉雁排筝譜復弄梅花近笛牀繡額紅襟真媚嫵隔簾髣佛調鸚鵡喚回滿座鬱金香鮮鯽銀絲出翠釜雞人夜唱銅龍瀉內監忽傳進拿馬絳綃雙引貂襜褕長秋門前馬不下北風吹山海水移世人見此復淚垂寶玦香車俱莫嘆金掌仙人已辭漢苦寒吟北風怒號河水折鑿氷慘淡鮫人窟琉璃應手忽破碎天吳回首蛟龍血錦鱗撥剌入豪門鑾刀玉釜飛紅雪馮歡夜坐食無魚彈鋏髙歌氣未舒方袍著凍冷如鐡嘯呼霜霰攢兩眉星火不燃寒欲死皮􆅠肉裂老無齒誰能醉解驌驦裘别有權家會戚里苦寒吟苦寒之吟不可聞古來傑士多餓死何必垂首涕交紛杜鵑行杜鵑西飛隴水西羽毛搖落隨山雞雲空萬里不得去藤蘿掩靄青煙梯當行鵾鵬向我笑鳯凰不與同羈棲舊日同林鳶與鶡怒目炯視秋水畦東海汗漫稀有鳥尋我三年窮路迷知是杜鵑向我拜血淚不覺滿面啼口不能言臆相向似欲逺引凌昆溪四郊罦罝多隱壘獵火燒天喧鼓􅤯寄語燕山胡雁婦慎勿往恐穿金鎞快鶻行贈盧潭城宗弟快鶻快鶻南山擊鳥北山灑血朝發秦隴暮宿荆越凌厲橫視遊翔恍忽蜩鳩搶飛榆枋間仰靣而視無好顔人生得意且快鶻何用悠悠長閉關翟公昔在蓬蒿下萬里清風減髙價君今慷慨躡長雲藉藉芳聲四海聞揚雄欲獻河東賦司馬先傳喻蜀文醉吟快鶻行醒銜快鶻羽願君化作天池鵬莫學快鶻棲巖樹黃利黃謡黃利黃黃利黃黃河岸上洗衣裳黃河流水鳴湯湯幾時流到我家鄉次童謠山東綺雲雞刷羽來山西到處潛飲啄河梁借羈棲江鶩野鴷欺豫客怒目血鵀動相扼紫翎蹉跌金距愁碧葉輕翻香稻秋不如折翅歸故鄉五更明月啼山丘㠠昆謠呈張㠠山明府朝乘五嶽鶴暮望十洲雲尋山不厭㠠昆逺笑謁㠠昆入紫氛㠠昆名嶽天下聞巴江前繞接氤氲翠屏巉巖斜軋幾萬丈玄猿夜嘯臨江濆馮夷水仙何超忽凌風起舞㠠昆月蒼藤翳靄看不見欲上㠠昆苔徑滑昔聞天台山岹嶢摩天關赤城起霜色王喬時來還洞天已與㠠昆别為説㠠昆生汗顔㠠昆謠謠且逺仙茅千載留靈根玉葉金葩待君飯君意詎可論恍若岷山源漰湱赴溟海聊可比君恩生來未識㠠昆路此身幾日登㠠昆㠠昆謠謠未巳早晚化為㠠昆原上之青松常倚㠠昆望江水芒履謠蒲葉青蒲花黃為君採纈結成雙隨君步履入屧廊苧羅山下君不返恨殺吳王輦路長修武行贈李主簿君不見修武城邉日欲暮西望岹嶢漢京路驛樓閣道逈連雲花巘葉潭車馬駐車馬駐聽修武歌裊裊秋風度黃河客懷衣上灞陵雨鄉思夢繞新豐蘿乘時小作修武尉披襟靄靄流仙氣自言節操凌南山直使風聲排趙魏使君稅駕是何年日飲醇醪髙枕眠山鳥隔簾下廳事對客髣佛鳴寒絃城頭角聲星滿野城門落花隨去馬溪澗荒涼留使君天風繫馬棠隂下父老垂涕前致詞使君到來人不知今年詔書蠲租稅須臾還見承平時憶昔少年為君舞共憐修武西山樹即今望樹還憶君悵嘆雲山歌修武信陵亭行贈張幕史昔聞貴公子乃是信陵君劒氣連秋水英風邁長雲堂中愛養三千士玉袍珠履何繽紛信陵一去幾千載堂中今無一人在空餘城裏信陵亭日見黃河走東海信陵亭右送飛鴻豪士者誰張長公虬髯瀟灑眼如電論吐何啻垂天虹身騎宛馬鐡花驄霜蹄決裂耳生風四顧已無南海尉一心要滅黑山戎朝發夷梁津暮宿黎陽渚軒蓋狹廣路翩翩皆龍舉春風淡蕩吹羅帷宛如渌水蓮花池異代風流今有此若問信陵那可知樂府出自薊北門行翩翩羽林兒少學龍虎韜膂力過賁育英風擁行旄展藝萬人歡上馬盤弓韜怒揮魯陽戈倒刺寒潭蛟腰縣繁弱弓仰射太行猱北出雁門塞從軍樹竒勞占轡李輕車應募霍嫖姚羽檄動邉序烽火無昏朝分兵救廣武轉戰龍城郊投鞭瀚海渾結陳隂山髙朝擒左賢王暮搗單于巢拓塞亘萬里奪旗列千遭邊霜飛玉關漢月照銀袍疾風彯雲斿黃沙驚馬鑣天寒角筋徑墮指如翦蒿豈不懷金閨畏此簡書遙仗義報明主殺身誠足要前有鐏酒行春風吹水搖渌波春日輝輝上翠峩悠悠簾幕捲芳草細細落花嬌綺羅胡姬嬿婉顰青蛾促絃急柱為君歌海水東流逝不返君今不飲可奈何子夜吳歌燕花敷錦繡楚舞醉羅裙明月空悲妾向雲常似君不知遼海上書信幾時聞古别離鏡臺倚新粧羞復畫蛾黃羅衣蕩赩色落花空故香登髙望帝子蒼梧雲正長願托雙鯉魚錦字寄沅湘懷仙歌五首崑崙山勢倚天嵬弱水千年四下回花開王母三桃樹雲擁周王八駿來蓬海城髙十二樓金銀花發近仙洲玉童贈與青藜杖天女邀乘白鹿遊緑髮雙鬟白羽裳眇無人識自騎羊宜時背癢尋仙侣願借麻姑指爪長丹崖石壁渺冥冥凰嘯鸞歌狎廣庭王子吹笙應有待相思遙寄赤松苓玉樹長攀有所思仙人遙在海之湄木公醉飲千鍾酒瑤姬齊唱萬年詞碣石篇蓬萊東望橫海水白波如山幾萬里巖前琪樹發蔥青遙見仙人綵雲裏麻姑欲過來何遲手把青都緑玉枝願將此物寄南嶽相逢重獻萬年詞隴水曲隴山當靣起隴水向西流中含妾墮淚幾月到涼州涼州樂月氐穹廬夜秋風起暮笳河星沒雁塞漢月湧龍沙露滴葡萄酒天寒苜蓿花從軍莫浪謔轉戰屬輕車怨歌行長安二三月紫陌競朱輪秀色金閨婦鉛華珠箔春綺紈繽雜遝鞍馬自逡巡青鳥䘖瓊書飛入赤城闉日暮荷寵歸文犀銀麒麟借問此阿誰大國虢與秦憶昔嬌小佇蘭房刺繡五紋雙鴛鴦星河織錦度明月天孫剪綵分雲章願將賤軀開天笑夜逐三星宿未央未央樂事多莫謂宜春好宫女妬蛾眉容顔日衰老君恩從此弛棄妾青樓道青樓大道繞秦川鳯管鸞絲徹九天太液紅蓮初映頰瀛洲緑草已縈煙妾情恍忽如昨日那知恩斷韶華年夢入彤樓夜金壺㵼春水髣佛接君歡晤言竟非是閶闔浮雲萬里遙雲從翠葆徒相邀詎聞阿嬌貯金屋枉殺秦嬴吹玉簫寄語漢宫娃莫倚顔如花君心難自保棄擲終泥沙妾容已自落倡家妾心耿耿凌朝霞羊車竹枝待君御髙唐雲雨空淫哇君王欲較妾長短請看前朝張麗華枯魚篇枯魚枯魚爾身自白龍誰使爾為魚一朝落泥沙鱗甲生長蛆嗟嗟鯨鯢振鬐滄海吹噓三山簸揚嵬嶵爾罪維斯死亦何悔誰能借風濤作書上天帝雪此坳堂寃飛騰吸雲霓枯魚枯魚從此遐逝折揚柳春思結楊柳搖曵金忩煙東風淡蕩時吹落玉臺前深閨别離婦感此心凄然沉吟毁青黛抆淚謝珠鈿攀條寄逺人引恨碧雲天微物豈足惜長懷芳樹妍怨詩行秦戍樓荒君未還楚鄉秋早妾摧顔日寄情心與明月相思何謝望夫山丁督護歌朝吟都護行暮吟都護歌都護逝不返妾當可奈何妾年十五嫁夫君銀轂珠簾慶彩雲還從嘉賔遝四座刺繡鴛鴦羡五文髙堂拜姑嫜清厨調菽水日旭供華饌香風動紈綺二十長子孫霅􅀈滿髙門頗偕伯鸞志敘此向平婚詎意良人從逮獄幽垣無分回天矚闔門骨肉盡草莽放室雞豚那能促桂帳蘭薰知幾時鴉鬢蜩鬟為誰緑妾身死去無處所忍向何人説衷曲去年天使至籍録發良人中途不得語况復能相親今年一會靣若墮煙霧身執手無别言但訴寒與貧淹忽歲云暮已非夢寐真東家女兒嫁商賈春去秋來不言苦何似妾懷常相思萬恨千愁忍飢窶落葉反本根歸雲常在山君身陷羅網經歲不復還豈惟君坎軻所恨妾命慳妾非蔡文姬長跪解君死有女非緹縈誰能見天子一唱都護歌再唱情轉深愁多不為牛山哀淚下豈有雍門琴君心若知妾腸斷願化東南填海禽少年行二首長安俠客多少年醉歌擊築南山邉相逢不避魯勾踐一夜擲盧得萬錢又長安俠客矜年少青驪緩步章臺道相逢欲取胡姬憐笑挾金丸墜飛鳥東嵣行暮秋搖落金井煙瑤窗月出愁無眠請君四座且勿嘆聽我試歌東嵣篇東嵣春風樂遊冶寶劔螭盤驕白馬朝從狡兔上闌東暮鬭金雞長干下儂家繡被金錯床逢迎七十紫鴛鴦生來孱小無人見艷著荷花嬌上粧錦瑟春生鳯凰柱翠袖香凝蛺蝶縷浮雲小駐緩聲歌花葉驚翻垂手舞眄睞流波媚笑顔此時恩愛比南山那知輕薄易年少一别迢遙隔玉關儂心厯落如秋草西風吹折江南道江雲斷盡君不來會使蛾眉待君老東家買得錦鱗魚中有傳情尺素書君身亦是臨江客何惜相思一字豫機中罷却流黃織為恨東嵣淚霑臆寄語舂陵遊俠兒莫學東嵣負傾國鳬墩有序鳬墩者銅梁張㠠山明府兄長公也長公父疾且篤醫莫能愈長公引刀割左股和藥進父病立已有司聞之表薦明浮丘盧柟作鳬墩篇東觀岱嶽西引鳬墩偃仰怙恃有如子孫一解鳬墩之容溫懿無弛軫父之疴歡揄鳬里二解白楊鏘鏘矯若龍翔仰天一呼烈石飛霜三解實毒我父寧知我股䀌血濺濺以瀹以釜四解父曰豫瞢啜此肴羹殆其有廖欻如已酲五解稚笋之薦江魚之膳昔聞太史今兹匪謴六解荆蜀之鄉爰有銅梁篤是異人刑我有邦七解黃鵠篇贈羅封君就養還萬安君不見黃鵠飄遙下太清天風接引銅臺城仙雛銜羽逺相慰嘯舞不覺煙雲輕玉珮瑲鏘何所致熒熒上刻瑤華字歸時持贈與盧敖萬里螺川恣遊戲相逢行黎陽臨大道城北逹城南相逢問令君不盡使君驂雪霽椿枝緑春融萱草酣荀何千載後獨此一清瞻胡鷹渡海來篇鬱律山上雲飄遙雲間葉葉落尚有返雲去杳難涉胡鷹渡海來將雛還飛去我欲因之執此鳥徘徊流涕不忍顧長跪折矢一語可方客子周遊情同此傷天老介嘏父母在幃雜珮繒錦玳瑁珠璣杖屨陟降窺秦桃源仙姿玉度俟何能言隂符晝設鬼神呵守至道不勝苔滋蝌蚪虞皇厯阪文后岐陬永錫爾類揚名中州閶闔篇春日照城隅佳氣紛朱邸宫女三千人雲光晃羅綺且卷珠簾開直待雲車回玉簫吹行雲飛下瓊瑤臺瓊瑤臺畔仙妃舞鳯鳥唱歌龍枹鼓天風渺渺動朱衣天女乘春散花雨緑蕚花前細草茵玉階鎖斷金麒麟明朝騎爾朝上帝夀我四萬八千春五言排律甲辰歲張郡伯鄮西如覲京師其母太夫人出中饋給囚因感激述懷作五十韻以謝鳯厯開皇紀龍池憶紫煙青陽調玉燭白日轉幽天河朔風雲會漳涯氣槩先諸公梁苑客明府漢庭銓沈宋金章籍隂何玉轡聫衣冠連日表精爽動星纒各應非熊兆同操哲匠權文翁兼化蜀郭隗始登燕五馬襄城野雙旌霸水􅀈夾輪雙鹿擾上漢一槎縣忠奬推王室金泥受帝宣吳公才第一賈誼席應前鄯善何無爾河源即有焉疏名勒玉藻歸院徹金蓮虎變谷風起鶯鳴喬木遷那徴文伯母誰産范滂賢黃鳥空玄理關睢德化全肅雍元啓胤聖善總承乾壺臬慈文表襟裾風紀緣大家新著作劉向舊名篇雨露含濡逺江河流澤偏吹噓延朽腐哀痛及顛連粉署琅玕碧天牢桂玉鮮八珍真爢鑿五醢更駢闐䴾麥赤城外杯羹玄圃邉春盤行荏苒曲機坐連翩眉睫光初潤膏肓病即痊尚方虛擬賜隂室兢相憐小步嬰金鐵揚眉愧拘攣朵頤羣儽側染指朅夫筵坎廩心仍切低徊腹稍便循牆如喪狗寃頸似飢鳶慷慨期投璧呻吟尚縮肩搶呼北向拜遙祝西華年少假恩猶乳翻思淚下泉二靈忘伏臘兩稚飽鷹鸇丘壠哀