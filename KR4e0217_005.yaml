不去人吏散岸幘何勞官長迎綿竹土風今變態黑山盜賊敢橫行樗材慙愧河陽賦坐起青霄望辨纓赴理大名道中感李有池惠粟之作關塞遙憐霜露清燕雲漠漠鎖層城鄒陽不盡十年淚鮑叔猶深萬古情秋水魚龍休悵望春風燕雀賴生成酬恩欲擬愁難賦坐嘆空垂白髮莖聞比郡李滄溟出守順德書此寄上漢署仙郎何處求髙旌知駐古邢州漁陽久待張君淑河內爭迎郭細侯舊日石門曽拒壘此時銅馬莫輕謀畏途逺附青雲翼慷慨長吟寄壯遊立春前夜宴張㠠山明府宅城柝傳聞客子夕清樽一發便宜人巴江水泛雲邉臘㠠嶽天開雪後春避地衣冠從懶慢驚時花鳥自逡巡愧知張翰留顔色擬許盧敖隱釣綸醉後射魚宿羅山人草堂南射滄溟十丈魚碧潭搖影動清虛太行逺望仙人嶂淇水斜臨髙士居曉傍楓巖留客飯夜歸蘿徑即吾廬何時共䇿清藜杖為覔中山白鹿車觀妓即席走筆楚女東鄰未是過秋來休似隔銀河香鬟小學平陽舞艷曲低翻子夜歌弄日鴛鴦窺綺幔偷春蛺蝶趂花羅大堤此夕堪腸斷回首猶憐逝水波舊黃河道中有懷張㠠山明府黃河渡口舊飛湍白馬東連瓠子灘夏后山川餘斷石漢皇巡幸咽回鑾寒沙滚滚龍蛇動晚日蕭蕭雁鶩乾慨古思君易搖落秋風更送紫騮鞍贈羅月巖推府迎侍還萬安二首漢京仙客知名早佐郡驚看漳水濆南楚花明萊子服西山樹送狄公雲髙秋大澤龍地隱落日寒江鼓角聞最是少微干象緯天風先報洞庭君又燕塞霜空萬木摧楚鄉煙淨錦帆回洲如白鷺天邉落山似青螺海上來孫晷蘭輿元水國曹家仙賦在銅臺南雲北渚休相憶紫誥金泥次第開春晚將還舊業諸公送逺獨方水雲以病不至作此留别青春載酒尋君處君病春殘我亦回背葉流鶯愁對語捎泥乳燕吝飛回煙雲莽莽髙歡壘日月荒荒魏武臺醉裏劒歌時自放白頭還望轉堪哀登南城樓有感兼懷荀前川獨上髙樓四望明海天愁色起縱橫黃雲不斷飛孤雁殺氣遙連偃月城未訝健兒能陷虜早聞白羽尚徴兵封侯知有荀公逹好向中朝事請纓五言絶句山雨五首日落石忩時林花起幽色不敢窺蛟龍雨昏潭影黑又朝看山作雲暮看山作雨幽人期不來踟蹰望江樹又秋水作鳴濤瀉入秋山下大石橫絶梁小石流空野又峽雨晝不絶暝煙沉孤嶂徘徊山中人苔蘚生衣上又門前黃岡陂能長青琅玕夜來溪雨惡流作白石灘示從弟橋三首鴻堆隔春水鶺鴒宿淺沙翻飛共遲暮終爾棲雲霞又吾家白玉樹璀璨已橫枝儘可參霄漢莫教傷别離又莫向蒼山宿蒼山古木橫風動連枝影凄其傷爾情寄髙貞庵明府二首隴水鳴幽咽隴山不可攀何緣牽夢到夜夜繞秦關又隴坻千萬里悵望使人迷願作青鸚鵡能言向隴西七言絶句别冀康川進士口號秋風七月動燕關雲散金臺遊子還欲上髙樓重愁思海濤東望阻天山長春觀二首瀛海青雲見帝丘玉光浮動五城樓茅君借我山中鶴飛上天門看九州又紫極清壇道士家間騎白鹿弄雲霞蕭臺旖旎金光草春殿虛無玉樹花青樓詞百尺髙樓挂彩煙錦筝銀甲亂哀絃夕陽欲下簾深捲望見西江萬里船雲中曲八首將軍羽箭射天山閃日旌旗出漢關夜月欲開青海嶂秋風先到白龍灣又燕岱河山黑水分塵沙北望接氤氲桑乾斜映龍山月碣石遙通魚海雲又元戎幕府倚天開將校星躔四下回漢壘天成標漢斾雲州日轉作雲臺又髙闕塞頭殺氣橫居延川內少人行黃沙欲沒李陵墓明月長懸蘇武城又半夜飛書報建章交河新駐左賢王即分驍騎屯榆塞便發元戎出定襄又大將遙分西顧憂魚腸寶劒雪花流隂風漫捲賢王陳白纛看麾木葉樓又黃鬚羽帽破烏桓丈八蛇矛血未乾邊馬盡歸元帥幕蕃刀贈與故人看又白馬青裘海上來自言家住古秦淮封侯未遂為人下沙漠橫行恐見猜戲贈于山泉楚王宫殿鎖寒暉瑤草金花匝四圍十二巫山覔不見滿天雲雨濕仙衣贈衛川居士衛川南望多白雲滄州落葉各紛紛何時笑入煙霞去醉裏常隨麋鹿羣送王旴山還保定君去青山挹紫氛我亦南還弄彩雲相逢美酒不成醉别去空憐落雁羣秋興漫成六絶句壁峭江深雲物明沙村秋氣轉初清出門散著雙蓬鬢醉舞酣歌太放情又天外晴山色不移苑邉衰柳駐遊絲沙平細履無人見恰似青春二月時又絶巘寒藤垂古月秋江過雨濕仙花柴門幽興尤堪賞遍遣銀壺賖酒家又當階松樹何楚楚黮葉蒼枝已傲霜要須見汝作梁棟桃李春華休擅場又柴門反鎖對秋城獨樹花開眼自明但使濁醪常醉汝向來車馬不須迎又買茅藉宇非無地簷花澗石錯相鮮西鄰野老憐踈放數借風亭涼處眠衛河漲二首河隍東望似東洋簸蕩中流日月光漁子舟人頻顧盼恰如五月下瞿塘又匏子煙波橫九灘淇園蒼竹斬千竿何如此日風濤惡灑雪衝颷作海湍寄孟龍川絶句燕郊六月起秋霜地振山傾薄日光吁嗒風雲那有此黃金臺下斷人腸西山集宴山作屏風雜錦苔鳯笙龍管遞相催若非緱氏山頭飲擬有仙人海上來對勘呈吳少槐吏部漢法終憐天地寬楚囚何恨歲時難肯教細草隨霜死願借春光及暮寒獄夜城頭鳥雀飛欲棲樓上歡聲四下齊一夜霜風吹不盡滿庭秋色使人迷聞華從化誦李中麓樂府詞有憶寄上四首漢庭協律按新聲曲度梅花散月明拂拭青天垂手舞相思遙寄鳯凰城又曼倩西辭金馬門酣歌特地引芳樽海上長謠王母宴人間謫得歲星魂又東望山東中麓山赤城霞送主人還忽聞醉裏松風曲恰似劉伶善閉關又麟閣虛傳身後名琴臺貰酒自須傾颯沓結風成楚舞歌吟緑水勝秦聲謝華竹川酒肴二首淮隂市頭惡少喧胯下之辱詎可言漂母屢出金盤食白沙緑水哀王孫又燕國舊飲金盤露章丘今見玉壺春煙霞去住不相似笑殺中山賣酒人宿沙河值雪同蔡百户作此南雲漠漠鎖天荒北雪霏霏暗北堂日暮角聲吹出塞沙河愁殺蔡中郎丁未夢中遊王西軒園作是歲十一月二十日獄吏談遵令獄卒蔡賢笞柟數百謀以土囊壓殺之官覺之免秋日園林一暫過桃花默默鎖空蘿歌聲漫逐浮雲去不覺霜風兩鬢多憶內蘇武霜旌辭漢關李陵沙漠去無還舊時亦有金閨淚何似今朝爾别顔贈內二首蘇武丐奴十九年相思知在海雲邉上林鴻雁銜尺素寄汝秋風玉塞前又君身似是杞梁妻玉貌緘情只自啼幾時哭到梁山月攜手青雲入會稽內寄衣吳江白紵雪絲裙不惜春芳細草薰玉手裁縫誰得見金刀一剪斷行雲與張山人雲谷對飲言别海上曽留赤玉舄山中今共紫霞巵相逢暫爾各飛去颯颯天風駕彩螭代邉騎騂弓貫臂箭橫腰慣射山隂雪後雕欲假金笳鳴出塞不知誰是漢驃姚訪海月上人不遇錫杖到來知幾日天花落盡鎖春山柴門流水不相顧漠漠煙雲送我還蠛蠓集卷五
