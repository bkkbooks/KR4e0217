body:
  text: 蠛蠓集巻五明盧柟撰雜體詩伏雨嘆二首隂陽薄盪雷雨急江峽岀雲溪夜喧烟霏似與秋色逺黄鵠垂翅愁飛飜九壥溷穢不可住晞髮陽阿阻烟霧東走豈應還問津囘頭變化空桑樹山雨下澍白紛紛憑髙莫辨牛馬羣江寒自駭碣石浪日暮猶合蒼梧雲破厨濫釜烟水黒玉盤金鯉無消息直欲上天呌帝閽閶闔九重恐顛踣史平臺夜宴詞漢史𤣥以宣帝大母家封為侯於外家親居多得賞賜簮貂弭世寵溢内外明浮丘山人作史平臺夜宴詞髙堂膩燭嬌紅春麝爐掣鎻銀麒麟掌中舞袖囘金縷背後落花覆錦茵夜半歌鐘起洞房繡羅香煖對鴛鴦旋徴玉雁排筝譜復弄梅花近笛牀繡額紅衿真媚嫵隔簾髣髴調鸚鵡喚囘滿座鬱金香鮮鯽銀絲出翠釜雞人夜唱銅龍瀉内監忽傳進挐馬絳綃雙引貂襜褕長秋門前馬不下北風吹山海水移世人見此復淚垂寳玦香車俱莫嘆金掌仙人已辭漢苦寒吟北風怒號河水折鑿氷慘淡鮫人窟琉璃應手忽破碎天吳囘首蛟龍血錦鱗撥剌入豪門鑾刀玉釜飛紅雪馮讙夜坐食無魚彈鋏髙歌氣未舒方袍着凍冷如鐡嘯嘑霜霰攅兩眉星火不燃寒欲死皮􆅠肉裂老無齒誰能醉解驌驦裘别有權家㑹戚里苦寒吟苦寒之吟不可聞古來傑士多餓死何必垂首涕交紛杜䳌行杜䳌西飛隴水西羽毛搖落隨山雞雲空萬里不得去藤蘿掩靄青烟梯當行鵾鵬向我笑鳯凰不與同羈棲舊日同林鳶與鶡怒目烱視秋水畦東海汗漫稀有鳥尋我三年窮路迷知是杜䳌向我拜血涙不覺滿面啼口不能言臆相向似欲逺引凌崐谿四郊罦罝多隠壘獵火燒天喧皷􅤯寄語燕山胡雁婦慎勿往恐穿金鎞快鶻行贈盧潭城宗弟快鶻快鶻南山擊鳥北山灑血朝發秦隴暮宿荆越凌厲横視遊翔恍忽蜩鳩搶飛榆枋間仰靣而視無好顔人生得意且快鶻何用悠悠長閉關翟公昔在蓬蒿下萬里清風减髙價君今慷慨躡長雲藉藉芳聲四海聞揚雄欲獻河東賦司馬先傳喻蜀文醉吟快鶻行醒啣快鶻羽願君化作天池鵬莫學快鶻棲巖樹黄利黄謡黄利黄黄利黄黄河岸上洗衣裳黄河流水鳴湯湯幾時流到我家鄉次童謠山東綺雲雞刷羽來山西到處潛飲啄河梁借羈棲江䳱野鴷欺予客怒目血鵀動相扼紫翎蹉跌金距愁碧葉輕飜香稻秋不如折翅歸故鄉五更明月啼山丘㠠崐謠呈張㠠山明府朝乘五嶽鶴暮望十洲雲尋山不厭㠠崐逺笑謁㠠崐入紫氛㠠崐名嶽天下聞巴江前繞接氤氲翠屏巉巖斜軋㡬萬丈𤣥猿夜嘯臨江濆馮夷水仙何超忽凌風起舞㠠崐月蒼藤翳靄看不見欲上㠠崐苔徑滑昔聞天台山岹嶢摩天關赤城起霜色王喬時來還洞天已與㠠崐别為説㠠崐生汗顔㠠崐謠謠且逺仙茅千載留靈根玉葉金葩待君飯君意詎可論恍若岷山源漰湱赴溟海聊可比君恩生來未識㠠崐路此身㡬日登㠠崐㠠崐謠謠未巳早晚化為㠠崐原上之青松常倚㠠崐望江水芒履謠蒲葉青蒲花黄為君採纈結成雙隨君歩履入屧廊苧羅山下君不返恨殺呉王輦路長修武行贈李主簿君不見修武城邉日欲暮西望岹嶢漢京路驛樓閣道逈連雲花巘葉潭車馬駐車馬駐聴修武歌裊裊秋風度黄河客懐衣上灞陵雨鄉思夣繞新豐蘿乘時小作修武尉披襟靄靄流仙氣自言節操凌南山直使風聲排趙魏使君税駕是何年日飲醇醪髙枕眠山鳥隔簾下㕔事對客髣髴鳴寒絃城頭角聲星滿野城門落花隨去馬谿澗荒凉留使君天風繫馬棠隂下父老垂涕前致詞使君到來人不知今年詔書蠲租税須臾還見承平時憶昔少年為君舞共憐修武西山樹即今望樹還憶君悵嘆雲山歌修武信陵亭行贈張幕史昔聞貴公子乃是信陵君劒氣連秋水英風邁長雲堂中愛養三千士玉袍珠履何繽紛信陵一去㡬千載堂中今無一人在空餘城裏信陵亭日見黄河走東海信陵亭右送飛鴻豪士者誰張長公虬髯瀟灑眼如電論吐何啻垂天虹身騎宛馬鐡花驄霜蹄决裂耳生風四顧已無南海尉一心要滅黑山戎朝發夷梁津暮宿黎陽渚軒盖狹廣路翩翩皆龍舉春風澹蕩吹羅帷宛如渌水蓮花池異代風流今有此若問信陵那可知樂府出自薊北門行翩翩羽林兒少學龍虎韜膂力過賁育英風擁行旄展藝萬人讙上馬盤弓弢怒揮魯陽戈倒刺寒潭蛟腰縣繁弱弓仰射太行猱北出雁門塞從軍樹竒勞占轡李輕車應募霍嫖姚羽檄動邉序烽火無昏朝分兵救廣武轉戰龍城郊投鞭瀚海渾結陣隂山髙朝擒左賢王暮擣單于巢拓塞亘萬里奪旗列千遭邊霜飛玉關漢月照銀袍疾風彯雲斿黄沙驚馬鑣天寒角筋勁墮指如翦蒿豈不懐金閨畏此簡書遙仗義報明主殺身誠足要前有鐏酒行春風吹水搖渌波春日輝輝上翠峩悠悠簾幕捲芳草細細落花嬌綺羅胡姬嬿婉顰青蛾促絃急柱為君歌海水東流逝不返君今不飲可奈何子夜呉歌燕花敷錦繡楚舞醉羅裠明月空悲妾向雲常似君不知遼海上書信㡬時聞古别離鏡臺倚新粧羞復畫蛾黄羅衣蕩赩色落花空故香登髙望帝子蒼梧雲正長願托雙鯉魚錦字寄沅湘懐仙歌五首崑崙山勢倚天嵬弱水千年四下迴花開王母三桃樹雲擁周王八駿來蓬海城髙十二樓金銀花發近仙洲玉童贈與青藜杖天女邀乗白鹿遊緑髮雙鬟白羽裳𦕈無人識自騎羊宜時背癢尋仙侣願借麻姑指爪長丹崖石壁𣺌㝠㝠凰嘯鸞歌狎廣庭王子吹笙應有待相思遙寄赤松苓玉樹長攀有所思仙人遙在海之湄木公醉飲千鍾酒瑤姬齊唱萬年詞碣石篇蓬萊東望横海水白波如山㡬萬里巖前琪樹發葱青遙見仙人綵雲裏麻姑欲過來何遲手把青都緑玉枝願将此物寄南嶽相逢重獻萬年詞隴水曲隴山當靣起隴水向西流中含妾墮涙㡬月到凉州凉州樂月氐穹廬夜秋風起暮笳河星没雁塞漢月湧龍沙露滴葡萄酒天寒苜蓿花從軍莫浪謔轉戰屬輕車怨歌行長安二三月紫陌競朱輪秀色金閨婦鉛華珠箔春綺紈繽雜遝鞍馬自逡廵青鳥䘖瓊書飛入赤城闉日暮荷寵歸文犀銀麒麟借問此阿誰大國虢與秦憶昔嬌小佇蘭房刺繡五紋雙鴛鴦星河織錦度明月天孫剪綵分雲章願将賤軀開天笑夜逐三星宿未央未央樂事多莫謂宜春好宫女妬蛾眉容顔日衰老君恩從此弛棄妾青樓道青樓大道繞秦川鳯管鸞絲徹九天太液紅蓮初映頰瀛洲緑草已縈烟妾情恍忽如昨日那知恩斷韶華年夣入彤樓夜金壺㵼春水髣髴接君歡晤言竟非是閶闔浮雲萬里遙雲従翠葆徒相邀詎聞阿嬌貯金屋枉殺秦嬴吹玉簫寄語漢宫娃莫倚顔如花君心難自保棄擲終泥沙妾容已自落倡家妾心耿耿凌朝霞羊車竹枝待君御髙唐雲雨空滛哇君王欲較妾長短請看前朝張麗華枯魚篇枯魚枯魚爾身自白龍誰使爾為魚一朝落泥沙鱗甲生長蛆嗟嗟鯨鯢振鬐滄海吹噓三山簸揚嵬㠑爾罪維斯死亦何悔誰能借風濤作書上天帝雪此㘭堂寃飛騰吸雲霓枯魚枯魚従此遐逝折揚柳春思結楊柳搖曵金忩烟東風澹蕩時吹落玉臺前深閨别離婦感此心凄然沉唫毁青黛抆淚謝珠鈿攀條寄逺人引恨碧雲天微物豈足惜長懐芳樹妍怨詩行秦戍樓荒君未還楚鄉秋早妾摧顔日寄情心與明月相思何謝望夫山丁督䕶歌朝吟都䕶行暮唫都䕶歌都䕶逝不返妾當可奈何妾年十五嫁夫君銀轂珠簾慶彩雲還從嘉賔遝四座刺繡鴛鴦羡五文髙堂拜姑嫜清厨調菽水日旭供華饌香風動紈綺二十長子孫霅􅀈滿髙門頗偕伯鸞志叙此向平婚詎意良人從逮獄幽垣無分囬天矚闔門骨肉盡草莽放室鷄豚那能促桂帳蘭薰知㡬時鴉鬢蜩鬟為誰緑妾身死去無處所忍向何人説衷曲去年天使至籍録發良人中途不得語况復能相親今年一㑹靣若墮烟霧身執手無别言但訴寒與貧淹忽歳云暮已非夣寐真東家女兒嫁商賈春去秋來不言苦何似妾懐常相思萬恨千愁忍饑窶落葉反本根歸雲常在山君身䧟羅網經歳不復還豈惟君坎軻所恨妾命慳妾非蔡文姬長跪解君死有女非緹縈誰能見天子一唱都䕶歌再唱情轉深愁多不為牛山哀淚下豈有雍門琴君心若知妾腸斷願化東南填海禽少年行二首長安俠客多少年醉歌擊筑南山邉相逢不避魯勾踐一夜擲盧得萬錢又長安俠客矜年少青驪緩歩章臺道相逢欲取胡姬憐笑挾金丸墜飛鳥東嵣行暮秋搖落金井烟瑤牕月出愁無眠請君四座且勿嘆聴我試歌東嵣篇東嵣春風樂遊冶寳劔螭盤驕白馬朝從狡兎上闌東暮鬭金鷄長干下儂家繡被金錯床逢迎七十紫鴛鴦生來孱小無人見艷著荷花嬌上粧錦瑟春生鳯凰柱翠袖香凝蛺蝶縷浮雲小駐緩聲歌花葉驚翻垂手舞眄睞流波媚笑顔此時恩愛比南山那知輕薄易年少一别迢遙隔玉關儂心厯落如秋草西風吹折江南道江雲斷盡君不來㑹使蛾眉待君老東家買得錦鱗魚中有傳情尺素書君身亦是臨江客何惜相思一字予機中罷却流黄織為恨東嵣淚霑臆寄語舂陵遊俠兒莫學東嵣負傾國鳬墩有序鳬墩者銅梁張㠠山明府兄長公也長公父疾且篤醫莫能愈長公引刀割左股和藥進父病立已有司聞之表薦明浮丘盧柟作鳬墩篇東觀岱嶽西引鳬墩偃仰怙恃有如子孫一解鳬墩之容温懿無弛軫父之疴讙揄鳬里二解白楊鏘鏘矯若龍翔仰天一呼烈石飛霜三解實毒我父寧知我股䀌血濺濺以瀹以釜四解父曰予瞢啜此餚羹殆其有廖欻如已酲五解稚笋之薦江魚之膳昔聞太史今兹匪謴六解荆蜀之鄉爰有銅梁篤是異人刑我有邦七解黄鵠篇贈羅封君就養還萬安君不見黄鵠飄遙下太清天風接引銅臺城仙雛啣羽逺相慰嘯舞不覺烟雲輕玉珮瑲鏘何所致熒熒上刻瑤華字歸時持贈與盧敖萬里螺川恣遊戯相逢行黎陽臨大道城北逹城南相逢問令君不盡使君驂雪霽椿枝緑春融萱草酣荀何千載後獨此一清瞻胡鷹渡海來篇鬱律山上雲飄遙雲間葉葉落尚有返雲去杳難涉胡鷹渡海來将雛還飛去我欲因之執此鳥徘徊流涕不忍顧長跪折矢一語可方客子周游情同此傷天老介嘏父母在幃雜珮繒錦玳瑁珠璣杖屨陟䧏窺秦桃源仙姿玉度竢何能言隂符晝設鬼神呵守至道不勝苔滋蝌蚪虞皇厯阪文后岐陬永錫爾類揚名中州閶闔篇春日照城隅佳氣紛朱邸宫女三千人雲光晃羅綺且巻珠簾開直待雲車廻玉簫吹行雲飛下瓊瑤臺瓊瑤臺畔仙妃舞鳯鳥唱歌龍枹鼓天風𣺌渺動朱衣天女乘春散花雨緑蕚花前細草茵玉階鏁斷金麒麟明朝騎爾朝上帝夀我四萬八千春五言排律甲辰歳張郡伯鄮西如覲京師其母太夫人出中饋給囚因感激述懐作五十韻以謝鳯厯開皇紀龍池憶紫烟青陽調玉燭白日轉幽天河朔風雲㑹漳涯氣槩先諸公梁苑客明府漢庭銓沈宋金章籍隂何玉轡聫衣冠連日表精爽動星纒各應非熊兆同操哲匠權文翁兼化蜀郭隗始登燕五馬襄城野雙旌覇水􅀈夾輪雙鹿擾上漢一槎縣忠奨推王室金泥受帝宣吳公才第一賈誼席應前鄯善何無爾河源即有焉䟽名勒玉藻歸院徹金蓮虎變谷風起鶯鳴喬木遷那徴文伯母誰産范滂賢黄鳥空𤣥理關睢徳化全肅雍元啓𦙍聖善總承乾壺臬慈文表襟裾風紀縁大家新著作劉向舊名篇雨露含濡逺江河流澤偏吹嘘延朽腐哀痛及顛連粉署琅玕碧天牢桂玉鮮八珍真爢鑿五醢更駢闐䴾麥赤城外杯羹𤣥圃邉春盤行荏苒曲機坐連翩眉睫光初潤膏肓病即痊尚方虚擬賜隂室兢相憐小歩嬰金鐵揚眉媿拘攣朶頤羣儽側染指朅夫筵坎廩心仍切低徊腹稍便循牆如䘮狗寃頸似飢鳶慷慨期投璧呻唫尚縮肩搶嘑北向拜遙祝西華年少假恩猶乳翻思淚下泉二靈忘伏臘兩稚飽鷹鸇丘壠哀