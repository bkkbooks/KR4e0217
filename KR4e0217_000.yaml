body:
  text: 蠛蠓集目録别集類五明巻一書巻二啓記序碑檄對傳讚辭誄祭文巻三賦巻四四言古詩五言古詩七言古詩巻五雜體詩樂府五言排律七言排律五言律詩七言律詩五言絶句七言絶句臣等謹案蠛蠓集五巻明盧柟撰柟字少楩濬縣人太學生負才忤縣令令誣以殺人榜掠論死淹繫數年臨清謝榛走京師為稱寃適縣令已罷平湖陸光祖代之乃平反其獄得不死事蹟具明史文苑傳是集為嘉靖癸邜柟所自編凡雜文二巻賦一巻詩二巻前有自序稱蠛蠓者醯雞也取其潔於自奉介於自守不如蚊蚋之侵穢彊噉又以事繫獄類蠛蠓之阨燕吭罹蛛網振其音而喑喑者故以名集史稱其騷賦最為王世貞所稱詩亦豪放如其為人今觀其集雖生當嘉隆之間王李之焰方熾而一意往還真氣坌涌絶不染鉤棘塗飾之習盖其人光明磊落藐玩一時不與七子争聲名故亦不隨七子學步趨然而榛救之世貞稱之柟反以是重於世亦可謂毅然自立無所依附者矣乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀蠛蠓集自序蠛蠓者何醯雞也集何以謂之醯雞郭璞謂醯雞細質喜羣飛亦蚊蚋屬也夫蚊蚋貪哺嗜臭敗逐溷厠􅬄咀人一障惡之醯雞則入室窔􅀢幸於發瓿歠糟􅤽而甘芳酸飛則叢薨止不渝啖此非潔於自奉而介於自守者與其於蚊蚋侵穢彊噉者為何如此其蠛蠓也夫而柟質戇材駑託跡兩間猶夫葉之於林盃之於海也竊居蓬茨藜藿彌年無薦紳先生之交挹牧侯伯之遇舉則一丘言則自偶此夫人之蠛蠓哉嘉靖壬寅柟以事繫獄貫三木圜隂室待國家典刑發憤抒懐間有微詞輒不敢令人見反復諷誦尋痛愍而焚毁之夫蠛蠓之隘燕吭罹蛛網振其音而喑喑者何以異此是猶類之至也夫蚊蚋狡汙柟所弗屑蠛蠓雖微柟不敢自外焉視其類也嗟嘑鷹化而鳩雉流而蜃腐草而螢黿鼉魚鱉皆有化若蠛蠓槁死盆䰝吾獨不知其化者何也此豈造物篤於億類而嗇於蠛蠓也邪因摭録舊作并獄藁文若干首騷賦若干首雜體詩若干首搆成幾巻命其集曰蠛蠓峕嘉靖癸卯春三月朔六日黎陽盧柟撰
